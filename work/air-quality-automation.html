efault font-xs neutral-on-background-strong mb-l\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Page Not Found\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"The page you are looking for does not exist.\"}]]}],[]],\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L18\",null,{\"as\":\"footer\",\"fillWidth\":true,\"padding\":\"8\",\"horizontal\":\"center\",\"s\":{\"direction\":\"column\"},\"children\":[[\"$\",\"$L18\",null,{\"className\":\"Footer-module-scss-module__DkSkqG__mobile\",\"maxWidth\":\"m\",\"paddingY\":\"8\",\"paddingX\":\"16\",\"gap\":\"16\",\"horizontal\":\"between\",\"vertical\":\"center\",\"s\":{\"direction\":\"column\",\"horizontal\":\"center\",\"align\":\"center\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-s neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[\"© \",2026,\" /\"]}],[\"$\",\"span\",null,{\"className\":\"px-4\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Rohi Rikman\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"/ Powered by caffeine and questionable life choices\"}]]}],[\"$\",\"$L18\",null,{\"gap\":\"16\",\"children\":[[\"$\",\"$L19\",\"GitHub\",{\"href\":\"https://github.com/RohiRIK\",\"icon\":\"github\",\"tooltip\":\"GitHub\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"LinkedIn\",{\"href\":\"https://www.linkedin.com/in/rohi-rikman-48831b239/\",\"icon\":\"linkedin\",\"tooltip\":\"LinkedIn\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"Email\",{\"href\":\"mailto:rohi@rohirikman.dev\",\"icon\":\"email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"20:T5f0,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nThe Microsoft Intune portal is fine for small fleets. At 10,000+ devices it gets slow and the search is painful. FleetWatch is a dashboard I built to solve the specific problems that come up when you're managing a large fleet day-to-day.\n\n## Why I built it\n\nWorking with large Intune environments at Oncloud, the native portal was consistently the bottleneck during incident response — finding a specific device took too long, compliance state was stale, and triggering actions required too many clicks. I wanted a faster tool that worked the way the job actually works.\n\n## What it does\n\n**Fast device search** — full-text search across the entire fleet using optimized PostgreSQL indexing. Find any device, user, or serial number in under a second regardless of fleet size.\n\n**Real-time compliance** — continuous sync with Microsoft Graph means compliance state is current, not cached. Useful when you need to know right now whether a device is actually compliant.\n\n**Identity correlation** — links Intune device records with Entra ID user profiles automatically, so you see the full picture without switching between portals.\n\n**Direct actions** — trigger Intune actions (sync, remote lock, restart, wipe) from the dashboard without navigating the native portal.\n\n**Compliance trends** — shows compliance over time per policy, useful for spotting drift before it becomes a problem.\n\n## Stack\n\n- Next.js 15 (App Router)\n- PostgreSQL with GIN/B-Tree indexes\n- Microsoft Graph SDK\n- Vercel\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L10\",null,{\"as\":\"section\",\"maxWidth\":\"m\",\"horizontal\":\"center\",\"gap\":\"l\",\"children\":[[\"$\",\"$L1a\",null,{\"id\":\"schema-blogPosting-/work/air-quality-automation\",\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"url\\\":\\\"https://rohirik.github.io/resume/work/air-quality-automation\\\",\\\"sameAs\\\":[],\\\"headline\\\":\\\"Air Quality Automation\\\",\\\"description\\\":\\\"A Docker-based environmental monitoring system running on Orange Pi 3 LTS — BME680 sensor, dynamic air quality scoring, and structured JSON telemetry ready for any dashboard.\\\",\\\"image\\\":\\\"https://rohirik.github.io/resume/images/avatar.png\\\",\\\"datePublished\\\":\\\"2025-12-15\\\",\\\"dateModified\\\":\\\"2025-12-15\\\",\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"Rohi Rikman\\\",\\\"url\\\":\\\"https://rohirik.github.io/resume/about\\\",\\\"image\\\":{\\\"@type\\\":\\\"ImageObject\\\",\\\"url\\\":\\\"https://rohirik.github.io/resume/images/avatar.png\\\"}}}\"}}],[\"$\",\"$L10\",null,{\"maxWidth\":\"s\",\"gap\":\"16\",\"horizontal\":\"center\",\"align\":\"center\",\"children\":[[\"$\",\"$L1b\",null,{\"href\":\"/work\",\"children\":[\"$\",\"span\",null,{\"className\":\"font-label font-strong font-m\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Projects\"}]}],[\"$\",\"span\",null,{\"className\":\"font-body font-default font-xs neutral-on-background-weak mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"December 15, 2025\"}],[\"$\",\"h1\",null,{\"className\":\"font-display font-strong font-m neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Air Quality Automation\"}]]}],[\"$\",\"$L18\",null,{\"marginBottom\":\"32\",\"horizontal\":\"center\",\"children\":[\"$\",\"$L18\",null,{\"gap\":\"16\",\"vertical\":\"center\",\"children\":[[\"$\",\"$L1c\",null,{\"reverse\":true,\"avatars\":[],\"size\":\"s\"}],[\"$\",\"span\",null,{\"className\":\"font-label font-default font-m brand-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[]}]]}]}],false,[\"$\",\"$L10\",null,{\"style\":{\"margin\":\"auto\"},\"as\":\"article\",\"maxWidth\":\"xs\",\"children\":\"$L1d\"}],[\"$\",\"$L10\",null,{\"fillWidth\":true,\"gap\":\"40\",\"horizontal\":\"center\",\"marginTop\":\"40\",\"children\":[[\"$\",\"$L1e\",null,{\"maxWidth\":\"40\"}],[\"$\",\"h2\",null,{\"className\":\"font-heading font-strong font-xl neutral-on-background-strong mb-24\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Related projects\"}],[\"$\",\"$L10\",null,{\"fillWidth\":true,\"gap\":\"xl\",\"marginBottom\":\"40\",\"paddingX\":\"l\",\"children\":[[\"$\",\"$L1f\",\"fleetwatch\",{\"priority\":true,\"href\":\"/work/fleetwatch\",\"images\":[],\"title\":\"FleetWatch\",\"description\":\"A device management dashboard built for large Intune environments — fast search, real-time compliance status, and direct device actions without the native portal slowness.\",\"content\":\"$20\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/fleetwatch\"}],\"$L21\",\"$L22\",\"$L23\",\"$L24\",\"$L25\",\"$L26\",\"$L27\",\"$L28\",\"$L29\",\"$L2a\",\"$L2b\",\"$L2c\",\"$L2d\",\"$L2e\"]}]]}],\"$L2f\"]}]\n"])</script><script>self.__next_f.push([1,"3e:I[988654,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\"],\"ScrollToHash\"]\n30:T71c,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nA passion project built because hosting friends for coffee had become genuinely chaotic. Multiple orders, specific customizations, no memory of who asked for oat milk — it was more stressful than it should be.\n\nSo I built an order management system. Guests scan a QR code, see the menu, customize their order, and submit it. I get a kitchen display showing the queue with all the details. It sounds like overkill, and it is, but it works perfectly.\n\n## How it works\n\n**Guest side** — a mobile-first menu where guests choose their drink, add customizations (milk type, shots, temperature), and place the order. Loads instantly, no app install needed, works as a PWA if they want it on their home screen.\n\n**Host side (KDS)** — a kitchen display that shows the current queue. Orders appear immediately when placed, I can mark them as \"preparing\" or \"ready\", and the guest's screen updates in real time without a refresh.\n\nFirebase Firestore real-time snapshots handle the live updates — when an order status changes on the KDS, it propagates to the guest view in under a second.\n\n## What I actually learned from this\n\nFirebase Firestore's real-time subscriptions are genuinely good for this use case. The tricky part was handling the edge cases — what happens when the host closes the KDS while orders are in flight, stale order states, offline behavior. None of it was hard, but it required thinking through the state machine more carefully than the happy path suggests.\n\nAlso: the first version had a bug where two guests placing orders within milliseconds of each other could get the same order number. Fixed it with a Firestore transaction. Classic concurrency problem, embarrassingly obvious in retrospect.\n\n## Stack\n\n- Next.js 15 (App Router)\n- Bun\n- Firebase Firestore (real-time)\n- PWA\n"])</script><script>self.__next_f.push([1,"21:[\"$\",\"$L1f\",\"personal-coffeshop\",{\"priority\":true,\"href\":\"/work/personal-coffeshop\",\"images\":[],\"title\":\"Personal Coffeeshop\",\"description\":\"A full-stack order management system and kitchen display for home barista use — guests order via QR code, the host tracks and manages the queue in real time.\",\"content\":\"$30\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/Personal-coffeshop\"}]\n31:T749,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client running JumpCloud for MDM wanted to consolidate onto the Microsoft stack. Everything else was already in Microsoft — identity, email, security — but the device management gap meant correlating device state with identity required jumping between platforms.\n\n## What I built\n\nThe main challenge with MDM migrations is the transition gap — the window where a device is unenrolled from one MDM and not yet in another. During that time you lose policy enforcement and visibility.\n\nI wrote PowerShell scripts to handle the transition in sequence: unenroll from JumpCloud, trigger Intune enrollment, verify the device showed up in Intune before moving to the next. Ran in batches with rollback checkpoints so we could pause if something broke mid-migration.\n\n**Windows Autopilot** — registered the Windows fleet into Autopilot for zero-touch future provisioning. Extracted hardware hashes, uploaded them, configured deployment profiles per user group.\n\n**macOS via Apple Business Manager** — set up ABM integration with Intune. More involved than Windows Autopilot — had to work through the MDM profile trust chain and handle devices that had supervision issues from the JumpCloud side.\n\n**Policy parity** — translated JumpCloud's Command Library into Intune Configuration Profiles and PowerShell scripts deployed via Intune. Some mapped cleanly, some needed rethinking.\n\n## What made it hard\n\nA subset of devices had been enrolled in JumpCloud via a method that left a persistent MDM profile the script couldn't cleanly remove. Those had to be handled manually. Also found several macOS devices enrolled by users personally rather than via ABM, which broke the supervision requirement for certain policies.\n\n## Stack\n\n- Microsoft Intune\n- JumpCloud\n- Windows Autopilot\n- Apple Business Manager\n- PowerShell \u0026 Microsoft Graph API\n"])</script><script>self.__next_f.push([1,"22:[\"$\",\"$L1f\",\"jumpcloud-to-intune-migration\",{\"priority\":false,\"href\":\"/work/jumpcloud-to-intune-migration\",\"images\":[],\"title\":\"JumpCloud to Intune Migration\",\"description\":\"MDM consolidation from JumpCloud to Microsoft Intune — automated unenrollment, Autopilot provisioning, and policy parity for a mixed Windows and macOS fleet.\",\"content\":\"$31\",\"avatars\":[],\"link\":\"\"}]\n32:T6db,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client at Oncloud decided to move their entire identity and collaboration stack from Google Workspace to Microsoft 365. I was the lead engineer on the migration — responsible for technical execution from discovery through cutover.\n\n## What the work looked like\n\n**Identity migration** — mapped thousands of Google identities into a clean Entra ID tenant, standardized naming conventions, consolidated accounts that had duplicated from acquisitions. Set up SSO from scratch with Entra ID as the new IdP.\n\n**Data migration via AvePoint Fly** — handled mailbox and Google Drive to SharePoint/OneDrive transfer. The hard part wasn't the tool — it was the permission mapping. Google Drive's sharing model doesn't translate cleanly to SharePoint. Spent significant time building mapping rules to preserve access rather than just moving data and leaving people unable to open their files.\n\n**Mail cutover** — ran split-delivery during the transition so mail kept flowing to both platforms while users moved over. Managed the DNS cutover window to avoid gaps.\n\n**SSO re-mapping** — the client had 50+ SaaS applications pointed at Google as IdP. Reconfigured each for SAML/OIDC against Entra ID. Most were straightforward; a few needed custom attribute mappings.\n\n## What made it hard\n\nThe data migration took longer than scoped. The client's Google Drive was far messier than discovery suggested — deeply nested shared drives with complex permission inheritance, orphaned files, and accounts that no longer existed but still owned content. We had to build a pre-migration cleanup process that wasn't in the original plan.\n\n## Stack\n\n- AvePoint Fly\n- Microsoft Entra ID\n- Google Workspace APIs\n- Microsoft Graph API\n- PowerShell\n"])</script><script>self.__next_f.push([1,"23:[\"$\",\"$L1f\",\"gcp-to-entra-migration\",{\"priority\":false,\"href\":\"/work/gcp-to-entra-migration\",\"images\":[],\"title\":\"GCP to Entra ID Migration\",\"description\":\"Full identity and collaboration migration from Google Workspace to Microsoft 365 — mailboxes, Drive data, SSO re-mapping across 50+ apps, and tenant consolidation.\",\"content\":\"$32\",\"avatars\":[],\"link\":\"\"}]\n33:T9e2,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nMy personal Claude Code configuration that I've been refining since I started using it heavily for both security automation and portfolio work. The default Claude Code setup is fine. This is what happens after you use it seriously for a few months and start fixing the parts that annoy you.\n\n## The problem with default Claude Code\n\nTwo things break down quickly:\n\n1. **No memory across sessions.** Every new conversation starts cold. You re-explain your stack, your preferences, your project context. It adds up.\n\n2. **No workflow enforcement.** Claude will happily skip tests, write unsafe code, or use npm instead of bun if you don't have rules that say otherwise.\n\n## What I built\n\n**Session context system** — Four files per project (`context-goals.md`, `context-decisions.md`, `context-progress.md`, `context-gotchas.md`) that persist across sessions. A PreCompact hook assembles them before context gets trimmed. A SessionStart hook injects the summary at the start of every new session. Claude picks up where it left off.\n\n**Custom hooks** — Shell commands that fire on tool use events:\n- PostToolUse runs Prettier and tsc after every file edit\n- PreToolUse blocks dev servers from running outside a tmux session\n- EvaluateSession extracts patterns at session end\n- SuggestCompact warns when approaching context limits\n\n**Agent definitions** — Specialized agents for recurring tasks: planner, tdd-guide, code-reviewer, security-reviewer, build-error-resolver. Each has a focused role and gets invoked for the right thing rather than dumping everything at the main agent.\n\n**Skills** — Reusable command prompts: `/plan`, `/verify`, `/simplify`, `/commit-push-pr`, `/learn`. The verify skill runs tsc → lint → tests → build in order and stops on first failure.\n\n**Global rules** — Coding style, git workflow, security checklist, package manager preferences (bun, not npm), test coverage minimums. Claude reads these on every session and actually follows them.\n\n## What it actually changed\n\nI stopped re-explaining my stack. I stopped getting npm in projects that use bun. Security checks happen before commits without me prompting. The context system means I can close a session mid-task and come back three days later without losing where I was.\n\nIt's not magic — it's just configuration that enforces the workflow I actually want.\n\n## Stack\n\n- Claude Code hooks (bash scripts)\n- CLAUDE.md (global + per-project)\n- Session context (4 markdown files per project)\n- Custom agents + skills\n"])</script><script>self.__next_f.push([1,"24:[\"$\",\"$L1f\",\"claude-code-config\",{\"priority\":false,\"href\":\"/work/claude-code-config\",\"images\":[],\"title\":\"Claude Code Config\",\"description\":\"My production Claude Code setup — custom hooks, agents, skills, and session context system that makes AI-assisted development actually sustainable day-to-day.\",\"content\":\"$33\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/claude-code-config\"}]\n34:T748,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client engagement at Oncloud. The organization was running a perimeter-based model that hadn't kept up with their shift to remote work — unmanaged personal devices accessing corporate data, weak auth, no consistent security baseline across Windows, macOS, and mobile.\n\nThe goal: every device accessing M365 should be known, enrolled, compliant, and continuously verified.\n\n## What I did\n\n**Intune security baselines** — deployed Microsoft's baselines as a starting point, then layered custom CSPs for BitLocker enforcement and EDR sensor requirements. Built a compliance engine that automatically blocks M365 access for non-compliant devices.\n\n**Conditional Access redesign** — audited the existing CA policies (there weren't many good ones), rebuilt from scratch. Enforced phishing-resistant MFA (FIDO2) and required a compliant device signal before accessing sensitive workloads. Took several iterations to get right without locking people out.\n\n**Defender for Endpoint onboarding** — automated EDR onboarding across 10,000+ endpoints via Intune. Tuned alert configuration to reduce noise before handoff.\n\n**Hardware attestation** — enforced TPM-based attestation and Secure Boot across the Windows fleet. Trickier with mixed hardware generations than it sounds.\n\n**Exchange Online and MAM** — tightened mail-flow rules and deployed Mobile Application Management policies so corporate data couldn't leave via personal apps on unmanaged phones.\n\n## What made it hard\n\nConditional Access is easy to get wrong in both directions. The first FIDO2 rollout broke access for users on older hardware that didn't support it. We ran a grace period with fallback MFA while hardware was replaced — unplanned but necessary.\n\n## Stack\n\n- Microsoft Intune\n- Microsoft Entra ID\n- Defender for Endpoint (XDR)\n- PowerShell \u0026 Microsoft Graph API\n"])</script><script>self.__next_f.push([1,"25:[\"$\",\"$L1f\",\"zero-trust-endpoint-hardening\",{\"priority\":false,\"href\":\"/work/zero-trust-endpoint-hardening\",\"images\":[],\"title\":\"Zero-Trust Endpoint Hardening\",\"description\":\"End-to-end Zero-Trust rollout for a client fleet — Intune security baselines, Conditional Access redesign, EDR onboarding, and hardware attestation for 10k+ endpoints.\",\"content\":\"$34\",\"avatars\":[],\"link\":\"\"}]\n35:T5cd,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nA focused automation tool built at Oncloud. The problem: organizations using HiBob as their HRIS source of truth had employee photos sitting in HiBob that weren't making it to Microsoft Teams or Entra ID profiles. IT kept getting tickets about it. The options were either do it manually or use a third-party sync service that required excessive permissions.\n\nI built a self-hosted alternative that runs entirely within the client's own infrastructure using their own App Registrations.\n\n## How it works\n\nPulls profile images from the HiBob API, compares image hashes against what's currently set in Entra ID, and pushes updates via Microsoft Graph only when something has actually changed. Minimizes unnecessary API calls and creates a full audit log of every sync operation.\n\nBuilt in two runtimes — PowerShell 7+ for IT admins who want to run it manually or schedule it via Task Scheduler, and TypeScript/Bun for automated pipeline use in Azure Automation or GitHub Actions.\n\n## Why self-hosted matters here\n\nProfile photo sync sounds like a small thing, but it touches identity data for every employee. Third-party SaaS tools that offer this typically require broad Graph API permissions and store data in their own cloud. This tool uses only the permissions it needs, and nothing leaves the client's environment.\n\n## Stack\n\n- TypeScript (Bun) and PowerShell 7+\n- Microsoft Graph API\n- HiBob API\n- Compatible with Azure Automation, GitHub Actions, or local CRON\n"])</script><script>self.__next_f.push([1,"26:[\"$\",\"$L1f\",\"hibob-teams-sync\",{\"priority\":false,\"href\":\"/work/hibob-teams-sync\",\"images\":[],\"title\":\"HiBob Teams Sync\",\"description\":\"Automation tool that keeps employee profile photos in sync between HiBob (HRIS) and Microsoft Teams/Entra ID — no third-party services, runs in your own infrastructure.\",\"content\":\"$35\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/HiBob-Teams-Sync\"}]\n36:T69a,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nA companion to FleetWatch, built for analytical depth rather than day-to-day fleet operations. Where FleetWatch is fast search and direct device actions, this is compliance trend analysis, cross-fleet aggregations, and audit reporting.\n\nBuilt for environments where the data volume makes native Intune reporting impractical.\n\n## Why OpenSearch\n\nAt 50,000+ devices with hundreds of properties each, the queries that matter for security auditing — \"show me all Windows 10 devices with BitLocker disabled, sorted by last sync time, filtered by region\" — are aggregation queries that relational databases handle poorly at this scale. OpenSearch handles them well and the full-text search is a side benefit.\n\n## What it does\n\n**Elastic search across the fleet** — complex boolean queries on device state. Find devices by any combination of properties in milliseconds.\n\n**Compliance heatmaps** — visualize non-compliant devices by location, department, or OS version. Useful for spotting systemic issues rather than individual device problems.\n\n**Trend analysis** — compliance over time per policy. Shows whether a remediation effort actually worked, or whether drift is recurring.\n\n**Audit exports** — CSV/PDF compliance reports for regulatory requirements. The kind of thing that used to take someone a day to compile manually.\n\n## How data stays current\n\nNode.js workers run continuous sync from Microsoft Graph, pulling device state and pushing updates to OpenSearch. The data is fresh enough for security auditing purposes without hammering the Graph API rate limits.\n\n## Stack\n\n- Next.js\n- OpenSearch (AWS Managed)\n- TypeScript / Node.js\n- Microsoft Graph API\n"])</script><script>self.__next_f.push([1,"27:[\"$\",\"$L1f\",\"device-inventory-analytics\",{\"priority\":false,\"href\":\"/work/device-inventory-analytics\",\"images\":[],\"title\":\"Device Inventory Analytics\",\"description\":\"A high-scale device analytics platform for large Intune environments — OpenSearch-powered full-text search, compliance heatmaps, and aggregated reporting across 50,000+ assets.\",\"content\":\"$36\",\"avatars\":[],\"link\":\"\"}]\n37:T70d,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nA collection of production n8n workflows I've built and iterated on for client work at Oncloud. Not a demo library — these run on actual client environments and handle real operational tasks.\n\n## What's in it\n\n**Security incident enrichment** — when a Sentinel alert fires, automatically pull context from VirusTotal, AbuseIPDB, and Entra ID risk scores. The analyst gets a pre-enriched package instead of starting from scratch on every alert. Cuts the \"what is this IP?\" lookup step out of triage entirely.\n\n**Identity lifecycle** — listens to HR events from HiBob (new hire, termination, role change) and triggers the corresponding Entra ID actions automatically. Provisioning, deprovisioning, group membership changes — all handled without an IT ticket.\n\n**License auditing** — scans for unassigned M365 licenses and dormant user accounts on a schedule, generates a report, and creates remediation tasks. The kind of thing that saves money but never gets done manually because it's tedious.\n\n**Incident notification routing** — routes alerts to the right channel (Teams, Slack, email, PagerDuty) based on severity and type. Sounds simple, but getting the routing logic right for different client environments required more iteration than expected.\n\n## What I learned building these\n\nn8n is genuinely good for this kind of work but error handling in production requires discipline. If a workflow fails silently at 3am because an API returned an unexpected shape, you don't find out until someone asks why something didn't happen. Every critical workflow now has explicit error branches and failure notifications.\n\n## Stack\n\n- n8n (self-hosted)\n- Azure Logic Apps (for some client environments)\n- Microsoft Graph API\n- Microsoft Sentinel\n- HiBob, VirusTotal, AbuseIPDB APIs\n"])</script><script>self.__next_f.push([1,"28:[\"$\",\"$L1f\",\"n8n-automation-workflows\",{\"priority\":false,\"href\":\"/work/n8n-automation-workflows\",\"images\":[],\"title\":\"n8n Automation Workflows\",\"description\":\"A library of n8n workflows built for real SecOps and IT ops use cases — alert enrichment, identity lifecycle, license auditing, and incident notification.\",\"content\":\"$37\",\"avatars\":[],\"link\":\"\"}]\n38:T6af,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nA pipeline tool I built to solve a recurring problem with RAG systems: the source data quality. Embedding documentation that still has navigation bars, cookie banners, and sidebar content mixed in produces retrieval results that are noisier than they should be.\n\nThis tool crawls a documentation site and outputs clean, structured Markdown that's actually ready to embed.\n\n## The pipeline\n\n**Discover** — maps the site using sitemaps and recursive link discovery.\n\n**Crawl** — uses Firecrawl to handle JavaScript-heavy documentation sites (SPAs that don't render content without JS execution are a common problem for simple scrapers).\n\n**Clean** — strips navigation, footers, sidebars, and other non-content elements. Preserves code blocks, heading hierarchy, and inline formatting.\n\n**Export** — outputs Markdown with YAML frontmatter including source URL, crawl timestamp, and category tags.\n\n## Why heading hierarchy matters\n\nRAG systems chunk documents before embedding. If a chunk loses its heading context — if you can't tell what section a paragraph belongs to — retrieval becomes less accurate because the chunk looks the same whether it's a warning note or a main concept. Preserving the heading structure makes chunking strategies more effective.\n\n## What I use it for\n\nKeeping RAG datasets current for Project Aegis. Documentation changes — API references especially — and stale embeddings quietly degrade retrieval quality. Scheduled re-crawls keep the vector store up to date without manual intervention.\n\n## Stack\n\n- TypeScript and Bash\n- Firecrawl (headless browser crawling)\n- Markdown with YAML frontmatter\n- Compatible with LangChain and LlamaIndex pipelines\n"])</script><script>self.__next_f.push([1,"29:[\"$\",\"$L1f\",\"doc-crawler-ai-organizer\",{\"priority\":false,\"href\":\"/work/doc-crawler-ai-organizer\",\"images\":[],\"title\":\"Doc-Crawler AI\",\"description\":\"A documentation pipeline that crawls technical docs sites and converts them to clean, structured Markdown optimized for RAG ingestion — handles SPAs, strips noise, preserves heading hierarchy.\",\"content\":\"$38\",\"avatars\":[],\"link\":\"\"}]\n39:T647,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nA maintenance automation tool I wrote because I got tired of running different update commands on different machines. One script that handles `apt`, `dnf`, `pacman`, `brew`, `npm`, `pip` — whatever's present on the system — with consistent logging and safe execution defaults.\n\nRuns unattended. Doesn't hang waiting for user input. Doesn't overwrite config files without asking. Keeps timestamped logs so you can see what actually happened.\n\n## Why I built it instead of using something existing\n\nMost existing solutions are either too opinionated (full configuration management like Ansible is overkill for this) or too simple (a cron job with `apt upgrade -y` has no error handling). I wanted something in between — lightweight, readable Bash that does the job reliably and can be understood and modified without reading documentation.\n\n## How it works\n\n**Core + Modules architecture** — the core script handles argument parsing, logging, environment detection, and concurrency control (lockfile to prevent simultaneous runs). Each package manager is a separate module that the core calls if that manager is present on the system.\n\n**Execution modes** — `--check-only` to see what would update without doing it, `--security-only` for security patches only, `--reboot` on Linux systems that need a restart after kernel updates.\n\n**Scheduled via native tools** — `onboard.sh` sets up a Cron job on Linux or a Launchd agent on macOS so it runs automatically on whatever schedule you want.\n\n## Stack\n\n- Bash\n- `flock`, `getopt`, `mail`\n- apt, dnf, pacman, zypper, brew, npm, pip\n"])</script><script>self.__next_f.push([1,"2a:[\"$\",\"$L1f\",\"unix-update-automator\",{\"priority\":false,\"href\":\"/work/unix-update-automator\",\"images\":[],\"title\":\"Unix Update Automator\",\"description\":\"A Bash automation suite for keeping Linux and macOS systems current — handles package managers, runtime updates, logging, and scheduled execution without manual intervention.\",\"content\":\"$39\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/unix-update-automator\"}]\n3a:T71f,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nMy dotfiles repo. Not a flex — just a practical answer to the question \"how long does it take to get a new machine to a working state?\" The answer used to be a few hours of guesswork. Now it's one command and a coffee break.\n\n## What's in it\n\n**zsh config** — aliases, functions, prompt (Starship), history settings. Nothing exotic, but all the shortcuts I actually use are there rather than rebuilt from memory each time.\n\n**Zed settings** — editor config, keybindings, theme. Zed is my main editor and its settings are JSON, so they're version-controllable like anything else.\n\n**tmux config** — prefix key, pane navigation, session restore. I run everything in tmux (dev servers, long builds, Claude Code sessions) so this matters.\n\n**Homebrew bundle** — `Brewfile` with all the tools I want on a fresh macOS install. `brew bundle` installs everything in one shot.\n\n**Bootstrap script** — `install.sh` that symlinks dotfiles, installs Homebrew + packages, sets zsh as default shell, and drops everything in the right place. Idempotent — safe to run on an existing machine.\n\n## Why bother\n\nThe obvious reason is new machine setup. Less obvious: dotfiles in version control means you can see when you changed something and why, revert when you break something, and share setups between machines without drift.\n\nThe Brewfile is particularly useful — it's easy to forget what you've installed on a machine until something breaks because it's missing on a different one.\n\n## What it doesn't do\n\nIt's not a full system configuration management setup. No Ansible, no Nix. If I need something that complex I'll reach for those tools, but for personal machines this is the right scope.\n\n## Stack\n\n- Bash (bootstrap script)\n- GNU Stow (symlink management)\n- Homebrew + Brewfile\n- Starship prompt\n"])</script><script>self.__next_f.push([1,"2b:[\"$\",\"$L1f\",\"dotfiles\",{\"priority\":false,\"href\":\"/work/dotfiles\",\"images\":[],\"title\":\"Dotfiles\",\"description\":\"My dev environment as code — zsh, Zed, tmux, and tooling configuration managed in a single repo with a bootstrap script that sets up a new machine in one command.\",\"content\":\"$3a\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/dotfiles\"}]\n3b:T6a9,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nA personal project exploring what a real multi-agent system looks like in practice. The idea: instead of one general-purpose AI assistant trying to do everything, a central orchestrator (Buddy) routes work to specialized agents — each with their own instructions, toolset, and context.\n\n29+ agents total. Things like `github-manager`, `security-scanner`, `code-reviewer`, `doc-writer`. Each is a separate configuration that Buddy loads dynamically based on what the task needs.\n\n## Why MCP\n\nModel Context Protocol gives agents a standardized way to expose tools. Instead of every agent needing custom integration code, they publish tools through MCP and any orchestrator can discover and call them. It's what makes the routing actually work — Buddy doesn't need to know the implementation details of each agent, just what tools it offers.\n\n## How it works\n\nTasks come in to Buddy. Buddy analyzes what's needed, spawns the right agent(s), hands off context, and coordinates the results. Agents can hand off to each other — a scanner finding a vulnerability can trigger the coder agent to write a fix, which triggers the reviewer agent to validate it.\n\nState persists through a Context Hub so long-running tasks don't lose progress between sessions.\n\n## What I was actually trying to figure out\n\nWhether specialized agents produce meaningfully better results than a single agent with a long system prompt. The answer is yes, but with caveats — the routing logic matters a lot, and getting agents to hand off cleanly without losing context is harder than it sounds. Still iterating on that.\n\n## Stack\n\n- Bun (runtime)\n- Google Gemini SDK\n- Model Context Protocol (MCP)\n- TypeScript\n"])</script><script>self.__next_f.push([1,"2c:[\"$\",\"$L1f\",\"dev-team\",{\"priority\":false,\"href\":\"/work/dev-team\",\"images\":[],\"title\":\"Dev Team AI\",\"description\":\"A multi-agent orchestration framework using MCP — 29+ specialized agents coordinated by a central orchestrator to handle complex development and security tasks autonomously.\",\"content\":\"$3b\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/dev-team\"}]\n3c:T7a4,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nMy home lab, documented and version-controlled. It runs on a dedicated server (not the Orange Pi — that's for IoT experiments), orchestrated with Docker Swarm. The goal was to build something I'd trust to run unattended and that I could actually learn from rather than just copy-paste from a tutorial.\n\n## Why Swarm over Compose or Kubernetes\n\nKubernetes is overkill for one server. Plain Compose works but doesn't give you health-based restarts or easy service redeployment. Swarm hits the right balance — proper orchestration primitives without the operational overhead. It's been running with no manual intervention for over a year.\n\n## How it's structured\n\nEverything is network-segmented. External traffic comes in through Traefik on 80/443 — it handles Let's Encrypt SSL automatically and routes to the right service based on hostname. Backend services talk to each other over internal overlay networks and have no external exposure.\n\nSecrets are managed through Infisical, not environment variables in Compose files. Took some extra setup but means I'm not looking at plaintext secrets in a git repo.\n\n## What runs on it\n\n- **Traefik** — edge router, SSL termination, service discovery\n- **n8n** — workflow automation, connected to various APIs\n- **Infisical** — secrets management for the whole stack\n- **Portainer** — Swarm management UI\n- **Firecrawl** — documentation crawling for AI projects\n- **SearXNG** — self-hosted metasearch\n\n## What didn't go smoothly\n\nThe first version had everything in one large Compose file. Adding a new service meant touching the global config and risking breaking something else. Refactored to a modular stack-per-service structure — each service lives in its own folder with its own Compose file and connects to the shared `proxy-net` for ingress. Much easier to maintain and deploy independently.\n\n## Stack\n\n- Docker Swarm\n- Traefik\n- Infisical\n- Ubuntu Server / Portainer\n"])</script><script>self.__next_f.push([1,"2d:[\"$\",\"$L1f\",\"homelab-swarm-stack\",{\"priority\":false,\"href\":\"/work/homelab-swarm-stack\",\"images\":[],\"title\":\"HomeLab Swarm Stack\",\"description\":\"My self-hosted infrastructure running on a home server — Docker Swarm, Traefik for ingress, Infisical for secrets, and a handful of services I actually use.\",\"content\":\"$3c\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/homelab-swarm-stack\"}]\n3d:T63c,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nA CLI tool for Microsoft 365 administration built with Bun and TypeScript. The Microsoft Admin Center works fine for one-off tasks — it's painful for anything that needs to run across thousands of users or be scripted into a pipeline.\n\nThis fills the gap: a scriptable, terminal-native interface to the Microsoft Graph API with commands designed around how M365 administration actually works day-to-day.\n\n## What it does\n\n**Bulk identity operations** — provision, deprovision, or update thousands of users with a single command. Useful for onboarding, offboarding, or making org-wide attribute changes without clicking through the portal for each one.\n\n**Policy export/import** — export Conditional Access policies and other security configurations to JSON. Treat your policies as code: version control them, diff them, apply them to other tenants.\n\n**License optimization** — identify unassigned licenses and inactive users. The kind of audit that saves money but nobody runs manually because it takes too long in the portal.\n\n**Audit log streaming** — filter and stream audit logs to the terminal in real time. Useful during incident investigation when you need to follow what's happening now.\n\n## Why Bun\n\nStartup time matters for a CLI. Bun is fast enough that the tool feels instant — no waiting for a Node.js process to boot before anything happens.\n\n## Status\n\nWork in progress. Core identity and license commands are solid. Adding modules for Intune management and deeper security auditing.\n\n## Stack\n\n- Bun\n- TypeScript\n- Commander.js\n- Microsoft Graph SDK\n"])</script><script>self.__next_f.push([1,"2e:[\"$\",\"$L1f\",\"o365-cli\",{\"priority\":false,\"href\":\"/work/o365-cli\",\"images\":[],\"title\":\"o365-cli\",\"description\":\"A TypeScript CLI for M365 administration — bulk identity operations, policy export/import, license auditing, and audit log streaming, all from the terminal.\",\"content\":\"$3d\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/o365-cli\"}]\n2f:[\"$\",\"$L3e\",null,{}]\n"])</script><script>self.__next_f.push([1,"3f:I[811052,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\"],\"HeadingLink\"]\n40:I[597784,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\"],\"CodeBlock\"]\n41:I[362844,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\"],\"InlineCode\"]\n42:I[436122,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\"],\"List\"]\n43:I[626935,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\"],\"ListItem\"]\n"])</script><script>self.__next_f.push([1,"1d:[[\"$\",\"$L3f\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-this-is\",\"children\":\"What this is\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"A home lab side project. I wanted air quality monitoring in my workspace and didn't want to use a proprietary device that locks data behind an app. So I wired up a Bosch BME680 sensor to an Orange Pi 3 LTS and built the monitoring stack myself.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Tracks temperature, humidity, pressure, gas resistance, dew point, and heat index. Outputs structured JSON every 2 seconds, ready to pipe into InfluxDB, an ELK stack, or just log to disk.\"}],\"\\n\",[\"$\",\"$L3f\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"why-a-dynamic-baseline-matters\",\"children\":\"Why a dynamic baseline matters\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Raw gas resistance from the BME680 is meaningless without context — the number means different things depending on the sensor's warm-up state and ambient conditions. The system runs a 120-second warmup on startup, establishes a moving-average baseline, then calculates an air quality score (0–100) relative to that baseline. The score is actually useful rather than just a raw ohm reading.\"}],\"\\n\",[\"$\",\"$L3f\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-the-output-looks-like\",\"children\":\"What the output looks like\"}],\"\\n\",[\"$\",\"$L40\",null,{\"marginTop\":\"8\",\"marginBottom\":\"16\",\"codes\":[{\"code\":\"{\\n  \\\"temperature_c\\\": 31.04,\\n  \\\"humidity_rh\\\": 68.55,\\n  \\\"gas_baseline_ohms\\\": 42150.5,\\n  \\\"air_quality_score\\\": 52.3,\\n  \\\"dew_point_c\\\": 24.75,\\n  \\\"heat_index_c\\\": 34.47,\\n  \\\"baseline_established\\\": true\\n}\\n\",\"language\":\"json\",\"label\":\"Json\"}],\"copyButton\":true}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Deployed as a Docker container with hardware access via privileged mode — whole thing starts with \",[\"$\",\"$L41\",null,{\"children\":\"docker compose up\"}],\".\"]}],\"\\n\",[\"$\",\"$L3f\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"one-gotcha-worth-noting\",\"children\":\"One gotcha worth noting\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Position the BME680 away from the Orange Pi's CPU. I didn't, and the first week of temperature readings were 4–5°C too high. Moved it to a separate mount on the case and readings normalized.\"}],\"\\n\",[\"$\",\"$L3f\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"stack\",\"children\":\"Stack\"}],\"\\n\",[\"$\",\"$L42\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L43\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Python with Adafruit CircuitPython/Blinka\"}],\"\\n\",[\"$\",\"$L43\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Docker \u0026 Docker Compose\"}],\"\\n\",[\"$\",\"$L43\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Orange Pi 3 LTS (ARM64)\"}],\"\\n\",[\"$\",\"$L43\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Bosch BME680 via I2C\"}],\"\\n\"]}]]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"44:I[27201,[\"/resume/_next/static/chunks/d96012bcfc98706a.js\",\"/resume/_next/static/chunks/73e3194f06db260e.js\"],\"IconMark\"]\n8:null\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"title\",\"0\",{\"children\":\"Air Quality Automation\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"A Docker-based environmental monitoring system running on Orange Pi 3 LTS — BME680 sensor, dynamic air quality scoring, and structured JSON telemetry ready for any dashboard.\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"Air Quality Automation\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"A Docker-based environmental monitoring system running on Orange Pi 3 LTS — BME680 sensor, dynamic air quality scoring, and structured JSON telemetry ready for any dashboard.\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:url\",\"content\":\"https://rohirik.github.io/resume/work/air-quality-automation\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:image\",\"content\":\"https://rohirik.github.io/resume/images/avatar.png\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:image:alt\",\"content\":\"Air Quality Automation\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:type\",\"content\":\"website\"}],[\"$\",\"meta\",\"8\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"9\",{\"name\":\"twitter:title\",\"content\":\"Air Quality Automation\"}],[\"$\",\"meta\",\"10\",{\"name\":\"twitter:description\",\"content\":\"A Docker-based environmental monitoring system running on Orange Pi 3 LTS — BME680 sensor, dynamic air quality scoring, and structured JSON telemetry ready for any dashboard.\"}],[\"$\",\"meta\",\"11\",{\"name\":\
