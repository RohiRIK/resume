s/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/9988c4a59e44ac76.js\",\"/_next/static/chunks/720d3f3cc420c663.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"Providers\"]\n28:I[394412,[\"/_next/static/chunks/4229be1c600ccf6d.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/9988c4a59e44ac76.js\",\"/_next/static/chunks/720d3f3cc420c663.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"Background\"]\n29:I[521247,[\"/_next/static/chunks/4229be1c600ccf6d.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/9988c4a59e44ac76.js\",\"/_next/static/chunks/720d3f3cc420c663.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"ClientFlex\"]\n2a:I[402971,[\"/_next/static/chunks/4229be1c600ccf6d.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/9988c4a59e44ac76.js\",\"/_next/static/chunks/720d3f3cc420c663.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"Header\"]\n2b:I[1166,[\"/_next/static/chunks/4229be1c600ccf6d.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/9988c4a59e44ac76.js\",\"/_next/static/chunks/720d3f3cc420c663.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"RouteGuard\"]\nb:[\"$\",\"$L7\",null,{\"fillWidth\":true,\"paddingRight\":\"64\",\"children\":[\"$\",\"$L8\",null,{\"maxWidth\":48}]}]\n16:T1f74,"])</script><script>self.__next_f.push([1,"\nThe brief arrived in a Teams message. The IT team was managing hundreds of Windows devices through Microsoft Intune and they had no good way to answer a simple question: what's actually out there, and what state is it in?\n\nTheir proposed solution: a PowerShell script triggered by Jenkins, pulling device data from the Intune API and writing it to SharePoint lists. Power BI would sit on top and refresh on a schedule. Dashboards, filters, the works.\n\nIt's a reasonable ask. It's how a lot of IT shops solve this problem. They've got the pieces — Intune, SharePoint, Power BI — and they want to wire them together. The request made sense for where they were.\n\nI said I'd get back to them with a proposal.\n\n## The Ceiling\n\nI spent a day mapping out the pipeline they'd asked for. And the more I built it in my head, the more I saw where it would break.\n\n**SharePoint as a database** is the first problem. SharePoint lists have a 5,000-item view threshold — not a hard limit, but enough to start causing issues at scale. There's no real schema enforcement, no foreign keys, no joins. You end up denormalizing everything and hoping the refresh writes are idempotent. When they're not, you get stale rows and duplicate entries that Power BI dutifully surfaces as real data.\n\n**Jenkins as a scheduler** is infra for infra's sake. You're running a CI/CD system to run a cron job. That means maintaining an agent, managing credentials, monitoring for failed runs, building retry logic from scratch. When the sync breaks at 2am, nobody knows until someone notices the dashboards haven't updated.\n\n**Power BI on a schedule** means the data is stale by definition. If your refresh runs every four hours and a device falls out of compliance at 9am, your dashboard won't show it until 1pm. For a compliance and security use case, that gap matters.\n\nAnd there was no RBAC anywhere in this design. Anyone with SharePoint access could see everything — all devices, all users, all compliance states. Helpdesk techs, managers, contractors. No audit trail of who looked at what.\n\nBut the deepest problem wasn't architectural. The client didn't actually want a pipeline. They wanted **device visibility**. They wanted to know what was out there and whether it was healthy. The pipeline was just the closest solution shape they knew how to ask for.\n\n## The Pitch\n\nI came back with a counter-proposal.\n\nInstead of a pipeline, I pitched a purpose-built web app: FleetWatch. The sell was simple — you'll stop asking \"is this data current?\" because it always will be.\n\nSpecifically:\n- Real-time sync via Microsoft Graph API delta queries, pulling only changed devices instead of exporting everything on a schedule\n- Postgres as the data store — real schema, real queries, real relational data\n- RBAC built in from day one: admins see everything, helpdesk sees their assigned devices\n- Full audit logs of who accessed what and when\n- A proper UI instead of a Power BI dashboard that takes 30 seconds to load and can't drill into a single device\n\nThe client said yes. Partly because the technical argument was sound, and partly because I had mocked up what the device detail page would look like. It's easier to approve something you can see.\n\n## The Architecture\n\nThe core of FleetWatch is the Microsoft Graph API integration.\n\nAuthentication uses a Service Principal with Client Certificate auth — no client secrets that expire. The key endpoint is `/deviceManagement/managedDevices/delta`, which supports delta queries: on first run you get all devices, on subsequent runs you only get devices that changed since your last sync token. Instead of exporting 800 devices every four hours, you're processing 12 changed devices every 30 minutes.\n\nThe sync runs on Vercel Cron jobs. No Jenkins, no agents, no infra to maintain. The cron endpoint is protected with a shared secret header — simple, effective. Failed syncs surface in application logs, not in a Jenkins console that nobody checks.\n\nThe data layer is Postgres on Vercel with Drizzle ORM. The schema models the actual domain: a `devices` table, a `users` table, `compliance_policies`, `app_inventory`, `security_hardware`. When you need to answer \"which devices have BitLocker disabled and are assigned to users in the Finance department,\" that's a join, not a SharePoint list crawl.\n\nThe frontend is Next.js 15 with the App Router. Server Components handle the heavy lifting — device lists, compliance views, filtered queries all render server-side. The device detail page has six tabs: Overview, Compliance, Configuration, Security, Hardware, and Network. Each tab queries only the data it needs.\n\n```\nBefore (proposed):\nJenkins → PowerShell → SharePoint Lists → Power BI (scheduled refresh)\n\nAfter (FleetWatch):\nVercel Cron → Microsoft Graph API → Postgres → Next.js (real-time)\n```\n\nAuth is NextAuth with role-based access enforced at the API layer. The middleware checks roles before any data query runs — not just in the UI, where it's trivial to bypass. Admin and read-only roles are stored per-user in the database, not inferred from SharePoint group membership.\n\nMonitoring is a `/api/health` endpoint that checks database connectivity and last successful sync time, plus a `/api/metrics` endpoint for the operational stats I actually care about: sync duration, devices processed, error rate. Redis is wired in as an optional cache layer for the dashboard aggregate queries.\n\n## What It Enables\n\nThe gap between the pipeline and the app isn't cosmetic — it's functional.\n\nSearch and filter across all 800 devices returns results in under 100ms. You can filter by compliance state, OS version, last sync time, assigned user, or any combination. In Power BI with a scheduled refresh, you're waiting for a report to load and hoping it reflects reality.\n\nThe device detail page shows everything in one place: BitLocker status, TPM chip version, Secure Boot state, assigned compliance policies, installed applications, network adapters. That level of detail doesn't exist in the SharePoint list model — you'd need separate lists for each entity and a Power BI data model to join them, which you'd then need to maintain.\n\nRBAC means helpdesk techs can look up devices without needing SharePoint permissions across the entire tenant. No permissions sprawl, no \"just give them read access to the list.\" You grant a role in FleetWatch and that's it.\n\nThe export function lets you pull filtered device lists to CSV — useful for compliance reporting, vendor audits, or just sending a list of non-compliant devices to the right team. It works on whatever filter you've currently applied, so you're exporting exactly what you're looking at.\n\nCompliance trend graphs show state over time from the sync history, not from a Power BI snapshot that was current when the report was built. When a device falls out of compliance and comes back, you can see when both events happened.\n\n## The Lesson\n\nScripts are the right first tool when scope is unclear. If the client had wanted a one-time export to audit their device inventory, the PowerShell approach would have been exactly right. Fast to build, no ongoing maintenance, done.\n\nBut when the real problem is ongoing visibility — and when the solution needs RBAC, audit logs, freshness guarantees, and drill-down — the pipeline approach has a ceiling. It would have worked for three months. Then the IT team would have been back asking for user lookup, filtered exports, freshness indicators, device-level detail. The pipeline would have been extended with more scripts, more SharePoint lists, more Power BI datasets. Each addition would have made the system more fragile and harder to reason about.\n\nBuilding FleetWatch upfront was a harder conversation to have, but it was the right one. The client got a system that solves the problem they actually had — not the problem they knew how to articulate.\n\nThe source is on GitHub at [RohiRIK/FleetWatch](https://github.com/RohiRIK/FleetWatch) if you want to see how it's put together.\n"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L7\",null,{\"fillWidth\":true,\"gap\":\"24\",\"marginTop\":\"40\",\"s\":{\"direction\":\"column\"},\"children\":[[\"$\",\"$L7\",null,{\"flex\":1,\"paddingLeft\":\"l\",\"paddingTop\":\"24\",\"children\":[\"$\",\"h2\",null,{\"className\":\"font-display font-strong font-xs neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Latest writing\"}]}],[\"$\",\"$L7\",null,{\"flex\":3,\"paddingX\":\"20\",\"children\":[\"$\",\"$L14\",null,{\"columns\":\"2\",\"s\":{\"columns\":1},\"fillWidth\":true,\"marginBottom\":\"40\",\"gap\":\"16\",\"children\":[[\"$\",\"$L15\",\"fleetwatch-from-script-to-system\",{\"post\":{\"metadata\":{\"title\":\"From Script to System: How I Turned a Jenkins Pipeline into FleetWatch\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-04\",\"summary\":\"My client wanted PowerShell scripts dumping Intune data into SharePoint for Power BI. I built a web app instead. Here's why — and how.\",\"image\":\"/images/blog/fleetwatch-from-script-to-system.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"fleetwatch-from-script-to-system\",\"content\":\"$16\"},\"thumbnail\":false,\"direction\":\"$undefined\"}],\"$L17\",\"$L18\"]}]}]]}]\nd:[\"$\",\"$L7\",null,{\"fillWidth\":true,\"paddingLeft\":\"64\",\"horizontal\":\"end\",\"children\":[\"$\",\"$L8\",null,{\"maxWidth\":48}]}]\n1a:T10a2,"])</script><script>self.__next_f.push([1,"\n## What it is\n\nA SOC assistant I built on my own time. The idea was simple: stop digging through documentation every time an alert fires and just ask a question in plain English.\n\nThe core is a RAG pipeline — Pinecone as the vector store, LangChain managing the retrieval and chains, Gemini 1.5 Pro doing the reasoning. It ingests security documentation, playbooks, and telemetry context, and surfaces relevant answers in seconds instead of minutes of manual searching.\n\nIt's not a product. It's a personal project that I run against real data and actually use.\n\n## Why I built it\n\nI work in security operations. A lot of the slow parts of alert triage aren't complex thinking — they're retrieval. Finding the right playbook, checking what a particular indicator means in this environment, confirming whether a behavior is expected for a given user. That's lookup work, and lookup work is exactly what RAG is good at.\n\nI wanted to see how much of that I could automate without the output becoming something you can't trust. That second part turned out to be the hard part.\n\n## How it works\n\n\u003cGrid columns=\"2\" gap=\"16\"\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"search\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eRetrieval\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eSecurity documentation and playbooks embedded into Pinecone. Queries pull the most relevant context before anything goes to the model.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"shield\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eReasoning\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eGemini 1.5 Pro handles the actual analysis — big context window matters here when you're passing in multiple documents at once.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"terminal\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eActions\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eHigh-confidence responses can trigger Logic Apps integrations — account isolation, ticket creation, analyst notification.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"openai\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eInterface\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003ePlain English queries. Ask about an alert, a user, a behavior pattern — no structured query language needed.\u003c/Text\u003e\n    \u003c/Card\u003e\n\u003c/Grid\u003e\n\n## Stack\n\n- **Orchestration**: LangChain — manages retrieval chains and the agentic loop\n- **Model**: Google Gemini 1.5 Pro — large context window was the deciding factor over GPT-4\n- **Vector store**: Pinecone — low-latency retrieval at scale\n- **Integrations**: Microsoft Sentinel, Defender XDR, Azure Logic Apps\n\n## What actually worked\n\nThe retrieval speed was genuinely good from the start. Once the embeddings were in Pinecone, lookup latency was fast enough that the bottleneck shifted entirely to the model response time, which is what you want.\n\nThe natural language interface worked better than I expected for well-defined questions — \"what's the expected login behavior for this user?\", \"show me playbook steps for lateral movement detection\" — that kind of thing.\n\n## What didn't\n\nHallucination in forensic context is a real problem. Early versions would confidently answer questions that weren't well-represented in the retrieval results. I spent a significant amount of time tuning retrieval quality — chunk sizing, embedding strategy, score thresholds — before the answers were reliable enough to act on.\n\nI also initially tried to make it too autonomous. Fully automated playbook execution sounds useful until a false positive triggers an account lockdown at 2am. The current version flags high-confidence actions for one-click confirmation rather than running them silently.\n\n## Results (personal use)\n\nTriage time on familiar alert types dropped significantly — the lookup work that was eating 15-30 minutes now takes seconds. For novel or complex incidents I still do full manual investigation, which is the right call. The assistant is a first-pass filter, not a replacement for thinking.\n"])</script><script>self.__next_f.push([1,"e:[\"$\",\"$L5\",null,{\"translateY\":\"16\",\"children\":[\"$\",\"$L3\",null,{\"fillWidth\":true,\"ga ,\"children\":[\"$\",\"$L2b\",null,{\"children\":\"$L2c\"}]}]}],\"$L2d\"]}]}]]}]\n"])</script><script>self.__next_f.push([1,"33:I[339756,[\"/_next/static/chunks/d96012bcfc98706a.js\",\"/_next/static/chunks/73e3194f06db260e.js\"],\"default\"]\n34:I[837457,[\"/_next/static/chunks/d96012bcfc98706a.js\",\"/_next/static/chunks/73e3194f06db260e.js\"],\"default\"]\n35:I[298229,[\"/_next/static/chunks/4229be1c600ccf6d.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/9988c4a59e44ac76.js\",\"/_next/static/chunks/720d3f3cc420c663.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"IconButton\"]\n2e:T19b0,"])</script><script>self.__next_f.push([1,"\nIf you're preparing to migrate to Entra ID and a penetration test just flagged \"Netlogon not requiring RPC Sealing\" — this is how you close it properly.\n\nThis isn't a theoretical hardening checklist. It's the actual playbook I follow: four phases, a hard go/no-go gate between discovery and enforcement, and a PowerShell script to do the discovery work for you.\n\n## Why this matters\n\nNetlogon is the protocol domain-joined machines use to authenticate against Domain Controllers. Without RPC Sealing, that channel is unencrypted — a classic man-in-the-middle opportunity. Microsoft patched this with the Netlogon secure channel update (CVE-2020-1472 / Zerologon era), but enforcement is still opt-in. A lot of environments are patched but not enforced.\n\nBefore you flip enforcement on, you need to know what's still sending unencrypted traffic. That's the whole point of phases 1–3.\n\n---\n\n## Phase 1: Infrastructure Preparation\n\n**Target:** All servers and endpoints — DCs, member servers, and clients.\n\nBefore any enforcement, the OS must actually support the RPC Sealing protocol. If you patch only your DCs and leave member servers behind, those servers will fail to authenticate once you enforce.\n\n**Action:** Deploy the latest Cumulative Updates. Specifically confirm KB5062600 / KB5021130 are installed. Reboot everything. Check that OS builds are current across the board.\n\nThis phase is boring. Do it anyway.\n\n---\n\n## Phase 2: Discovery (The Listening Phase)\n\n**Target:** Domain Controllers only.\n\nAt this stage, DCs are capable of RPC Sealing but won't block anything yet. They will, however, log every non-compliant connection. That's exactly what you want.\n\n### Step 1 — MDI Reports\n\nOpen Microsoft Defender for Identity. Pull the **\"Weak Ciphers\"** and **\"NTLM Authentication\"** reports. These give you a fast visual map of legacy devices: old NAS boxes, third-party applications, Linux/Samba servers, network appliances that predate NTLMv2.\n\n### Step 2 — PowerShell Event Log Query\n\nEvent ID `5838` = connection attempted without sealing. Event ID `5840` = connection using weak cryptography. You want to find every machine generating these events across all your DCs.\n\n```powershell\n# Create a temp folder for the report\n$Path = \"C:\\temp\"\nIf (!(Test-Path $Path)) { New-Item -ItemType Directory -Force -Path $Path }\n\n# Get all Domain Controllers in the domain\n$DCs = Get-ADDomainController -Filter * | Select-Object -ExpandProperty Hostname\n\n$EventIDs = @(5838, 5840)\n$AllEvents = @()\n\nforeach ($DC in $DCs) {\n    Write-Host \"Querying logs on DC: $DC...\" -ForegroundColor Cyan\n    try {\n        $Events = Get-WinEvent -ComputerName $DC -FilterHashtable @{LogName='System'; ID=$EventIDs} -ErrorAction Stop\n\n        foreach ($Event in $Events) {\n            $AllEvents += [PSCustomObject]@{\n                DomainController = $DC\n                TimeCreated      = $Event.TimeCreated\n                EventID          = $Event.Id\n                Message          = $Event.Message.Split(\"`n\")[0]\n            }\n        }\n    } catch {\n        Write-Warning \"No matching events found on $DC, or access was denied.\"\n    }\n}\n\n# Export results\nif ($AllEvents.Count -gt 0) {\n    $ExportPath = \"$Path\\Netlogon_Vulnerable_Traffic.csv\"\n    $AllEvents | Export-Csv -Path $ExportPath -NoTypeInformation -Encoding UTF8\n    Write-Host \"Done! Found vulnerable traffic. Report saved to: $ExportPath\" -ForegroundColor Yellow\n} else {\n    Write-Host \"Excellent! No vulnerable Netlogon traffic detected across any DCs.\" -ForegroundColor Green\n}\n```\n\nRun this against all DCs. You'll get a CSV with timestamps, the DC that logged each event, and the message. That CSV is your remediation backlog.\n\n---\n\n## Phase 3: Remediation (The Go/No-Go Gate)\n\n**Target:** Specific assets identified in Phase 2.\n\nThis is where most projects stall. The CSV output usually surfaces a few categories:\n\n- **Legacy printers and scanners** — firmware update or replace\n- **Third-party applications** — vendor update or configuration change\n- **Linux/Samba servers** — update Samba and configure `client use spnego = yes`, `ntlm auth = no`\n- **Network appliances** — firmware update; sometimes the only option is replacement\n\nWork through each one. If something genuinely cannot be updated, you document why and decide whether a temporary exception is acceptable. In my experience, \"we can't update it\" is usually \"we haven't tried hard enough yet.\"\n\n**The gate condition:** Run the discovery script again after remediation. You must see **zero new 5838 or 5840 events across all DCs for at least a few days** before moving to Phase 4. Not fewer events — zero.\n\n---\n\n## Phase 4: Enforcement \u0026 Hardening\n\n**Target:** DCs for Netlogon; all servers and clients for SMB/NTLM.\n\nOnly run this phase when Phase 3 is clean.\n\n### Step 4.1 — Enforce RPC Sealing on DCs\n\nDeploy via GPO targeting the Domain Controllers OU, or set the registry key directly via PowerShell:\n\n```\nPath:  HKLM\\System\\CurrentControlSet\\Services\\Netlogon\\Parameters\nKey:   RequireSeal\nType:  DWORD\nValue: 2\n```\n\nOnce `RequireSeal = 2`, any device that fails to use RPC sealing is blocked immediately. Blocked connections generate Event ID `5839` — monitor for these after enforcement so you can catch anything you missed in Phase 3.\n\n### Step 4.2 — SMB Signing and NTLM Hardening\n\nRoll these GPOs out in rings. Don't push to all clients simultaneously.\n\n- **Ring 1:** IT / test machines\n- **Ring 2:** Member servers\n- **Ring 3:** All clients\n\nGPO settings to enforce:\n\n**`Microsoft network server: Digitally sign communications (always)`** → Enabled\n\n**`Network security: LAN Manager authentication level`** → Send NTLMv2 response only. Refuse LM \u0026 NTLM\n\nThe LAN Manager setting is the one that surprises people. Anything still using plain NTLM or LM will break when you enforce this. That's why the discovery phase exists.\n\n---\n\n## What this closes\n\nDone correctly, this playbook addresses:\n\n- Unencrypted Netlogon channel (pen test finding)\n- Zerologon attack surface (CVE-2020-1472 enforcement)\n- NTLM downgrade attack vectors\n- SMB relay opportunities on the internal network\n\nIt also puts you in a much cleaner position for Entra ID migration — because the same legacy devices causing problems here will cause problems during hybrid join and Conditional Access rollout. You're finding them now instead of later.\n\n---\n\nThe script above is what I run before any enforcement conversation. If you're seeing 5838s you didn't expect, start there — the CSV usually tells you exactly what needs attention.\n"])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L15\",\"netlogon-rpc-sealing-playbook\",{\"post\":{\"metadata\":{\"title\":\"Netlogon RPC Sealing: The Full Hardening Playbook\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-03\",\"summary\":\"A complete 4-phase execution guide for enforcing Netlogon RPC Sealing and SMB/NTLM hardening before migrating to Entra ID — including the PowerShell discovery script I use to find vulnerable traffic across all DCs.\",\"image\":\"/images/blog/netlogon-rpc-sealing-playbook.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"netlogon-rpc-sealing-playbook\",\"content\":\"$2e\"},\"thumbnail\":false,\"direction\":\"$undefined\"}]\n2f:T2296,"])</script><script>self.__next_f.push([1,"\nThe default Claude Code installation does one thing poorly: it forgets everything. Every new session, you re-explain your stack, your preferences, the decisions you made last week. It compounds quickly on any project you're in for more than a few days.\n\nI spent a few months building a configuration layer on top of Claude Code that solves this. Here's what it does and how it works.\n\n## The memory problem\n\nClaude Code has no persistence by default. The context window holds your current session. When it compacts or you start a new one, that state is gone. You're not losing information in a database — you're losing it from the model's working memory.\n\nThe fix isn't clever prompting. It's an explicit memory system with structured files and hooks that write to and read from those files automatically.\n\n## The 4-file context system\n\nEach project gets a directory at `~/.claude/projects/\u003cname\u003e/` with four files:\n\n**`context-goals.md`** — what I'm working on right now. Max 5 lines. Rewritten when the goal changes. Keeps the model from drifting into solving adjacent problems.\n\n**`context-decisions.md`** — architectural choices and why. Permanent, never deleted. If I decided to use Infisical instead of environment variables, that's in here with the reason. The model doesn't suggest what I've already ruled out.\n\n**`context-progress.md`** — completed tasks and what's in flight. Auto-trimmed to the last 20 items. Serves as a working log without growing unbounded.\n\n**`context-gotchas.md`** — warnings, blockers, and lessons. Also permanent. If something bit me once — a library quirk, an environment constraint, a mistake pattern — it lives here forever. The model reads it at session start and doesn't repeat the same mistakes.\n\nThese files are plain markdown. They're updated manually after significant tasks, and automatically by hooks at session end.\n\n## The hooks\n\nHooks are shell scripts or TypeScript files that Claude Code runs in response to lifecycle events. I have six:\n\n**SessionStart** — runs when a new session opens. Reads the project's context files and injects a summary (max 60 lines) as a system message. The model immediately knows what project it's in, what the current goal is, what decisions are locked, and what to avoid. No re-explaining needed.\n\n**PreCompact** — runs before Claude Code compacts the context window. Assembles all four context files into `context-summary.md` — a structured 60-line snapshot. This becomes what SessionStart injects next time. Without this, compaction destroys context. With it, compaction is just a checkpoint.\n\n**EvaluateSession** — runs when the session ends. Reads the transcript, extracts patterns — recurring mistakes, useful techniques, things that worked — and writes them to `~/.claude/skills/Learned/`. These are ephemeral: they roll off after a few sessions. For anything important enough to keep permanently, I promote it manually to `context-gotchas.md`.\n\n**SuggestCompact** — tracks a running count of tool calls per session. At 50, it suggests running `/compact`. This isn't mandatory, but the reminder is useful — context windows that run too long start producing lower-quality output.\n\n**UpdateContext** — PostToolUse hook that fires after Write, Edit, or MultiEdit operations. Logs modified files to context-progress and runs Prettier and tsc on changed files immediately. Type errors and formatting issues surface at edit time, not at build time.\n\n**Cleanup** — periodic maintenance. Trims context-progress.md to the last 20 items. Removes context directories for projects that haven't been touched in 30 days.\n\n## Skills and commands\n\nSkills are reusable prompts that expand into full instructions when invoked. I have these:\n\n**`/plan`** — invokes the planner agent before any implementation. Restates the requirement, breaks it into phases, identifies dependencies, flags risks. Produces a plan for review before any code is touched. I don't write code without running this first for anything non-trivial.\n\n**`/verify`** — runs a self-check loop: tsc → lint → tests → build, in order, stopping on first failure. The skill knows to skip steps that aren't configured for the project. Run before every commit.\n\n**`/simplify`** — post-implementation review. Looks at recently modified code for unnecessary abstraction, duplicated logic, or complexity that crept in during implementation. Runs after verify.\n\n**`/commit-push-pr`** — precomputes git context (status, diff, log, branch), generates a conventional commit message, stages relevant files, commits, and pushes. Skips the tedium of assembling git commands manually.\n\n**`/learn`** — manual trigger for pattern extraction. Same process as EvaluateSession but runs on demand mid-session when I want to capture something specific.\n\n**`/update-context`** — reads the current session and updates all four context files. Useful after completing a significant task when I want to flush progress immediately rather than waiting for the end-of-session hook.\n\n**`/tdd`** — enforces test-first workflow. Scaffolds the interface, writes the test, makes it fail, then implements the minimum code to pass. Blocks implementation until the test exists.\n\n**`/code-review`** — runs the code-reviewer agent on recently modified files. Returns severity-rated feedback: critical issues stop work, high issues get fixed, medium issues are noted.\n\n## Agents\n\nAgents are specialized sub-models with scoped roles. They run separately from the main session and have access to the codebase but only for their designated purpose.\n\n**planner** — for implementation planning. Doesn't write code. Only produces plans with phases, dependencies, and risk flags.\n\n**code-reviewer** — reviews code after it's written. Severity-based feedback. The reviewer doesn't have write access — it can't change files, only report.\n\n**security-reviewer** — OWASP Top 10 checks, secret detection, dependency auditing. Runs before commits on anything that touches auth, input handling, or external integrations.\n\n**tdd-guide** — enforces test-first. If I start implementing without a failing test, it redirects. Tracks coverage and flags when it drops below 80%.\n\n**architect** — for decisions that affect project structure. Invoked when I'm choosing between approaches that have lasting consequences, not for individual implementation decisions.\n\n**build-error-resolver** — when the build breaks, this agent diagnoses and makes the minimum change to get it green. Doesn't refactor, doesn't improve — just fixes the build.\n\n**refactor-cleaner** — dead code removal and consolidation. Runs tools like `knip` to find unused exports, then removes them. Used for maintenance, not mid-feature.\n\nThe separation is intentional. A code reviewer that can also edit files is dangerous — it starts making \"improvements\" that weren't asked for. Each agent does one thing.\n\n## Global rules\n\nRules are markdown files in `~/.claude/rules/` that load into every session. They cover:\n\n- **Coding style**: immutability-first (spread operators, never mutate), no `any` types, explicit return types on exports, functions under 50 lines\n- **Package manager**: bun not npm, uv not pip — enforced globally so I never get npm in a bun project\n- **Git workflow**: conventional commits (`feat|fix|refactor|docs|chore:`), no `Co-Authored-By` footers, PR descriptions that cover the full diff not just the latest commit\n- **Testing**: 80% minimum coverage, TDD workflow required for new features\n- **Security**: no hardcoded secrets, input validation at system boundaries only, rate limiting on all endpoints\n\nThe model reads these rules at every session start. They're not suggestions — they're constraints that get checked during code review and verify.\n\n## What this actually changes day-to-day\n\nThe memory system means I can leave a project for a week and come back without a re-orientation session. The model knows where I left off, what I decided, and what's broken.\n\nThe hooks mean formatting and type errors surface immediately. I don't batch-discover problems at commit time.\n\nThe agents mean review happens as a matter of course. I'm not remembering to run security checks — they're part of the workflow for anything touching auth or external data.\n\nThe skills mean the repetitive parts (planning, verifying, committing) have consistent execution. I don't skip `/verify` because it's convenient — the skill is right there and running it takes two seconds.\n\nNone of this is magic. It's structured configuration that enforces a workflow I decided I wanted. The alternative is relying on memory and discipline to apply that workflow manually every time. That doesn't scale.\n\nThe config is version-controlled at [github.com/RohiRIK/claude-code-config](https://github.com/RohiRIK/claude-code-config).\n"])</script><script>self.__next_f.push([1,"18:[\"$\",\"$L15\",\"claude-code-config\",{\"post\":{\"metadata\":{\"title\":\"How I Configured Claude Code to Actually Remember Things\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-02\",\"summary\":\"The default Claude Code setup loses context on every session. Here's the hook system, skill commands, agent definitions, and memory architecture I built to fix that.\",\"image\":\"/images/blog/claude-code-config.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"claude-code-config\",\"content\":\"$2f\"},\"thumbnail\":false,\"direction\":\"$undefined\"}]\n30:T749,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client running JumpCloud for MDM wanted to consolidate onto the Microsoft stack. Everything else was already in Microsoft — identity, email, security — but the device management gap meant correlating device state with identity required jumping between platforms.\n\n## What I built\n\nThe main challenge with MDM migrations is the transition gap — the window where a device is unenrolled from one MDM and not yet in another. During that time you lose policy enforcement and visibility.\n\nI wrote PowerShell scripts to handle the transition in sequence: unenroll from JumpCloud, trigger Intune enrollment, verify the device showed up in Intune before moving to the next. Ran in batches with rollback checkpoints so we could pause if something broke mid-migration.\n\n**Windows Autopilot** — registered the Windows fleet into Autopilot for zero-touch future provisioning. Extracted hardware hashes, uploaded them, configured deployment profiles per user group.\n\n**macOS via Apple Business Manager** — set up ABM integration with Intune. More involved than Windows Autopilot — had to work through the MDM profile trust chain and handle devices that had supervision issues from the JumpCloud side.\n\n**Policy parity** — translated JumpCloud's Command Library into Intune Configuration Profiles and PowerShell scripts deployed via Intune. Some mapped cleanly, some needed rethinking.\n\n## What made it hard\n\nA subset of devices had been enrolled in JumpCloud via a method that left a persistent MDM profile the script couldn't cleanly remove. Those had to be handled manually. Also found several macOS devices enrolled by users personally rather than via ABM, which broke the supervision requirement for certain policies.\n\n## Stack\n\n- Microsoft Intune\n- JumpCloud\n- Windows Autopilot\n- Apple Business Manager\n- PowerShell \u0026 Microsoft Graph API\n"])</script><script>self.__next_f.push([1,"1b:[\"$\",\"$L19\",\"jumpcloud-to-intune-migration\",{\"priority\":true,\"href\":\"/work/jumpcloud-to-intune-migration\",\"images\":[],\"title\":\"JumpCloud to Intune Migration\",\"description\":\"MDM consolidation from JumpCloud to Microsoft Intune — automated unenrollment, Autopilot provisioning, and policy parity for a mixed Windows and macOS fleet.\",\"content\":\"$30\",\"avatars\":[],\"link\":\"\"}]\n31:T6db,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client at Oncloud decided to move their entire identity and collaboration stack from Google Workspace to Microsoft 365. I was the lead engineer on the migration — responsible for technical execution from discovery through cutover.\n\n## What the work looked like\n\n**Identity migration** — mapped thousands of Google identities into a clean Entra ID tenant, standardized naming conventions, consolidated accounts that had duplicated from acquisitions. Set up SSO from scratch with Entra ID as the new IdP.\n\n**Data migration via AvePoint Fly** — handled mailbox and Google Drive to SharePoint/OneDrive transfer. The hard part wasn't the tool — it was the permission mapping. Google Drive's sharing model doesn't translate cleanly to SharePoint. Spent significant time building mapping rules to preserve access rather than just moving data and leaving people unable to open their files.\n\n**Mail cutover** — ran split-delivery during the transition so mail kept flowing to both platforms while users moved over. Managed the DNS cutover window to avoid gaps.\n\n**SSO re-mapping** — the client had 50+ SaaS applications pointed at Google as IdP. Reconfigured each for SAML/OIDC against Entra ID. Most were straightforward; a few needed custom attribute mappings.\n\n## What made it hard\n\nThe data migration took longer than scoped. The client's Google Drive was far messier than discovery suggested — deeply nested shared drives with complex permission inheritance, orphaned files, and accounts that no longer existed but still owned content. We had to build a pre-migration cleanup process that wasn't in the original plan.\n\n## Stack\n\n- AvePoint Fly\n- Microsoft Entra ID\n- Google Workspace APIs\n- Microsoft Graph API\n- PowerShell\n"])</script><script>self.__next_f.push([1,"1c:[\"$\",\"$L19\",\"gcp-to-entra-migration\",{\"priority\":false,\"href\":\"/work/gcp-to-entra-migration\",\"images\":[],\"title\":\"GCP to Entra ID Migration\",\"description\":\"Full identity and collaboration migration from Google Workspace to Microsoft 365 — mailboxes, Drive data, SSO re-mapping across 50+ apps, and tenant consolidation.\",\"content\":\"$31\",\"avatars\":[],\"link\":\"\"}]\n32:T9e2,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nMy personal Claude Code configuration that I've been refining since I started using it heavily for both security automation and portfolio work. The default Claude Code setup is fine. This is what happens after you use it seriously for a few months and start fixing the parts that annoy you.\n\n## The problem with default Claude Code\n\nTwo things break down quickly:\n\n1. **No memory across sessions.** Every new conversation starts cold. You re-explain your stack, your preferences, your project context. It adds up.\n\n2. **No workflow enforcement.** Claude will happily skip tests, write unsafe code, or use npm instead of bun if you don't have rules that say otherwise.\n\n## What I built\n\n**Session context system** — Four files per project (`context-goals.md`, `context-decisions.md`, `context-progress.md`, `context-gotchas.md`) that persist across sessions. A PreCompact hook assembles them before context gets trimmed. A SessionStart hook injects the summary at the start of every new session. Claude picks up where it left off.\n\n**Custom hooks** — Shell commands that fire on tool use events:\n- PostToolUse runs Prettier and tsc after every file edit\n- PreToolUse blocks dev servers from running outside a tmux session\n- EvaluateSession extracts patterns at session end\n- SuggestCompact warns when approaching context limits\n\n**Agent definitions** — Specialized agents for recurring tasks: planner, tdd-guide, code-reviewer, security-reviewer, build-error-resolver. Each has a focused role and gets invoked for the right thing rather than dumping everything at the main agent.\n\n**Skills** — Reusable command prompts: `/plan`, `/verify`, `/simplify`, `/commit-push-pr`, `/learn`. The verify skill runs tsc → lint → tests → build in order and stops on first failure.\n\n**Global rules** — Coding style, git workflow, security checklist, package manager preferences (bun, not npm), test coverage minimums. Claude reads these on every session and actually follows them.\n\n## What it actually changed\n\nI stopped re-explaining my stack. I stopped getting npm in projects that use bun. Security checks happen before commits without me prompting. The context system means I can close a session mid-task and come back three days later without losing where I was.\n\nIt's not magic — it's just configuration that enforces the workflow I actually want.\n\n## Stack\n\n- Claude Code hooks (bash scripts)\n- CLAUDE.md (global + per-project)\n- Session context (4 markdown files per project)\n- Custom agents + skills\n"])</script><script>self.__next_f.push([1,"1d:[\"$\",\"$L19\",\"claude-code-config\",{\"priority\":false,\"href\":\"/work/claude-code-config\",\"images\":[],\"title\":\"Claude Code Config\",\"description\":\"My production Claude Code setup — custom hooks, agents, skills, and session context system that makes AI-assisted development actually sustainable day-to-day.\",\"content\":\"$32\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/claude-code-config\"}]\n2c:[\"$\",\"$L33\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L34\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":[[\"$\",\"$L3\",null,{\"as\":\"section\",\"fill\":true,\"center\":true,\"paddingBottom\":\"160\",\"children\":[[\"$\",\"span\",null,{\"className\":\"font-display font-strong font-xl mb-s\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"404\"}],[\"$\",\"h1\",
