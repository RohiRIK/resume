hunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/1639f11c1a7acc88.js\"],\"Avatar\"]\nb:I[474855,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/1639f11c1a7acc88.js\"],\"ProjectCard\"]\n13:I[168027,[],\"default\"]\n:HL[\"/resume/_next/static/chunks/93ac2d54f71ec8d4.css\",\"style\"]\n:HL[\"/resume/_next/static/chunks/d20e0f0702cef329.css\",\"style\"]\n:HL[\"/resume/_next/static/chunks/3a1b43107ae24619.css\",\"style\"]\n:HL[\"/resume/_next/static/chunks/eef662fdc50843a7.css\",\"style\"]\n:HL[\"/resume/_next/static/chunks/b3a7f4834154c9dc.css\",\"style\"]\n:HL[\"/resume/_next/static/media/797e433ab948586e-s.p.dbea232f.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/resume/_next/static/media/caa3a2e1cccd8315-s.p.853070df.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\nc:T10a2,"])</script><script>self.__next_f.push([1,"\n## What it is\n\nA SOC assistant I built on my own time. The idea was simple: stop digging through documentation every time an alert fires and just ask a question in plain English.\n\nThe core is a RAG pipeline — Pinecone as the vector store, LangChain managing the retrieval and chains, Gemini 1.5 Pro doing the reasoning. It ingests security documentation, playbooks, and telemetry context, and surfaces relevant answers in seconds instead of minutes of manual searching.\n\nIt's not a product. It's a personal project that I run against real data and actually use.\n\n## Why I built it\n\nI work in security operations. A lot of the slow parts of alert triage aren't complex thinking — they're retrieval. Finding the right playbook, checking what a particular indicator means in this environment, confirming whether a behavior is expected for a given user. That's lookup work, and lookup work is exactly what RAG is good at.\n\nI wanted to see how much of that I could automate without the output becoming something you can't trust. That second part turned out to be the hard part.\n\n## How it works\n\n\u003cGrid columns=\"2\" gap=\"16\"\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"search\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eRetrieval\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eSecurity documentation and playbooks embedded into Pinecone. Queries pull the most relevant context before anything goes to the model.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"shield\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eReasoning\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eGemini 1.5 Pro handles the actual analysis — big context window matters here when you're passing in multiple documents at once.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"terminal\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eActions\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eHigh-confidence responses can trigger Logic Apps integrations — account isolation, ticket creation, analyst notification.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"openai\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eInterface\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003ePlain English queries. Ask about an alert, a user, a behavior pattern — no structured query language needed.\u003c/Text\u003e\n    \u003c/Card\u003e\n\u003c/Grid\u003e\n\n## Stack\n\n- **Orchestration**: LangChain — manages retrieval chains and the agentic loop\n- **Model**: Google Gemini 1.5 Pro — large context window was the deciding factor over GPT-4\n- **Vector store**: Pinecone — low-latency retrieval at scale\n- **Integrations**: Microsoft Sentinel, Defender XDR, Azure Logic Apps\n\n## What actually worked\n\nThe retrieval speed was genuinely good from the start. Once the embeddings were in Pinecone, lookup latency was fast enough that the bottleneck shifted entirely to the model response time, which is what you want.\n\nThe natural language interface worked better than I expected for well-defined questions — \"what's the expected login behavior for this user?\", \"show me playbook steps for lateral movement detection\" — that kind of thing.\n\n## What didn't\n\nHallucination in forensic context is a real problem. Early versions would confidently answer questions that weren't well-represented in the retrieval results. I spent a significant amount of time tuning retrieval quality — chunk sizing, embedding strategy, score thresholds — before the answers were reliable enough to act on.\n\nI also initially tried to make it too autonomous. Fully automated playbook execution sounds useful until a false positive triggers an account lockdown at 2am. The current version flags high-confidence actions for one-click confirmation rather than running them silently.\n\n## Results (personal use)\n\nTriage time on familiar alert types dropped significantly — the lookup work that was eating 15-30 minutes now takes seconds. For novel or complex incidents I still do full manual investigation, which is the right call. The assistant is a first-pass filter, not a replacement for thinking.\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"0SMGKohWtotHwKxXRifra\",\"c\":[\"\",\ ext/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/1639f11c1a7acc88.js\"],\"Background\"]\n27:I[521247,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/1639f11c1a7acc88.js\"],\"ClientFlex\"]\n28:I[402971,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/1639f11c1a7acc88.js\"],\"Header\"]\n29:I[1166,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/1639f11c1a7acc88.js\"],\"RouteGuard\"]\n16:T2296,"])</script><script>self.__next_f.push([1,"\nThe default Claude Code installation does one thing poorly: it forgets everything. Every new session, you re-explain your stack, your preferences, the decisions you made last week. It compounds quickly on any project you're in for more than a few days.\n\nI spent a few months building a configuration layer on top of Claude Code that solves this. Here's what it does and how it works.\n\n## The memory problem\n\nClaude Code has no persistence by default. The context window holds your current session. When it compacts or you start a new one, that state is gone. You're not losing information in a database — you're losing it from the model's working memory.\n\nThe fix isn't clever prompting. It's an explicit memory system with structured files and hooks that write to and read from those files automatically.\n\n## The 4-file context system\n\nEach project gets a directory at `~/.claude/projects/\u003cname\u003e/` with four files:\n\n**`context-goals.md`** — what I'm working on right now. Max 5 lines. Rewritten when the goal changes. Keeps the model from drifting into solving adjacent problems.\n\n**`context-decisions.md`** — architectural choices and why. Permanent, never deleted. If I decided to use Infisical instead of environment variables, that's in here with the reason. The model doesn't suggest what I've already ruled out.\n\n**`context-progress.md`** — completed tasks and what's in flight. Auto-trimmed to the last 20 items. Serves as a working log without growing unbounded.\n\n**`context-gotchas.md`** — warnings, blockers, and lessons. Also permanent. If something bit me once — a library quirk, an environment constraint, a mistake pattern — it lives here forever. The model reads it at session start and doesn't repeat the same mistakes.\n\nThese files are plain markdown. They're updated manually after significant tasks, and automatically by hooks at session end.\n\n## The hooks\n\nHooks are shell scripts or TypeScript files that Claude Code runs in response to lifecycle events. I have six:\n\n**SessionStart** — runs when a new session opens. Reads the project's context files and injects a summary (max 60 lines) as a system message. The model immediately knows what project it's in, what the current goal is, what decisions are locked, and what to avoid. No re-explaining needed.\n\n**PreCompact** — runs before Claude Code compacts the context window. Assembles all four context files into `context-summary.md` — a structured 60-line snapshot. This becomes what SessionStart injects next time. Without this, compaction destroys context. With it, compaction is just a checkpoint.\n\n**EvaluateSession** — runs when the session ends. Reads the transcript, extracts patterns — recurring mistakes, useful techniques, things that worked — and writes them to `~/.claude/skills/Learned/`. These are ephemeral: they roll off after a few sessions. For anything important enough to keep permanently, I promote it manually to `context-gotchas.md`.\n\n**SuggestCompact** — tracks a running count of tool calls per session. At 50, it suggests running `/compact`. This isn't mandatory, but the reminder is useful — context windows that run too long start producing lower-quality output.\n\n**UpdateContext** — PostToolUse hook that fires after Write, Edit, or MultiEdit operations. Logs modified files to context-progress and runs Prettier and tsc on changed files immediately. Type errors and formatting issues surface at edit time, not at build time.\n\n**Cleanup** — periodic maintenance. Trims context-progress.md to the last 20 items. Removes context directories for projects that haven't been touched in 30 days.\n\n## Skills and commands\n\nSkills are reusable prompts that expand into full instructions when invoked. I have these:\n\n**`/plan`** — invokes the planner agent before any implementation. Restates the requirement, breaks it into phases, identifies dependencies, flags risks. Produces a plan for review before any code is touched. I don't write code without running this first for anything non-trivial.\n\n**`/verify`** — runs a self-check loop: tsc → lint → tests → build, in order, stopping on first failure. The skill knows to skip steps that aren't configured for the project. Run before every commit.\n\n**`/simplify`** — post-implementation review. Looks at recently modified code for unnecessary abstraction, duplicated logic, or complexity that crept in during implementation. Runs after verify.\n\n**`/commit-push-pr`** — precomputes git context (status, diff, log, branch), generates a conventional commit message, stages relevant files, commits, and pushes. Skips the tedium of assembling git commands manually.\n\n**`/learn`** — manual trigger for pattern extraction. Same process as EvaluateSession but runs on demand mid-session when I want to capture something specific.\n\n**`/update-context`** — reads the current session and updates all four context files. Useful after completing a significant task when I want to flush progress immediately rather than waiting for the end-of-session hook.\n\n**`/tdd`** — enforces test-first workflow. Scaffolds the interface, writes the test, makes it fail, then implements the minimum code to pass. Blocks implementation until the test exists.\n\n**`/code-review`** — runs the code-reviewer agent on recently modified files. Returns severity-rated feedback: critical issues stop work, high issues get fixed, medium issues are noted.\n\n## Agents\n\nAgents are specialized sub-models with scoped roles. They run separately from the main session and have access to the codebase but only for their designated purpose.\n\n**planner** — for implementation planning. Doesn't write code. Only produces plans with phases, dependencies, and risk flags.\n\n**code-reviewer** — reviews code after it's written. Severity-based feedback. The reviewer doesn't have write access — it can't change files, only report.\n\n**security-reviewer** — OWASP Top 10 checks, secret detection, dependency auditing. Runs before commits on anything that touches auth, input handling, or external integrations.\n\n**tdd-guide** — enforces test-first. If I start implementing without a failing test, it redirects. Tracks coverage and flags when it drops below 80%.\n\n**architect** — for decisions that affect project structure. Invoked when I'm choosing between approaches that have lasting consequences, not for individual implementation decisions.\n\n**build-error-resolver** — when the build breaks, this agent diagnoses and makes the minimum change to get it green. Doesn't refactor, doesn't improve — just fixes the build.\n\n**refactor-cleaner** — dead code removal and consolidation. Runs tools like `knip` to find unused exports, then removes them. Used for maintenance, not mid-feature.\n\nThe separation is intentional. A code reviewer that can also edit files is dangerous — it starts making \"improvements\" that weren't asked for. Each agent does one thing.\n\n## Global rules\n\nRules are markdown files in `~/.claude/rules/` that load into every session. They cover:\n\n- **Coding style**: immutability-first (spread operators, never mutate), no `any` types, explicit return types on exports, functions under 50 lines\n- **Package manager**: bun not npm, uv not pip — enforced globally so I never get npm in a bun project\n- **Git workflow**: conventional commits (`feat|fix|refactor|docs|chore:`), no `Co-Authored-By` footers, PR descriptions that cover the full diff not just the latest commit\n- **Testing**: 80% minimum coverage, TDD workflow required for new features\n- **Security**: no hardcoded secrets, input validation at system boundaries only, rate limiting on all endpoints\n\nThe model reads these rules at every session start. They're not suggestions — they're constraints that get checked during code review and verify.\n\n## What this actually changes day-to-day\n\nThe memory system means I can leave a project for a week and come back without a re-orientation session. The model knows where I left off, what I decided, and what's broken.\n\nThe hooks mean formatting and type errors surface immediately. I don't batch-discover problems at commit time.\n\nThe agents mean review happens as a matter of course. I'm not remembering to run security checks — they're part of the workflow for anything touching auth or external data.\n\nThe skills mean the repetitive parts (planning, verifying, committing) have consistent execution. I don't skip `/verify` because it's convenient — the skill is right there and running it takes two seconds.\n\nNone of this is magic. It's structured configuration that enforces a workflow I decided I wanted. The alternative is relying on memory and discipline to apply that workflow manually every time. That doesn't scale.\n\nThe config is version-controlled at [github.com/RohiRIK/claude-code-config](https://github.com/RohiRIK/claude-code-config).\n"])</script><script>self.__next_f.push([1,"d:[\"$\",\"$L3\",null,{\"fillWidth\":true,\"gap\":\"24\",\"marginBottom\":\"l\",\"children\":[[\"$\",\"$L7\",null,{\"fillWidth\":true,\"paddingRight\":\"64\",\"children\":[\"$\",\"$L8\",null,{\"maxWidth\":48}]}],[\"$\",\"$L7\",null,{\"fillWidth\":true,\"gap\":\"24\",\"marginTop\":\"40\",\"s\":{\"direction\":\"column\"},\"children\":[[\"$\",\"$L7\",null,{\"flex\":1,\"paddingLeft\":\"l\",\"paddingTop\":\"24\",\"children\":[\"$\",\"h2\",null,{\"className\":\"font-display font-strong font-xs neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Latest from the blog\"}]}],[\"$\",\"$L7\",null,{\"flex\":3,\"paddingX\":\"20\",\"children\":[\"$\",\"$L14\",null,{\"columns\":\"2\",\"s\":{\"columns\":1},\"fillWidth\":true,\"marginBottom\":\"40\",\"gap\":\"16\",\"children\":[[\"$\",\"$L15\",\"claude-code-config\",{\"post\":{\"metadata\":{\"title\":\"How I Configured Claude Code to Actually Remember Things\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-02\",\"summary\":\"The default Claude Code setup loses context on every session. Here's the hook system, skill commands, agent definitions, and memory architecture I built to fix that.\",\"image\":\"/images/blog/claude-code-config.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"claude-code-config\",\"content\":\"$16\"},\"thumbnail\":false,\"direction\":\"$undefined\"}],\"$L17\"]}]}]]}],\"$L18\"]}]\n19:T749,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client running JumpCloud for MDM wanted to consolidate onto the Microsoft stack. Everything else was already in Microsoft — identity, email, security — but the device management gap meant correlating device state with identity required jumping between platforms.\n\n## What I built\n\nThe main challenge with MDM migrations is the transition gap — the window where a device is unenrolled from one MDM and not yet in another. During that time you lose policy enforcement and visibility.\n\nI wrote PowerShell scripts to handle the transition in sequence: unenroll from JumpCloud, trigger Intune enrollment, verify the device showed up in Intune before moving to the next. Ran in batches with rollback checkpoints so we could pause if something broke mid-migration.\n\n**Windows Autopilot** — registered the Windows fleet into Autopilot for zero-touch future provisioning. Extracted hardware hashes, uploaded them, configured deployment profiles per user group.\n\n**macOS via Apple Business Manager** — set up ABM integration with Intune. More involved than Windows Autopilot — had to work through the MDM profile trust chain and handle devices that had supervision issues from the JumpCloud side.\n\n**Policy parity** — translated JumpCloud's Command Library into Intune Configuration Profiles and PowerShell scripts deployed via Intune. Some mapped cleanly, some needed rethinking.\n\n## What made it hard\n\nA subset of devices had been enrolled in JumpCloud via a method that left a persistent MDM profile the script couldn't cleanly remove. Those had to be handled manually. Also found several macOS devices enrolled by users personally rather than via ABM, which broke the supervision requirement for certain policies.\n\n## Stack\n\n- Microsoft Intune\n- JumpCloud\n- Windows Autopilot\n- Apple Business Manager\n- PowerShell \u0026 Microsoft Graph API\n"])</script><script>self.__next_f.push([1,"1a:T6db,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client at Oncloud decided to move their entire identity and collaboration stack from Google Workspace to Microsoft 365. I was the lead engineer on the migration — responsible for technical execution from discovery through cutover.\n\n## What the work looked like\n\n**Identity migration** — mapped thousands of Google identities into a clean Entra ID tenant, standardized naming conventions, consolidated accounts that had duplicated from acquisitions. Set up SSO from scratch with Entra ID as the new IdP.\n\n**Data migration via AvePoint Fly** — handled mailbox and Google Drive to SharePoint/OneDrive transfer. The hard part wasn't the tool — it was the permission mapping. Google Drive's sharing model doesn't translate cleanly to SharePoint. Spent significant time building mapping rules to preserve access rather than just moving data and leaving people unable to open their files.\n\n**Mail cutover** — ran split-delivery during the transition so mail kept flowing to both platforms while users moved over. Managed the DNS cutover window to avoid gaps.\n\n**SSO re-mapping** — the client had 50+ SaaS applications pointed at Google as IdP. Reconfigured each for SAML/OIDC against Entra ID. Most were straightforward; a few needed custom attribute mappings.\n\n## What made it hard\n\nThe data migration took longer than scoped. The client's Google Drive was far messier than discovery suggested — deeply nested shared drives with complex permission inheritance, orphaned files, and accounts that no longer existed but still owned content. We had to build a pre-migration cleanup process that wasn't in the original plan.\n\n## Stack\n\n- AvePoint Fly\n- Microsoft Entra ID\n- Google Workspace APIs\n- Microsoft Graph API\n- PowerShell\n"])</script><script>self.__next_f.push([1,"e:[\"$\",\"$L3\",null,{\"fillWidth\":true,\"gap\":\"xl\",\"marginBottom\":\"40\",\"paddingX\":\"l\",\"children\":[[\"$\",\"$Lb\",\"jumpcloud-to-intune-migration\",{\"priority\":true,\"href\":\"/work/jumpcloud-to-intune-migration\",\"images\":[],\"title\":\"JumpCloud to Intune Migration\",\"description\":\"MDM consolidation from JumpCloud to Microsoft Intune — automated unenrollment, Autopilot provisioning, and policy parity for a mixed Windows and macOS fleet.\",\"content\":\"$19\",\"avatar \":{\"minHeight\":\"100vh\"},\"margin\":\"0\",\"padding\":\"0\",\"horizontal\":\"center\",\"children\":[[\"$\",\"$L5\",null,{\"fill\":true,\"position\":\"absolute\",\"children\":[\"$\",\"$L26\",null,{\"mask\":{\"x\":50,\"y\":0,\"radius\":100,\"cursor\":false},\"gradient\":{\"display\":false,\"opacity\":100,\"x\":50,\"y\":60,\"width\":100,\"height\":50,\"tilt\":0,\"colorStart\":\"accent-background-strong\",\"colorEnd\":\"page-background\"},\"dots\":{\"display\":true,\"opacity\":40,\"size\":\"2\",\"color\":\"brand-background-strong\"},\"grid\":{\"display\":false,\"opacity\":100,\"color\":\"neutral-alpha-medium\",\"width\":\"0.25rem\",\"height\":\"0.25rem\"},\"lines\":{\"display\":false,\"opacity\":100,\"size\":\"16\",\"thickness\":1,\"angle\":45,\"color\":\"neutral-alpha-weak\"}}]}],[\"$\",\"$L27\",null,{\"ref\":\"$undefined\",\"cursor\":\"$undefined\",\"xl\":\"$undefined\",\"l\":\"$undefined\",\"m\":\"$undefined\",\"s\":{\"hide\":true},\"xs\":\"$undefined\",\"style\":\"$undefined\",\"hide\":\"$undefined\",\"fillWidth\":true,\"minHeight\":\"16\"}],[\"$\",\"$L28\",null,{}],[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"display-flex position-relative p-l flex-1 justify-center min-width-0 fill-width \",\"style\":{\"maxWidth\":\"$undefined\",\"minWidth\":\"$undefined\",\"minHeight\":\"$undefined\",\"maxHeight\":\"$undefined\",\"width\":\"$undefined\",\"height\":\"$undefined\",\"aspectRatio\":\"$undefined\",\"textAlign\":\"$undefined\",\"cursor\":\"$undefined\"},\"children\":[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"display-flex position-relative justify-center min-width-0 fill-width \",\"style\":{\"maxWidth\":\"$undefined\",\"minWidth\":\"$undefined\",\"minHeight\":\"var(--static-space-0)\",\"maxHeight\":\"$undefined\",\"width\":\"$undefined\",\"height\":\"$undefined\",\"aspectRatio\":\"$undefined\",\"textAlign\":\"$undefined\",\"cursor\":\"$undefined\"},\"children\":[\"$\",\"$L29\",null,{\"children\":\"$L2a\"}]}]}],\"$L2b\"]}]}]]}]\n"])</script><script>self.__next_f.push([1,"2e:I[339756,[\"/resume/_next/static/chunks/d96012bcfc98706a.js\",\"/resume/_next/static/chunks/73e3194f06db260e.js\"],\"default\"]\n2f:I[837457,[\"/resume/_next/static/chunks/d96012bcfc98706a.js\",\"/resume/_next/static/chunks/73e3194f06db260e.js\"],\"default\"]\n30:I[298229,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/1639f11c1a7acc88.js\"],\"IconButton\"]\n2c:T1f79,"])</script><script>self.__next_f.push([1,"\nMy homelab runs on a dedicated server, not a cloud VPS. Everything is version-controlled, documented, and designed to run without me touching it. It's been doing that for over a year.\n\nThis is what's running, how it's wired together, and what went wrong the first time.\n\n## Why Swarm and not the alternatives\n\nThe choice comes up every time I mention this setup: why not Kubernetes, why not plain Compose?\n\nKubernetes is genuinely overkill for a single server. The operational overhead — etcd, control plane components, kubeconfig management, networking plugins — is real work for infrastructure that only needs to orchestrate maybe 10 services. The value of Kubernetes is horizontal scaling and high availability across nodes. I have one node.\n\nPlain Compose works and is simple to reason about, but it doesn't give you health-based restarts, rolling updates, or service redeployment without downtime. When a container crashes, Compose doesn't automatically reschedule it. Swarm does.\n\nSwarm hits the right point in the tradeoff: orchestration primitives (services, secrets, overlay networks, health checks, update policies) without the operational overhead of a full cluster. It's been running with no manual intervention since I set it up.\n\n## Network architecture\n\nAll external traffic enters through Traefik on ports 80 and 443. Traefik handles Let's Encrypt SSL automatically — certificates are provisioned on first request and renewed without manual intervention. It routes to the right service based on hostname labels on each container.\n\nBackend services communicate over internal overlay networks and have no ports exposed to the outside. The pattern is: Traefik is the only service on `proxy-net` that faces the internet. Everything else is on service-specific overlay networks and only joins `proxy-net` if it needs to be externally reachable. Services that don't need external exposure — databases, internal APIs — are never on `proxy-net` at all.\n\nThis is the same segmentation principle as network microsegmentation: services can't reach each other unless there's an explicit path. If Firecrawl gets compromised, it can't directly reach n8n or the secrets store. They're on different networks.\n\n## Secrets management\n\nThe first version of this setup used environment variables in Compose files. This is the common approach and also the wrong one: environment variables end up in Compose files, Compose files end up in git, and suddenly you're sanitizing git history.\n\nI replaced all of that with Infisical, which I self-host on the same server. Agents and services fetch credentials at runtime through the Infisical SDK or CLI. Nothing sensitive is in the Compose files. If I need to rotate a credential, I update it in Infisical and restart the affected service — no code changes, no Compose file edits.\n\nInfisical also gives me an audit trail: which service fetched which secret, when. For a homelab, this might sound excessive. It's not — knowing that a service fetched a credential at an unexpected time is useful signal.\n\nDocker Swarm also has native secrets (`docker secret`), which I use for a few things that Infisical can't easily inject (init scripts, bootstrap credentials for Infisical itself). Both live alongside each other without conflict.\n\n## What runs on it\n\n**Traefik** — Edge router and SSL termination. Service discovery is automatic via container labels. I define routes in each service's Compose file rather than in a central Traefik config, which means adding a new service doesn't require touching the router config.\n\n**Portainer** — Swarm management UI. Most things I do via CLI, but Portainer is useful for visualizing the current state of the stack, looking at service logs without SSHing in, and managing one-off tasks. It connects to the Docker socket and has full visibility into the Swarm.\n\n**Infisical** — Secrets store. Self-hosted with its own database. Services fetch credentials from Infisical at startup; nothing sensitive lives anywhere else in the stack.\n\n**n8n** — Workflow automation. This is the busiest service in the stack — it's connected to a handful of external APIs and runs scheduled and event-triggered automations. It persists state to a volume on the host. The workflow definitions are exported and version-controlled separately.\n\n**Firecrawl** — Documentation crawling for AI projects. I run this alongside Project Aegis and other AI tools that need to index documentation from web sources. Self-hosting it means I control the crawl rate and the data stays local.\n\n**SearXNG** — Self-hosted metasearch. Routes queries to multiple search engines without sending identifying information to any of them. Useful when Claude Code or local agents need to search the web without leaking query patterns.\n\n## The modular stack structure\n\nThe first version of this setup was a single large Compose file. Everything was defined in one place, which felt clean until the stack had eight services and adding a ninth meant scrolling through 400 lines of YAML and hoping you didn't break something in the middle.\n\nMore importantly: redeploying one service meant bringing the entire stack down or doing careful surgery on a monolithic file. It didn't scale.\n\nThe current structure is one directory per service, each with its own Compose file:\n\n```\nhomelab-swarm-stack/\n  traefik/\n    docker-compose.yml\n  portainer/\n    docker-compose.yml\n  infisical/\n    docker-compose.yml\n  n8n/\n    docker-compose.yml\n  ...\n```\n\nEach service connects to the shared `proxy-net` network for ingress (if it needs external exposure) and to service-specific networks for internal communication. The `proxy-net` network is created once and referenced as external in each Compose file.\n\nDeploying a new service: create its directory, write its Compose file, deploy with `docker stack deploy`. No other service is touched. Removing a service: `docker stack rm \u003cservice\u003e`. The rest of the stack is unaffected.\n\nThis is the same principle as microservices architecture applied to infrastructure config: each unit is independently deployable and changes to one don't risk breaking others.\n\n## What's required to maintain it\n\nThe honest answer: almost nothing. Traefik renews certs automatically. Services restart on failure via Swarm health checks. I don't do manual updates — I have a process for pulling new images and redeploying, but it's not automated (I want to be intentional about when things update).\n\nWhat does require occasional attention:\n\n**Storage.** Volumes accumulate data. n8n's database grows. I check disk usage monthly and prune what's not needed.\n\n**Infisical.** The self-hosted version needs occasional updates. These are the updates I'm most careful about — Infisical holds credentials for everything else, so a botched update has cascading effects. I test updates on a snapshot before applying to the live instance.\n\n**Network connectivity.** Occasionally a service loses connectivity to `proxy-net` after a server restart. The fix is always `docker network connect proxy-net \u003ccontainer\u003e` — it takes 10 seconds, but it's annoying enough that I documented it in the project's gotchas file.\n\n**Swarm state.** Single-node Swarm doesn't have the HA guarantees of a multi-node cluster. If the server loses power without a clean shutdown, Swarm state can get inconsistent. I keep a current export of all stack definitions so recovery is redeploy-from-scratch rather than debugging corrupted state.\n\n## What I'd do differently\n\nThe secrets management was the biggest early mistake. Environment variables in Compose files feel convenient until they're not. Infisical from the start would have saved the work of migrating everything over.\n\nThe second thing: start modular. A monolithic Compose file is tempting for the first three services because it's less overhead. By service six, you're paying for it. The directory-per-service structure takes five minutes to set up and saves hours later.\n\nEverything else, including the Swarm choice over Kubernetes, I'd make the same way.\n"])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L15\",\"homelab-docker-swarm\",{\"post\":{\"metadata\":{\"title\":\"My Homelab on Docker Swarm: What Runs, How It's Wired, What Broke\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-02\",\"summary\":\"A tour of my self-hosted infrastructure — Docker Swarm for orchestration, Traefik for ingress, Infisical for secrets, and the modular design that replaced the monolith I should never have written.\",\"image\":\"/images/blog/homelab-docker-swarm.png\",\"images\":[],\"tag\":\"Infrastructure\",\"team\":[],\"link\":\"\"},\"slug\":\"homelab-docker-swarm\",\"content\":\"$2c\"},\"thumbnail\":false,\"direction\":\"$undefined\"}]\n18:[\"$\",\"$L7\",null,{\"fillWidth\":true,\"paddingLeft\":\"64\",\"horizontal\":\"end\",\"children\":[\"$\",\"$L8\",null,{\"maxWidth\":48}]}]\n2d:T9e2,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nMy personal Claude Code configuration that I've been refining since I started using it heavily for both security automation and portfolio work. The default Claude Code setup is fine. This is what happens after you use it seriously for a few months and start fixing the parts that annoy you.\n\n## The problem with default Claude Code\n\nTwo things break down quickly:\n\n1. **No memory across sessions.** Every new conversation starts cold. You re-explain your stack, your preferences, your project context. It adds up.\n\n2. **No workflow enforcement.** Claude will happily skip tests, write unsafe code, or use npm instead of bun if you don't have rules that say otherwise.\n\n## What I built\n\n**Session context system** — Four files per project (`context-goals.md`, `context-decisions.md`, `context-progress.md`, `context-gotchas.md`) that persist across sessions. A PreCompact hook assembles them before context gets trimmed. A SessionStart hook injects the summary at the start of every new session. Claude picks up where it left off.\n\n**Custom hooks** — Shell commands that fire on tool use events:\n- PostToolUse runs Prettier and tsc after every file edit\n- PreToolUse blocks dev servers from running outside a tmux session\n- EvaluateSession extracts patterns at session end\n- SuggestCompact warns when approaching context limits\n\n**Agent definitions** — Specialized agents for recurring tasks: planner, tdd-guide, code-reviewer, security-reviewer, build-error-resolver. Each has a focused role and gets invoked for the right thing rather than dumping everything at the main agent.\n\n**Skills** — Reusable command prompts: `/plan`, `/verify`, `/simplify`, `/commit-push-pr`, `/learn`. The verify skill runs tsc → lint → tests → build in order and stops on first failure.\n\n**Global rules** — Coding style, git workflow, security checklist, package manager preferences (bun, not npm), test coverage minimums. Claude reads these on every session and actually follows them.\n\n## What it actually changed\n\nI stopped re-explaining my stack. I stopped getting npm in projects that use bun. Security checks happen before commits without me prompting. The context system means I can close a session mid-task and come back three days later without losing where I was.\n\nIt's not magic — it's just configuration that enforces the workflow I actually want.\n\n## Stack\n\n- Claude Code hooks (bash scripts)\n- CLAUDE.md (global + per-project)\n- Session context (4 markdown files per project)\n- Custom agents + skills\n"])</script><script>self.__next_f.push([1,"1b:[\"$\",\"$Lb\",\"claude-code-config\",{\"priority\":false,\"href\":\"/work/claude-code-config\",\"images\":[],\"title\":\"Claude Code Config\",\"description\":\"My production Claude Code setup — custom hooks, agents, skills, and session context system that makes AI-assisted development actually sustainable day-to-day.\",\"content\":\"$2d\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/claude-code-config\"}]\n2a:[\"$\",\"$L2e\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L2f\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":[[\"$\",\"$L3\",null,{\"as\":\"section\",\"fill\":true,\"center\":true,\"paddingBottom\":\"160\",\"children\":[[\"$\",\"span\",null,{\"className\":\"font-display font-strong font-xl mb-s\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"404\"}],[\"$\",\"h1\",null,{\"className\":\"font-display font-default font-xs neutral-on-background-strong mb-l\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Page Not Found\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"The page you are looking for does not exist.\"}]]}],[]],\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"2b:[\"$\",\"$L7\",null,{\"as\":\"footer\",\"fillWidth\":true,\"padding\":\"8\",\"horizontal\":\"center\",\"s\":{\"direction\":\"column\"},\"children\":[[\"$\",\"$L7\",null,{\"className\":\"Footer-module-s
