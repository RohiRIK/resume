hunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/62b9707294ccfacf.js\"],\"Avatar\"]\nb:I[474855,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/62b9707294ccfacf.js\"],\"ProjectCard\"]\n13:I[168027,[],\"default\"]\n:HL[\"/resume/_next/static/chunks/93ac2d54f71ec8d4.css\",\"style\"]\n:HL[\"/resume/_next/static/chunks/d20e0f0702cef329.css\",\"style\"]\n:HL[\"/resume/_next/static/chunks/3a1b43107ae24619.css\",\"style\"]\n:HL[\"/resume/_next/static/chunks/eef662fdc50843a7.css\",\"style\"]\n:HL[\"/resume/_next/static/chunks/b3a7f4834154c9dc.css\",\"style\"]\n:HL[\"/resume/_next/static/media/797e433ab948586e-s.p.dbea232f.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/resume/_next/static/media/caa3a2e1cccd8315-s.p.853070df.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\nc:T10a2,"])</script><script>self.__next_f.push([1,"\n## What it is\n\nA SOC assistant I built on my own time. The idea was simple: stop digging through documentation every time an alert fires and just ask a question in plain English.\n\nThe core is a RAG pipeline — Pinecone as the vector store, LangChain managing the retrieval and chains, Gemini 1.5 Pro doing the reasoning. It ingests security documentation, playbooks, and telemetry context, and surfaces relevant answers in seconds instead of minutes of manual searching.\n\nIt's not a product. It's a personal project that I run against real data and actually use.\n\n## Why I built it\n\nI work in security operations. A lot of the slow parts of alert triage aren't complex thinking — they're retrieval. Finding the right playbook, checking what a particular indicator means in this environment, confirming whether a behavior is expected for a given user. That's lookup work, and lookup work is exactly what RAG is good at.\n\nI wanted to see how much of that I could automate without the output becoming something you can't trust. That second part turned out to be the hard part.\n\n## How it works\n\n\u003cGrid columns=\"2\" gap=\"16\"\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"search\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eRetrieval\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eSecurity documentation and playbooks embedded into Pinecone. Queries pull the most relevant context before anything goes to the model.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"shield\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eReasoning\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eGemini 1.5 Pro handles the actual analysis — big context window matters here when you're passing in multiple documents at once.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"terminal\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eActions\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eHigh-confidence responses can trigger Logic Apps integrations — account isolation, ticket creation, analyst notification.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"openai\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eInterface\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003ePlain English queries. Ask about an alert, a user, a behavior pattern — no structured query language needed.\u003c/Text\u003e\n    \u003c/Card\u003e\n\u003c/Grid\u003e\n\n## Stack\n\n- **Orchestration**: LangChain — manages retrieval chains and the agentic loop\n- **Model**: Google Gemini 1.5 Pro — large context window was the deciding factor over GPT-4\n- **Vector store**: Pinecone — low-latency retrieval at scale\n- **Integrations**: Microsoft Sentinel, Defender XDR, Azure Logic Apps\n\n## What actually worked\n\nThe retrieval speed was genuinely good from the start. Once the embeddings were in Pinecone, lookup latency was fast enough that the bottleneck shifted entirely to the model response time, which is what you want.\n\nThe natural language interface worked better than I expected for well-defined questions — \"what's the expected login behavior for this user?\", \"show me playbook steps for lateral movement detection\" — that kind of thing.\n\n## What didn't\n\nHallucination in forensic context is a real problem. Early versions would confidently answer questions that weren't well-represented in the retrieval results. I spent a significant amount of time tuning retrieval quality — chunk sizing, embedding strategy, score thresholds — before the answers were reliable enough to act on.\n\nI also initially tried to make it too autonomous. Fully automated playbook execution sounds useful until a false positive triggers an account lockdown at 2am. The current version flags high-confidence actions for one-click confirmation rather than running them silently.\n\n## Results (personal use)\n\nTriage time on familiar alert types dropped significantly — the lookup work that was eating 15-30 minutes now takes seconds. For novel or complex incidents I still do full manual investigation, which is the right call. The assistant is a first-pass filter, not a replacement for thinking.\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"e1oX_Lc1wRmd2Lrn5O0ee\",\"c\":[\"\",\ ext/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/62b9707294ccfacf.js\"],\"Background\"]\n27:I[521247,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/62b9707294ccfacf.js\"],\"ClientFlex\"]\n28:I[402971,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/62b9707294ccfacf.js\"],\"Header\"]\n29:I[1166,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/62b9707294ccfacf.js\"],\"RouteGuard\"]\n16:Tdcb,"])</script><script>self.__next_f.push([1,"\nI work in IT security. I've sat through a lot of vendor calls. And somewhere around the third time someone told me their network appliance was \"a Zero Trust solution,\" I started keeping count.\n\nIt's not a product. It never was. Here's what it actually is.\n\n## The original idea\n\nZero Trust comes from a 2010 paper by John Kindervag at Forrester. The core insight was blunt: perimeter-based security is wrong. The assumption that everything inside your network is trusted and everything outside isn't — that model breaks the moment you have remote workers, cloud services, SaaS apps, contractors, or any real-world complexity.\n\nThe answer wasn't a new product. It was a different assumption: **trust no one by default, verify everything explicitly, and grant access based on identity and context — not network location.**\n\nThat's the model. Three sentences.\n\n## What it means operationally\n\nIf you actually implement Zero Trust, it looks like this:\n\n**Identity is the perimeter.** It doesn't matter where a request comes from — your office, a coffee shop, a data center. What matters is: who is authenticating, is that identity verified, and does this specific context (device health, location, time, risk score) justify access to this specific resource?\n\n**Least privilege, always.** Users and services get exactly the access they need for the task, nothing more. Not \"give the developer access to the dev environment\" — give this developer, on this verified device, read access to this specific service, until the session expires.\n\n**Assume breach.** Design your controls as if attackers are already inside. Segment laterally so a compromised endpoint can't reach everything. Log everything so you can detect and respond.\n\n**Continuous verification.** Authentication isn't a one-time gate at login. The trust assessment runs continuously — if device posture changes, if the user does something anomalous, trust can be revoked mid-session.\n\n## What vendors sell\n\nWhat vendors sell is: their product has a \"Zero Trust\" feature set. Sometimes that's meaningful. Conditional Access in Entra ID genuinely enforces identity-based access with device posture signals. That's a real implementation of Zero Trust principles.\n\nBut \"Zero Trust firewall\" is mostly marketing. Network segmentation is one piece of a Zero Trust architecture — it's not the whole model. A firewall doesn't verify identity. It filters traffic. That's useful, but it's not Zero Trust.\n\nThe tell is whether the product forces you to think about identity and context, or whether it's still thinking in terms of network location. If the conversation is about IP ranges and VLANs, you're still in the perimeter model with new branding.\n\n## Why it matters\n\nThe reason to care about the distinction isn't pedantry. It's that if you think Zero Trust is a product you can buy, you'll buy the product and think you're done. You won't be.\n\nThe actual work is architectural: redefining trust boundaries, implementing strong identity across all users and services, getting device health signals into access decisions, segmenting your environment so lateral movement is hard, building detection and response for when (not if) something gets through.\n\nNone of that is a product. All of it is work.\n\n---\n\nThis is the first of a few posts I'm planning on Zero Trust — what it actually means, how I've implemented pieces of it in real environments, and where the hard parts are. Next up: Conditional Access, which is where most of the practical implementation lives.\n"])</script><script>self.__next_f.push([1,"d:[\"$\",\"$L3\",null,{\"fillWidth\":true,\"gap\":\"24\",\"marginBottom\":\"l\",\"children\":[[\"$\",\"$L7\",null,{\"fillWidth\":true,\"paddingRight\":\"64\",\"children\":[\"$\",\"$L8\",null,{\"maxWidth\":48}]}],[\"$\",\"$L7\",null,{\"fillWidth\":true,\"gap\":\"24\",\"marginTop\":\"40\",\"s\":{\"direction\":\"column\"},\"children\":[[\"$\",\"$L7\",null,{\"flex\":1,\"paddingLeft\":\"l\",\"paddingTop\":\"24\",\"children\":[\"$\",\"h2\",null,{\"className\":\"font-display font-strong font-xs neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Latest from the blog\"}]}],[\"$\",\"$L7\",null,{\"flex\":3,\"paddingX\":\"20\",\"children\":[\"$\",\"$L14\",null,{\"columns\":\"2\",\"s\":{\"columns\":1},\"fillWidth\":true,\"marginBottom\":\"40\",\"gap\":\"16\",\"children\":[[\"$\",\"$L15\",\"zero-trust-is-not-a-product\",{\"post\":{\"metadata\":{\"title\":\"Zero Trust Is Not a Product\",\"subtitle\":\"\",\"publishedAt\":\"2026-02-20\",\"summary\":\"Every vendor sells 'Zero Trust.' Most of what they're selling is a marketing label on a firewall. Here's what the model actually means and why it matters.\",\"image\":\"/images/blog/zero-trust-is-not-a-product.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"zero-trust-is-not-a-product\",\"content\":\"$16\"},\"thumbnail\":false,\"direction\":\"$undefined\"}],\"$L17\"]}]}]]}],\"$L18\"]}]\n19:T749,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client running JumpCloud for MDM wanted to consolidate onto the Microsoft stack. Everything else was already in Microsoft — identity, email, security — but the device management gap meant correlating device state with identity required jumping between platforms.\n\n## What I built\n\nThe main challenge with MDM migrations is the transition gap — the window where a device is unenrolled from one MDM and not yet in another. During that time you lose policy enforcement and visibility.\n\nI wrote PowerShell scripts to handle the transition in sequence: unenroll from JumpCloud, trigger Intune enrollment, verify the device showed up in Intune before moving to the next. Ran in batches with rollback checkpoints so we could pause if something broke mid-migration.\n\n**Windows Autopilot** — registered the Windows fleet into Autopilot for zero-touch future provisioning. Extracted hardware hashes, uploaded them, configured deployment profiles per user group.\n\n**macOS via Apple Business Manager** — set up ABM integration with Intune. More involved than Windows Autopilot — had to work through the MDM profile trust chain and handle devices that had supervision issues from the JumpCloud side.\n\n**Policy parity** — translated JumpCloud's Command Library into Intune Configuration Profiles and PowerShell scripts deployed via Intune. Some mapped cleanly, some needed rethinking.\n\n## What made it hard\n\nA subset of devices had been enrolled in JumpCloud via a method that left a persistent MDM profile the script couldn't cleanly remove. Those had to be handled manually. Also found several macOS devices enrolled by users personally rather than via ABM, which broke the supervision requirement for certain policies.\n\n## Stack\n\n- Microsoft Intune\n- JumpCloud\n- Windows Autopilot\n- Apple Business Manager\n- PowerShell \u0026 Microsoft Graph API\n"])</script><script>self.__next_f.push([1,"1a:T6db,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client at Oncloud decided to move their entire identity and collaboration stack from Google Workspace to Microsoft 365. I was the lead engineer on the migration — responsible for technical execution from discovery through cutover.\n\n## What the work looked like\n\n**Identity migration** — mapped thousands of Google identities into a clean Entra ID tenant, standardized naming conventions, consolidated accounts that had duplicated from acquisitions. Set up SSO from scratch with Entra ID as the new IdP.\n\n**Data migration via AvePoint Fly** — handled mailbox and Google Drive to SharePoint/OneDrive transfer. The hard part wasn't the tool — it was the permission mapping. Google Drive's sharing model doesn't translate cleanly to SharePoint. Spent significant time building mapping rules to preserve access rather than just moving data and leaving people unable to open their files.\n\n**Mail cutover** — ran split-delivery during the transition so mail kept flowing to both platforms while users moved over. Managed the DNS cutover window to avoid gaps.\n\n**SSO re-mapping** — the client had 50+ SaaS applications pointed at Google as IdP. Reconfigured each for SAML/OIDC against Entra ID. Most were straightforward; a few needed custom attribute mappings.\n\n## What made it hard\n\nThe data migration took longer than scoped. The client's Google Drive was far messier than discovery suggested — deeply nested shared drives with complex permission inheritance, orphaned files, and accounts that no longer existed but still owned content. We had to build a pre-migration cleanup process that wasn't in the original plan.\n\n## Stack\n\n- AvePoint Fly\n- Microsoft Entra ID\n- Google Workspace APIs\n- Microsoft Graph API\n- PowerShell\n"])</script><script>self.__next_f.push([1,"e:[\"$\",\"$L3\",null,{\"fillWidth\":true,\"gap\":\"xl\",\"marginBottom\":\"40\",\"paddingX\":\"l\",\"children\":[[\"$\",\"$Lb\",\"jumpcloud-to-intune-migration\",{\"priority\":true,\"href\":\"/work/jumpcloud-to-intune-migration\",\"images\":[],\"title\":\"JumpCloud to Intune Migration\",\"description\":\"MDM consolidation from JumpCloud to Microsoft Intune — automated unenrollment, Autopilot provisioning, and policy parity for a mixed Windows and macOS fleet.\",\"content\":\"$19\",\"avatars\":[],\"link\":\"\"}],[\"$\",\"$Lb\",\"gcp-to-entra-migration\",{\"priority\":true,\"href\":\"/work/gcp-to-entra-migration\",\"images\":[],\"title\":\"GCP to Entra ID Migration\",\"description\":\"Full identity and collaboration migration from Google Workspace to Microsoft 365 — mailboxes, Drive data, SSO re-mapping across 50+ apps, and tenant consolidation.\",\"content\":\"$1a\",\"avatars\":[],\"link\":\"\"}],\"$L1b\"]}]\nf:[\"$\",\"$L1c\",null,{}]\n10:[\"$\",\"script\",\"script-0\",{\"src\":\"/resume/_next/static/chunks/62b9707294ccfacf.js\",\"async\":true,\"nonce\":\"$undefined\"}]\n11:[\"$\",\"$L1d\",null,{\"children\":[\"$\",\"$1e\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@1f\"}]}]\n12:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L20\",null,{\"children\":\"$L21\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L22\",null,{\"children\":[\"$\",\"$1e\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L23\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n24:T771,"])</script><script>self.__next_f.push([1,"\n              (function() {\n                try {\n                  const root = document.documentElement;\n                  const defaultTheme = 'system';\n                  \n                  // Set defaults from config\n t\":\"$undefined\",\"width\":\"$undefined\",\"height\":\"$undefined\",\"aspectRatio\":\"$undefined\",\"textAlign\":\"$undefined\",\"cursor\":\"$undefined\"},\"children\":[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"display-flex position-relative justify-center min-width-0 fill-width \",\"style\":{\"maxWidth\":\"$undefined\",\"minWidth\":\"$undefined\",\"minHeight\":\"var(--static-space-0)\",\"maxHeight\":\"$undefined\",\"width\":\"$undefined\",\"height\":\"$undefined\",\"aspectRatio\":\"$undefined\",\"textAlign\":\"$undefined\",\"cursor\":\"$undefined\"},\"children\":[\"$\",\"$L29\",null,{\"children\":\"$L2a\"}]}]}],\"$L2b\"]}]}]]}]\n"])</script><script>self.__next_f.push([1,"2e:I[339756,[\"/resume/_next/static/chunks/d96012bcfc98706a.js\",\"/resume/_next/static/chunks/73e3194f06db260e.js\"],\"default\"]\n2f:I[837457,[\"/resume/_next/static/chunks/d96012bcfc98706a.js\",\"/resume/_next/static/chunks/73e3194f06db260e.js\"],\"default\"]\n30:I[298229,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/62b9707294ccfacf.js\"],\"IconButton\"]\n2c:T15a9,"])</script><script>self.__next_f.push([1,"\nIf you're running Microsoft 365 and you're serious about Zero Trust, Conditional Access is where most of the actual work happens. It's the enforcement layer that sits between your users and your apps — evaluating identity, device health, location, and risk signals before granting access.\n\nI've built Conditional Access policies for several client environments. Here's what I've learned.\n\n## What Conditional Access actually does\n\nEvery time a user or service authenticates to an Entra ID-protected resource, a Conditional Access evaluation runs. The policy engine looks at:\n\n- **Who** is authenticating (user, group, service principal)\n- **What** they're trying to access (specific app, all apps, admin portals)\n- **What device** they're on (managed/unmanaged, compliant/non-compliant, platform)\n- **Where** they're coming from (location, named network, country)\n- **What risk signals** are active (Entra ID Protection scores for sign-in risk and user risk)\n\nBased on those signals, the policy either grants access, blocks it, or grants it conditionally — requiring MFA, a compliant device, a specific authentication strength, or a terms of use agreement.\n\nThat's a powerful model. It lets you say things like: \"Engineers can access production resources, but only from compliant managed devices, always with phishing-resistant MFA, and if their sign-in risk is elevated, block until IT reviews.\"\n\n## The baseline everyone should have\n\nBefore you build anything sophisticated, you need a working baseline. Microsoft publishes reference policies — here's what I actually deploy in every environment:\n\n**Block legacy authentication.** Legacy protocols (SMTP, IMAP, POP) don't support modern authentication and can't do MFA. They're a bypass. Block them early, before anything else.\n\n**Require MFA for all users.** Not just admins. Everyone. If you have users who push back, that's a change management problem, not a reason to skip this.\n\n**Require MFA for Azure management.** Separately target the Azure portal, CLI, and PowerShell. Admin operations get their own policy with stricter requirements.\n\n**Require phishing-resistant MFA for privileged roles.** FIDO2 keys or Windows Hello for Business, not TOTP or push notifications. For Global Admins and other privileged roles, the bar should be higher.\n\n**Block access from high-risk sign-ins.** If Entra ID Protection flags a sign-in as high risk (unfamiliar location, anonymized IP, impossible travel), block it automatically. Don't wait for the help desk to notice.\n\nThat's a solid baseline. Everything after that is refinement.\n\n## What I've seen go wrong\n\n**Report-only mode left on forever.** Report-only is how you test policies without enforcing them. It's useful for a rollout period. It's not a substitute for actual enforcement. I've seen environments with 50 policies in report-only that haven't been reviewed in 18 months. None of them are doing anything.\n\n**The \"break glass\" account problem.** Emergency access accounts need to be excluded from most Conditional Access policies so you can recover if something goes wrong. But those exclusions need to be carefully scoped and regularly audited. A break-glass account excluded from everything with a weak password is a liability.\n\n**Policy conflicts and grant vs. block precedence.** If a user matches both a grant policy and a block policy for the same resource, block wins. Always. This is correct behavior but it's surprising when you don't expect it. Test with the What If tool before deploying.\n\n**Not targeting service principals.** Conditional Access now supports workload identities — service principals and managed identities. Most environments I inherit don't have any policies targeting these. That's a gap.\n\n**Named locations that don't mean anything.** I've seen \"Trusted Location\" policies that include half the world's IP ranges because someone didn't want to deal with VPN. Named locations are only useful if they actually represent trusted networks.\n\n## Device compliance as a gate\n\nOne of the most effective Conditional Access patterns is requiring device compliance for access to sensitive resources. If you're managing devices with Intune, you can define compliance policies (encryption enabled, OS version, no jailbreak, etc.) and then gate access on whether the device passes.\n\nThis is powerful because it closes the \"personal device on managed app\" gap. A user can't just install Outlook on a random machine and access Exchange — they need to enroll the device and meet compliance requirements first.\n\nThe rollout order matters here. If you require compliance before your device enrollment is complete, you lock people out. Usually you want:\n1. Build compliance policies\n2. Deploy to managed devices, verify they pass\n3. Enable Conditional Access requirement in report-only\n4. Review the report-only logs for unexpected blocks\n5. Switch to enforce\n\n## Monitoring\n\nConditional Access sign-in logs are detailed and searchable. At minimum, review:\n- Failures due to non-compliant devices (often legitimate issues to fix)\n- Blocks from unfamiliar locations (often noise, occasionally real)\n- Blocks due to user risk (worth investigating each one)\n\nKQL queries against the sign-in logs in Log Analytics give you more flexibility than the portal UI. If you're in Sentinel, this is where you build your detection rules.\n\n---\n\nNext post: endpoint hardening as a Zero Trust control — because Conditional Access requiring a \"compliant device\" is only as good as what your compliance policies actually check.\n"])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L15\",\"conditional-access-in-practice\",{\"post\":{\"metadata\":{\"title\":\"Conditional Access in Practice\",\"subtitle\":\"\",\"publishedAt\":\"2026-02-15\",\"summary\":\"Conditional Access is where Zero Trust principles actually land in a Microsoft environment. Here's how to think about it, what to get right, and where I've seen it go wrong.\",\"image\":\"/images/blog/conditional-access-in-practice.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"conditional-access-in-practice\",\"content\":\"$2c\"},\"thumbnail\":false,\"direction\":\"$undefined\"}]\n18:[\"$\",\"$L7\",null,{\"fillWidth\":true,\"paddingLeft\":\"64\",\"horizontal\":\"end\",\"children\":[\"$\",\"$L8\",null,{\"maxWidth\":48}]}]\n2d:T9e2,"])</script><script>self.__next_f.push([1,"\n## What this is\n\nMy personal Claude Code configuration that I've been refining since I started using it heavily for both security automation and portfolio work. The default Claude Code setup is fine. This is what happens after you use it seriously for a few months and start fixing the parts that annoy you.\n\n## The problem with default Claude Code\n\nTwo things break down quickly:\n\n1. **No memory across sessions.** Every new conversation starts cold. You re-explain your stack, your preferences, your project context. It adds up.\n\n2. **No workflow enforcement.** Claude will happily skip tests, write unsafe code, or use npm instead of bun if you don't have rules that say otherwise.\n\n## What I built\n\n**Session context system** — Four files per project (`context-goals.md`, `context-decisions.md`, `context-progress.md`, `context-gotchas.md`) that persist across sessions. A PreCompact hook assembles them before context gets trimmed. A SessionStart hook injects the summary at the start of every new session. Claude picks up where it left off.\n\n**Custom hooks** — Shell commands that fire on tool use events:\n- PostToolUse runs Prettier and tsc after every file edit\n- PreToolUse blocks dev servers from running outside a tmux session\n- EvaluateSession extracts patterns at session end\n- SuggestCompact warns when approaching context limits\n\n**Agent definitions** — Specialized agents for recurring tasks: planner, tdd-guide, code-reviewer, security-reviewer, build-error-resolver. Each has a focused role and gets invoked for the right thing rather than dumping everything at the main agent.\n\n**Skills** — Reusable command prompts: `/plan`, `/verify`, `/simplify`, `/commit-push-pr`, `/learn`. The verify skill runs tsc → lint → tests → build in order and stops on first failure.\n\n**Global rules** — Coding style, git workflow, security checklist, package manager preferences (bun, not npm), test coverage minimums. Claude reads these on every session and actually follows them.\n\n## What it actually changed\n\nI stopped re-explaining my stack. I stopped getting npm in projects that use bun. Security checks happen before commits without me prompting. The context system means I can close a session mid-task and come back three days later without losing where I was.\n\nIt's not magic — it's just configuration that enforces the workflow I actually want.\n\n## Stack\n\n- Claude Code hooks (bash scripts)\n- CLAUDE.md (global + per-project)\n- Session context (4 markdown files per project)\n- Custom agents + skills\n"])</script><script>self.__next_f.push([1,"1b:[\"$\",\"$Lb\",\"claude-code-config\",{\"priority\":false,\"href\":\"/work/claude-code-config\",\"images\":[],\"title\":\"Claude Code Config\",\"description\":\"My production Claude Code setup — custom hooks, agents, skills, and session context system that makes AI-assisted development actually sustainable day-to-day.\",\"content\":\"$2d\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/claude-code-config\"}]\n2a:[\"$\",\"$L2e\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L2f\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":[[\"$\",\"$L3\",null,{\"as\":\"section\",\"fill\":true,\"center\":true,\"paddingBottom\":\"160\",\"children\":[[\"$\",\"span\",null,{\"className\":\"font-display font-strong font-xl mb-s\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"404\"}],[\"$\",\"h1\",null,{\"className\":\"font-display font-default font-xs neutral-on-background-strong mb-l\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Page Not Found\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"The page you are looking for does not exist.\"}]]}],[]],\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"2b:[\"$\",\"$L7\",null,{\"as\":\"footer\",\"fillWidth\":true,\"padding\":\"8\",\"horizontal\":\"c
