is version replaces the markdown context files with a SQLite-backed long-term memory system, a dedicated MCP server that exposes LTM primitives to Claude directly, semantic recall with embedding fallback, a graph reasoning layer, and an EvaluateSession hook that extracts decisions and patterns automatically at session end.\n\nHere's what changed and why.\n\n## From markdown files to SQLite\n\nThe old system: four `.md` files per project (`context-goals.md`, `context-decisions.md`, `context-progress.md`, `context-gotchas.md`). Hooks read and wrote them. They worked until they didn't — duplicates accumulated, stale entries couldn't be cleaned up automatically, and there was no way to query across them.\n\nThe new system: a single SQLite database at `~/.claude/memory/ltm.db`. Two main tables:\n\n- `memories` — long-term insights, patterns, and decisions. Each row has content, category (`preference | architecture | gotcha | pattern | workflow | constraint`), importance score (1–5), project scope (nullable for globals), tags, and a decay counter.\n- `context_items` — short-term session context. Goals, decisions, progress, and gotchas per project. These expire if a project is inactive for 14 days.\n\nThe schema separation is deliberate. `context_items` are the working memory for an active project — things you need right now. `memories` are the durable knowledge base — things you want to remember across all future sessions.\n\n## The LTM MCP server\n\nThe previous config had Claude calling shell scripts to read and write memory. That worked but was brittle and required careful prompt engineering to get Claude to use it consistently.\n\nThe new approach: a dedicated MCP server (`ltm` server in `settings.json`) that exposes LTM as first-class MCP tools. Claude has native access to:\n\n- `ltm_recall` — FTS5 full-text search across memories with semantic fallback\n- `ltm_learn` — store a new memory or reinforce an existing one\n- `ltm_relate` — create typed relationships between memories\n- `ltm_forget` — delete a memory by ID\n- `ltm_context` — get merged context (globals + project-scoped memories)\n- `ltm_graph` — traverse the memory graph from seed nodes\n- `ltm_context_items` — get context items (goals, decisions, progress, gotchas) for a project\n\nWith the MCP server active, Claude uses these tools directly without me having to orchestrate shell calls. The pattern in `CLAUDE.md` is now explicit: call `mcp__ltm__ltm_recall` before any non-trivial task, call `mcp__ltm__ltm_learn` after discovering a non-obvious pattern.\n\n## Semantic recall with embedding fallback\n\n`ltm_recall` does FTS5 full-text search first. If the FTS5 results are below a threshold, it triggers a semantic fallback: it calls an embedding API, generates a vector for the query, and does cosine similarity search against stored embeddings.\n\nThe implementation in `memory/db.ts`:\n\n```typescript\nexport async function recall(query: string, limit = 10): Promise\u003cMemory[]\u003e {\n  const ftsResults = searchFts(query, limit);\n  if (ftsResults.length \u003e= limit * 0.6) return ftsResults;\n\n  // Semantic fallback\n  if (config.ltm.semanticFallback) {\n    const similar = await getSimilarMemories(query, limit);\n    return deduplicateMerge(ftsResults, similar);\n  }\n  return ftsResults;\n}\n```\n\nThe graceful degradation is important: if the embedding API fails, the FTS5 results are still returned. Semantic search is an enhancement, not a dependency.\n\n## Graph-based reasoning\n\nMemories can have typed relationships: `supports`, `contradicts`, `refines`, `depends_on`, `related_to`, `supersedes`. These are stored in a `memory_relations` table.\n\nThe `ltm_graph` tool does BFS traversal from seed nodes up to a configurable depth. The `getContextMergeWithGraph` function in `db.ts` uses this to build a richer context injection at session start — rather than just listing top memories, it traverses the graph from the most important ones and includes related memories that would otherwise rank below the injection cutoff.\n\nIn practice this surfaces things like: \"This pattern (memory 88) supports this architectural decision (memory 44) which was made in the context of this constraint (memory 31).\" The chain gives Claude more context than any individual memory provides alone.\n\nGraph reasoning is gated behind `config.ltm.graphReasoning = true` — it's off by default because it increases session start time and token usage.\n\n## The EvaluateSession hook\n\nThe most significant behavioral change: a `SessionEnd` / `EvaluateSession` hook that runs an LLM call at session end to extract decisions, patterns, and gotchas from the session transcript and write them to LTM automatically.\n\nPreviously, learning required a manual `/learn` call. Most things worth remembering never got learned because they were discovered mid-task and I didn't stop to capture them.\n\nThe EvaluateSession hook:\n1. Gets a compressed summary of the session (the existing PreCompact summary if available, or a fresh one)\n2. Sends it to Claude with a structured extraction prompt asking for: decisions made, patterns discovered, gotchas encountered, progress achieved\n3. Writes each extracted item to `ltm_learn` with appropriate category and importance\n4. Also updates `context_items` for the project with any progress or decisions\n\nThe hook is gated behind `config.ltm.evaluateSessionLlm = true`. When enabled, every session that produces non-trivial work automatically contributes to the knowledge base.\n\n## Memory decay and the Janitor\n\nMemories have an importance score (1–5). Memories at importance 5 never decay — these are the global rules and constraints that must always be in context. Lower-importance memories decay over time if not accessed or reinforced.\n\nA Janitor agent runs periodically to:\n- Decay memories that haven't been accessed recently\n- Identify near-duplicate memories (via embedding similarity) and merge them\n- Flag memories that haven't been accessed in 90+ days for review\n- Prune memories that have decayed below a minimum threshold\n\nThe Janitor runs as a standalone script (`memory/janitor.ts`) triggered by a cron-like scheduler in the background. It's not a hook — it runs independently of sessions.\n\nThe D3 graph visualization app (from the previous post) makes this visible: strong memories glow, decaying ones dim, and the Janitor's merge/prune operations leave a visible trail.\n\n## What the config looks like now\n\nThe `CLAUDE.md` instruction for LTM is explicit:\n\n\u003e Before any non-trivial task: call `mcp__ltm__ltm_recall` with the topic as query.\n\u003e After discovering a non-obvious pattern or gotcha: call `mcp__ltm__ltm_learn`.\n\u003e When making an architectural decision: call `mcp__ltm__ltm_learn` with `category=architecture`.\n\nThe hooks (`SessionStart`, `EvaluateSession`, `PreCompact`) do the background work. The MCP tools give Claude direct access. The decay and Janitor processes keep the database clean without manual curation.\n\n## What's still rough\n\nThe semantic fallback adds latency to recall — a few hundred milliseconds on a fast connection, more if the embedding API is cold. FTS5 is fast enough that most recalls don't trigger it, but it's noticeable when it does.\n\nThe EvaluateSession extraction isn't perfect. The LLM sometimes over-extracts (trivial things get stored as memories) and occasionally misses important architectural decisions. The category classification is roughly right but imprecise. These are prompt engineering problems that improve over time as the extraction prompt gets tuned.\n\nThe Janitor's duplicate detection via embedding similarity occasionally merges things that shouldn't be merged. Conservative threshold is better — set the similarity cutoff high enough that only near-identical memories get merged.\n\n---\n\nThe overall shift is from \"context files I remember to maintain\" to \"a knowledge base that maintains itself.\" Sessions contribute to it automatically, the Janitor keeps it clean, and recall surfaces relevant history before I start any significant work. The manual hygiene work that v1 and v2 required is mostly gone.\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"Te95fBFlgi-AYBEyx30P5\",\"c\":[\"\",\"blog\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"blog\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],[[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/93ac2d54f71ec8d4.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"link\",\"1\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/d20e0f0702cef329.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"link\",\"2\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/3a1b43107ae24619.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"link\",\"3\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/eef662fdc50843a7.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"link\",\"4\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/b3a7f4834154c9dc.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/6633d7a0fde019af.js\",\"async\":true,\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-1\",{\"src\":\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"async\":true,\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-2\",{\"src\":\"/_next/static/chunks/21f080b07a2c63d8.js\",\"async\":true,\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-3\",{\"src\":\"/_next/static/chunks/0e235429b8fbdec6.js\",\"async\":true,\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-4\",{\"src\":\"/_next/static/chunks/2079049d5abbbd3d.js\",\"async\":true,\"nonc atic/chunks/8ac4e8555f09f41a.js\"],\"Background\"]\n2d:I[521247,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"ClientFlex\"]\n2e:I[402971,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\"],\"Header\"]\n2f:I[1166,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\"],\"RouteGuard\"]\n11:T17c7,"])</script><script>self.__next_f.push([1,"\nEvery IT team has some version of the same problem: the MDM says one thing, Active Directory says another, and the spreadsheet someone maintains manually is a third opinion. Nobody knows the real device count. Nobody knows which machines are stale. Asset reviews are a manual reconciliation exercise that takes days and is wrong before it's finished.\n\nFor a FinTech client, I built a pipeline that pulls from every authoritative source — AD, Intune, Azure, MDE — and produces a single unified inventory that's always current. Here's the architecture.\n\n## The data problem\n\nThe client had devices across three categories:\n- **Windows workstations**: domain-joined, Intune-enrolled, some hybrid Entra joined\n- **Azure VMs**: not domain-joined, sometimes Intune-enrolled, MDE-onboarded\n- **Legacy machines**: domain-joined only, no Intune, no MDE\n\nNo single system had the full picture. Intune knew about enrolled devices but didn't know about the legacy machines. AD knew about everything domain-joined but didn't know about Azure VMs or compliance state. MDE knew about onboarded endpoints but didn't map cleanly to AD objects.\n\nThe goal: a unified record per device with attributes from all sources — last seen, OS version, compliance state, MDE sensor status, assigned user, department, location.\n\n## The architecture\n\nFour components:\n\n**1. Jenkins** — scheduler and orchestrator. A pipeline job runs nightly and on-demand. It calls the PowerShell scripts in sequence, handles retries, and sends a completion notification.\n\n**2. PowerShell scripts** — data collection and normalization. One script per source, plus a merge script. Each script outputs structured JSON to a staging directory on the Jenkins agent.\n\n**3. SharePoint List** — the inventory store and intermediate layer. PowerShell writes the merged records to a SharePoint list via the SharePoint REST API or PnP PowerShell. The list is the single source of truth that other systems can query.\n\n**4. Power BI** — visualization layer. A Power BI report connects directly to the SharePoint list and refreshes on a schedule. This is the dashboard the IT team and management use.\n\n## The data collection scripts\n\n**AD collector**: Uses `Get-ADComputer` with `-Properties *` to pull all computer objects. Captures name, distinguished name, last logon timestamp, OS version, description, and organizational unit. Filters out disabled objects and objects not seen in 90 days.\n\n```powershell\nGet-ADComputer -Filter * -Properties LastLogonDate, OperatingSystem, Description |\n  Where-Object { $_.LastLogonDate -gt (Get-Date).AddDays(-90) } |\n  Select-Object Name, DistinguishedName, LastLogonDate, OperatingSystem, Description |\n  ConvertTo-Json | Out-File \"$stagingPath\\ad-devices.json\"\n```\n\n**Intune collector**: Uses the Microsoft Graph PowerShell SDK. Calls `Get-MgDeviceManagementManagedDevice` to get all enrolled devices with compliance state, last sync time, enrolled user, and device category.\n\n**MDE collector**: Uses the Defender for Endpoint API (via a service principal with `Machine.Read.All`). Gets onboarding status, sensor health, last seen timestamp, and risk level for every endpoint.\n\n**Azure VM collector**: Uses `Get-AzVM` across all subscriptions the service principal has access to. Gets VM name, resource group, location, OS, running state, and any tags with owner/department information.\n\n## The merge script\n\nThe merge script is where the real work happens. It loads all four JSON files and joins them on device name. The join logic:\n\n1. AD is the primary key source — every AD computer object gets a record\n2. Intune records are matched to AD by device name (normalized to uppercase)\n3. MDE records are matched by hostname\n4. Azure VMs get their own records (no AD object)\n\nFor each merged record, the script calculates derived fields:\n- `managementState`: `fully-managed` (Intune + MDE), `partially-managed` (Intune only or MDE only), `unmanaged` (AD only)\n- `staleness`: days since last seen across all sources\n- `complianceGap`: boolean — in Intune but not compliant\n\nThe merged output is an array of device objects written to `merged-inventory.json`.\n\n## Writing to SharePoint\n\nPnP PowerShell handles the SharePoint write. The script compares the merged inventory against the current SharePoint list state (pulled at the start of the run) and does a delta update: new devices are added, existing devices are updated, devices not seen in 90 days are flagged as stale.\n\nDoing a delta update rather than a full replace matters for performance (the list had 2,000+ items) and for preserving any manual annotations added by the IT team directly in the list.\n\n## Power BI on top\n\nThe Power BI report connects to the SharePoint list as a data source and refreshes daily. Key views:\n\n- **Management coverage**: pie/bar showing how many devices are fully managed vs. partially managed vs. unmanaged\n- **Stale devices**: list of devices not seen in 30+ days, sorted by staleness\n- **Compliance gaps**: devices enrolled in Intune but not passing compliance policy\n- **MDE coverage**: which devices have an active sensor vs. not\n\nThe report is embedded in a Teams tab so the IT team has it in their daily context without going to Power BI directly.\n\n## What it replaced\n\nBefore this pipeline: a manually-maintained Excel spreadsheet updated every quarter. It was always wrong. MDE coverage reports were run manually when someone asked. Compliance gaps were invisible until a CA policy blocked a user.\n\nAfter: a nightly automated run, a SharePoint list the IT team trusts, and a Power BI dashboard the security team uses in their weekly review.\n\nThe pipeline has run without manual intervention for over a year. When a new device shows up as unmanaged, the report flags it. When a compliance gap appears, the security team sees it the next morning.\n\n---\n\nThe architecture is not complicated. Jenkins, PowerShell, SharePoint, Power BI are tools every Microsoft-focused IT team already has. The value is in putting them together deliberately and removing the manual reconciliation step entirely.\n"])</script><script>self.__next_f.push([1,"a:[\"$\",\"$L7\",null,{\"columns\":\"2\",\"s\":{\"columns\":1},\"fillWidth\":true,\"marginBottom\":\"40\",\"gap\":\"16\",\"children\":[[\"$\",\"$L8\",\"device-inventory-pipeline\",{\"post\":{\"metadata\":{\"title\":\"Building a Device Inventory Pipeline\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-20\",\"summary\":\"When your MDM doesn't tell the full story, build the pipeline yourself. Here's the Jenkins → PowerShell → SharePoint → Power BI architecture I built to unify device data across AD and Intune for a FinTech client.\",\"image\":\"/images/blog/device-inventory-pipeline.png\",\"images\":[],\"tag\":\"Automation\",\"team\":[],\"link\":\"\"},\"slug\":\"device-inventory-pipeline\",\"content\":\"$11\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L12\"]}]\nb:[\"$\",\"h2\",null,{\"className\":\"font-heading font-strong font-xl neutral-on-background-strong ml-l\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Earlier posts\"}]\n13:T1cbd,"])</script><script>self.__next_f.push([1,"\nJumpCloud is a reasonable MDM choice for early-stage companies. It's cross-platform, handles basic device management, and works without a Microsoft stack. But at some point, most orgs that run on Microsoft 365 hit the ceiling: JumpCloud doesn't integrate cleanly with Conditional Access, Defender for Endpoint, Microsoft Purview, or Entra ID — and you end up managing two parallel identity and device stacks that are increasingly hard to reconcile.\n\nFor a Trading Platform client, that moment came when they needed to enforce Conditional Access requiring Intune-compliant devices and couldn't do it cleanly while still running JumpCloud as the MDM authority. The decision was to exit JumpCloud fully and migrate to the Microsoft stack: Intune + Entra ID + MDE. 200+ devices, Windows and macOS, in active use.\n\nHere's what the migration actually looked like.\n\n## Pre-migration: mapping what you have\n\nBefore touching a single device, you need a complete inventory. JumpCloud has an API and an export — use it. Every device, every user assignment, every policy.\n\nThe questions that matter:\n- Which devices are corporate-owned vs. BYOD?\n- Which are Entra ID joined, hybrid joined, or just AD domain-joined?\n- What JumpCloud policies are active and what do they enforce?\n- What software is deployed via JumpCloud?\n- Are there any devices running macOS versions below your Intune minimum?\n\nThis mapping takes time and it's worth it. Every surprise you find now is one you don't hit mid-migration with a user locked out.\n\n## The enrollment approach: hybrid vs. clean\n\nThe most important decision before you start: do you migrate devices in-place (install Intune agent while JumpCloud is still running) or do you wipe and re-enroll?\n\nFor most Windows devices at this client, we did in-place migration:\n1. Deploy the Intune management extension via a JumpCloud script\n2. Complete Entra ID registration (Hybrid Join or Entra Join depending on whether AD was still in scope)\n3. Verify Intune enrollment and compliance\n4. Remove JumpCloud agent\n\nFor macOS, in-place MDM migration is not reliably supported. The MDM profile can only be removed and replaced cleanly if the device is wiped or if the user is an admin. For corporate macOS machines, we did wipe-and-enroll through Autopilot for Windows equivalents, and ADE (Apple Device Enrollment) for macOS via Apple Business Manager.\n\nA small number of edge-case machines — old hardware, non-standard configurations, machines where the JumpCloud agent was broken — got clean wipes.\n\n## Windows: the Hybrid Join question\n\nMost of the Windows devices were domain-joined (on-prem AD) and JumpCloud-managed. For Intune, you need devices to be at minimum Entra ID registered, and ideally Hybrid Entra Joined (domain-joined + Entra ID joined) or pure Entra Joined.\n\nHybrid Join was the right call here because the client still had on-prem AD in active use. We configured the Hybrid Join process via Entra Connect and deployed the Intune enrollment policy to the domain via GPO.\n\nThe sequence per device:\n1. Entra Connect syncs the computer object\n2. Device completes Hybrid Join (takes up to a sync cycle — 30 minutes typically)\n3. Intune auto-enrollment triggers via GPO\n4. MDE onboarding completes\n5. Compliance policy evaluates — device either passes or gets a grace period\n\nThe most common failure mode: time sync issues preventing the device from completing Kerberos-based Hybrid Join. Fix NTP before you start.\n\n## macOS: Apple Business Manager and ADE\n\nFor macOS, we onboarded the org to Apple Business Manager, linked ABM to Intune, and created an ADE enrollment profile. This gives you MDM-supervised devices with the highest management capability — no user-removable MDM profile, full app management, FileVault key escrow.\n\nThe catch: ADE applies to new-to-Intune devices. Devices already in ABM from a previous enrollment can be reassigned. Devices that were never in ABM can't be retrofitted into supervised ADE without a wipe and re-enrollment through Apple Configurator.\n\nFor the macOS fleet at this client, about 40% were already in ABM from prior management. Those were reassigned to the Intune enrollment profile. The rest were wiped and re-enrolled, with users scheduled for migration days with IT on-site.\n\n## Compliance: don't enforce before enrollment is complete\n\nConditional Access requiring Intune compliance was the end goal, but it cannot be the starting state. If you enable the CA policy before your devices are enrolled and passing compliance, you lock out every user on a device that hasn't completed migration.\n\nThe rollout order:\n1. Build compliance policies (OS version, encryption, MDE sensor active, no jailbreak/rooted)\n2. Deploy compliance policies to devices as they enroll — in report-only initially\n3. Set a grace period (we used 7 days) during which non-compliant devices get access with a compliance notification\n4. Once \u003e90% of devices are enrolled and compliant, enable the CA policy in report-only\n5. Review report-only logs for unexpected blocks\n6. Enable enforcement\n\nThe 7-day grace period is important. It means a device that's being migrated this week doesn't block the user today.\n\n## Decommissioning JumpCloud\n\nOnce all devices were verified enrolled in Intune and passing compliance, we removed the JumpCloud agent. The sequence:\n1. Verify Intune enrollment and compliance status for the device\n2. Confirm all software previously deployed via JumpCloud is now deployed via Intune (app deployments migrated to Intune Win32 apps and Managed App Store apps)\n3. Uninstall JumpCloud agent via Intune script\n4. Remove device from JumpCloud console\n5. Cancel JumpCloud license\n\nThe license cancellation was the milestone. At that point, Intune was the single MDM authority.\n\n## What broke\n\nA few things caught us mid-migration:\n\n**JumpCloud FileVault keys.** JumpCloud escrows FileVault recovery keys separately. Once JumpCloud was removed from macOS, those keys were gone. We rotated FileVault before removing JumpCloud, escrowing the new key to Intune. Any device where we missed this step required on-site recovery.\n\n**App deployments tied to JumpCloud.** Several internal tools were deployed and configured via JumpCloud scripts. We had to rebuild those as Intune Win32 app packages before migrating those devices. The inventory step at the start should catch these — ours caught most but not all.\n\n**Devices in shared-use scenarios.** Shared lab workstations with multiple user accounts needed special handling for Intune enrollment since enrollment ties to a primary user in Intune's model.\n\n## The result\n\n80+ tasks over about four months. At the end: 200+ devices enrolled in Intune, MDE sensors active on all of them, Conditional Access enforcing compliance as a gate, and JumpCloud fully off the books.\n\nThe bigger win was architectural: one identity stack (Entra ID), one MDM authority (Intune), one endpoint security platform (MDE), all integrated. Conditional Access can now see device compliance state and make real-time access decisions — something that wasn't possible while JumpCloud was in the picture.\n\n---\n\nIf you're planning a JumpCloud exit, the pre-migration inventory and the compliance grace period are the two things that will determine whether the migration is smooth. Get the inventory right, and don't enforce before you enroll.\n"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L7\",null,{\"columns\":\"2\",\"s\":{\"columns\":1},\"fillWidth\":true,\"marginBottom\":\"40\",\"gap\":\"16\",\"children\":[[\"$\",\"$L8\",\"jumpcloud-to-intune-migration\",{\"post\":{\"metadata\":{\"title\":\"The JumpCloud Exit Playbook\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-20\",\"summary\":\"Migrating 200+ Windows and macOS devices from JumpCl t><script>self.__next_f.push([1,"41:I[778454,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"Row\"]\n42:I[298229,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"IconButton\"]\n32:T1a33,"])</script><script>self.__next_f.push([1,"\nMost identity platforms are configured once and then drift. The IdP has the org chart from six months ago. The HR system has been updated 50 times since then — new hires, promotions, reorgs, contractor conversions — and none of it flowed downstream.\n\nThe result: Active Directory has the wrong department for half the engineering team, Entra ID shows reporting lines from two restructures ago, and the extension attributes that should drive Conditional Access logic are either empty or stale. The HR system has clean data. The IdP does not.\n\nFor an OT Security client, I built a sync between HiBob (their HRIS) and Entra ID / on-premises AD that runs on a schedule and keeps 18 attributes current. Here's how it works.\n\n## What HiBob knows that Entra doesn't\n\nHiBob is the HR system of record. It owns:\n- Department and sub-department\n- Job title and job level\n- Manager (reporting line)\n- Employment type (full-time, part-time, contractor)\n- Start date and tenure\n- Site/office location\n- Cost center\n- Custom fields: clearance level, team function, contractor company\n\nEntra ID has fields that map to most of these — `department`, `jobTitle`, `manager`, `employeeType`, `extensionAttribute1–15` — but they're only as current as the last time someone manually updated them. At most clients, that's \"not recently.\"\n\n## The architecture\n\nThree components:\n\n**HiBob API** — the source. HiBob has a REST API with token-based auth. The key endpoints are `/v1/people` (list all employees) and `/v1/people/{id}` (get individual profile). The API returns rich profile data including all custom fields.\n\n**Azure Automation Runbook** — the sync engine. A PowerShell runbook runs on a schedule (nightly + on-demand for urgent updates). It calls the HiBob API, normalizes the data, and writes changes to Entra ID via Microsoft Graph and to on-premises AD via the AD module.\n\n**Entra ID + on-premises AD** — the targets. The runbook writes to both. For most attributes, Entra ID is updated via Graph API and the change propagates to AD via Entra Connect sync. For attributes that only exist on-prem (like certain extension attributes not synced to Entra), the runbook writes directly to AD.\n\n## The sync logic\n\nThe runbook follows a compare-then-write pattern to avoid unnecessary writes:\n\n1. Pull all active employee records from HiBob API\n2. For each employee, look up the corresponding Entra ID user (matched by email or employee ID stored in `employeeId` attribute)\n3. Compare the HiBob values against current Entra ID attribute values\n4. If any value differs, write the update via Graph API\n5. Log every change with before/after values to a Log Analytics workspace\n\nThis means the runbook only writes when there's an actual difference — not on every run, not for every user. This keeps the audit log clean (changes are meaningful) and avoids triggering unnecessary sync cycles in Entra Connect.\n\n## What gets synced\n\nThe 18 attributes synced in this implementation:\n\n| HiBob Field | Entra ID Attribute |\n| --- | --- |\n| Department | `department` |\n| Job Title | `jobTitle` |\n| Manager | `manager` (reference) |\n| Employment Type | `employeeType` |\n| Office Location | `officeLocation` |\n| Cost Center | `extension_attribute_1` |\n| Contractor Flag | `extension_attribute_2` |\n| Clearance Level | `extension_attribute_3` |\n| Team Function | `extension_attribute_4` |\n| Contractor Company | `extension_attribute_5` |\n| Start Date | `employeeHireDate` |\n| Display Name | `displayName` |\n| Preferred Name | (custom) |\n| Site | `usageLocation` |\n| Employee ID | `employeeId` |\n| Sub-Department | `extension_attribute_6` |\n| Job Level | `extension_attribute_7` |\n| Profile Picture | (via separate process) |\n\nThe manager sync is the most complex. HiBob stores the manager as an employee ID reference. The runbook resolves this to an Entra ID object ID and sets the `manager` attribute as a directory reference — not just a display name string.\n\n## Profile picture sync\n\nProfile pictures are handled separately. HiBob stores profile photos accessible via the API. The runbook downloads the photo, resizes it to the Microsoft 365 preferred size (648×648), and uploads it via the Graph API (`/users/{id}/photo/$value`). This keeps profile pictures in M365, Teams, and Outlook current — which matters more than it sounds for a distributed team.\n\n## Contractor detection and Conditional Access\n\nOne of the higher-value outcomes of this sync is accurate contractor flagging. HiBob has an employment type field that distinguishes full-time employees from contractors. The runbook sets `extension_attribute_2` to `contractor` or `employee` accordingly.\n\nThis attribute drives Conditional Access policies. Contractors get a stricter policy set: phishing-resistant MFA required for all apps, no persistent browser sessions, stricter sign-in frequency. Full-time employees get the standard policy set with SSO and longer session lifetimes.\n\nWithout the sync, this distinction was manually maintained and frequently wrong — contractors who converted to FTE still had contractor-tier policies, and new contractors started with FTE-tier access until someone noticed.\n\n## What breaks\n\n**Employee ID mismatches.** If HiBob and Entra ID have inconsistent employee IDs (which happens during migrations, acquisitions, or manual ID assignment), the sync can't match records. We built a reconciliation report that flags unmatched HiBob employees weekly so the IT team can fix the mapping manually.\n\n**Manager chains with circular references.** A misconfigured org chart in HiBob can create circular manager references that break the Graph API call. The runbook catches these and logs them rather than failing.\n\n**API rate limits.** HiBob's API has rate limits. For orgs with 500+ employees, a naive implementation that calls `/v1/people/{id}` for every employee will hit them. Use `/v1/people` with field expansion to pull all employees in one call.\n\n## 1.5 years of runtime\n\nThis runbook has been running for over 18 months at this client. It has processed thousands of attribute updates — reorgs, promotions, contractor conversions, new hires, terminations (though terminations have their own dedicated workflow). The Entra ID directory now reflects HiBob accurately. Conditional Access policies that depend on employment type work correctly. The IT team no longer gets support tickets about wrong department values.\n\n---\n\nThe pattern generalises to any HRIS. Workday, BambooHR, Personio — if it has an API and you have Entra ID, you can build this sync. The core principle is the same: the HR system is the source of truth for people data. The IdP should be downstream of it, not a separate silo that drifts.\n"])</script><script>self.__next_f.push([1,"12:[\"$\",\"$L8\",\"hibob-hr-automation\",{\"post\":{\"metadata\":{\"title\":\"When HiBob Is Your Source of Truth\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-20\",\"summary\":\"Your HR system knows the org better than your IdP does. Here's how I built a bi-directional HiBob ↔ Entra ID sync that keeps departments, titles, managers, and 15 other attributes in sync — automatically.\",\"image\":\"/images/blog/hibob-hr-automation.png\",\"images\":[],\"tag\":\"Automation\",\"team\":[],\"link\":\"\"},\"slug\":\"hibob-hr-automation\",\"content\":\"$32\"},\"thumbnail\":true,\"direction\":\"column\"}]\n33:T28a7,"])</script><script>self.__next_f.push([1,"\nMost Microsoft 365 environments have MFA. Most of them are still vulnerable to phishing.\n\nThe gap is the method. Push notifications can be MFA-fatigue'd. TOTP codes can be intercepted mid-session. SMS is trivially bypassed. None of these protect against an adversary-in-the-middle proxy sitting between your user and your identity provider — and those attacks are increasingly automated, accessible, and effective.\n\nPhishing-resistant MFA changes the equation. FIDO2 hardware keys and Windows Hello for Business bind the authentication ceremony to the legitimate origin, so there's nothing to intercept. The credential never leaves the device in a form that can be replayed.\n\nHere's how I rolled it out for a security-conscious OT Security client, without locking anyone out.\n\n## Why standard MFA isn't enough anymore\n\nThe Microsoft Authenticator push approval flow is convenient, but it's also the attack surface. Evilginx and similar tools run transparent proxies that present a legitimate-looking login page, relay credentials upstream, capture the session token, and forward the real Microsoft 2FA challenge to the user. The user approves what looks like a normal push notification. The attacker gets a valid session.\n\nNumber matching and additional context in Authenticator reduce the friction for this attack, but they don't eliminate it. Phishing-resistant methods do — because authentication is cryptographically tied to the relying party's domain. A FIDO2 credential issued for `login.microsoftonline.com` cannot be used against `evil-proxy.attackerinfra.com`.\n\n## The client context\n\nThe OT Security client already had standard MFA enforced across the tenant and a working Conditional Access baseline. The ask was to harden further — specifically to require phishing-resistant MFA for privileged access, key applications, and high-value users, without a hard cutover that disrupted operations.\n\nThe environment was mostly managed Windows devices (Intune-joined), a mix of FIDO2 keys already in use by IT, and a broader user population comfortable with Authenticator but unfamiliar with passkeys.\n\n## Authentication strengths: the mechanism\n\nEntra ID has a concept called Authentication Strengths — a named set of allowed authentication method combinations that can be referenced directly in Conditional Access grant controls. Instead of a binary \"require MFA\" control, you specify a strength: built-in options like MFA, Passwordless MFA, and Phishing-Resistant MFA, or custom combinations you define.\n\nPhishing-Resistant MFA maps to FIDO2 security keys, Windows Hello for Business, and certificate-based authentication. Nothing else.\n\nThis is the right abstraction for a gradual rollout. You can apply the phishing-resistant strength to specific user groups, specific apps, or specific roles — without changing your existing baseline policies for everyone else.\n\n## The rollout policy design\n\nWe structured the rollout in three phases, each building on the last.\n\n**Phase 1 — Privileged roles.**\nStart with Global Admins, Privileged Role Administrators, Exchange Admins, and Security Admins. These accounts are high-value targets and should have been using phishing-resistant methods already. The blast radius of a compromised admin account justifies the friction.\n\nPolicy target: all users assigned Entra ID privileged directory roles. Grant: require authentication strength — Phishing-Resistant MFA. Enforced immediately.\n\n**Phase 2 — Sensitive applications.**\nExtend to the apps with the most exposure: Azure portal, Intune admin center, Exchange admin, and any internal apps handling sensitive OT asset data. This catches users who aren't admins but have elevated access to critical systems.\n\nPolicy target: specific cloud apps (Azure Management, Microsoft Intune, plus named enterprise apps). Grant: require authentication strength — Phishing-Resistant MFA. Deployed in report-only for two weeks, then enforced.\n\n**Phase 3 — Broad user population (graduated).**\nFor the general user base, we didn't mandate immediate hardware key adoption. Instead, we:\n\n1. Created a named group: `sg-phishing-resistant-mfa-enrolled`\n2. Deployed a policy requiring phishing-resistant MFA for all apps — scoped to that group only\n3. Enrolled users in batches: IT first, then team leads, then department by department\n4. As each batch completed enrollment, they were added to the group and the policy applied\n\nThis gave us a controlled rollout with a clear enrolment signal, clean audit logs, and a path to full enforcement without a big-bang cutover.\n\n## Hardware keys vs. Windows Hello for Business\n\nFor most users, Windows Hello for Business is the easier path. It's already provisioned on compliant Intune-managed devices, uses biometric or PIN, and requires no additional hardware. The onboarding experience is familiar — users who already log into Windows that way don't notice a difference.\n\nFIDO2 hardware keys are better for shared workstations, kiosk scenarios, privileged users who operate from multiple devices, and anyone without a dedicated Windows endpoint. We issued YubiKey 5 series keys to the IT team and specific high-privilege users. For everyone else, Windows Hello for Business was the default.\n\nOne thing to verify before enforcing: Windows Hello for Business requires devices to be Hybrid Entra Joined or Entra Joined and the Hello provisioning policy to be deployed in Intune. Devices that are only domain-joined with no Entra ID registration can't use WHfB and will be blocked if you enforce phishing-resistant before resolving this.\n\n## Platform SSO: extending phishing resistance beyond Windows\n\nWindows Hello for Business solves the problem neatly on Windows, but most environments aren't Windows-only. macOS users, Linux workstations, and iOS/Android devices all need a path to phishing-resistant authentication.\n\nPlatform SSO is Microsoft's answer for macOS. It's a native macOS extension (deployed via Intune as an MDM profile) that integrates Entra ID authentication directly into the macOS login experience. Instead of the browser-based SSO flow that Authenticator handles today, Platform SSO uses a system-level credential that participates in the OS authentication ceremony — the same model as Windows Hello for Business on Windows.\n\nFrom an Authentication Strengths perspective, Platform SSO using the hardware-bound key method qualifies as phishing-resistant. The key is generated in the macOS Secure Enclave, bound to the device, and used for WebAuthn assertions against Entra ID. It satisfies the same Conditional Access grant as a FIDO2 hardware key or Windows Hello for Business credential.\n\nThe setup requires:\n\n1. **Deploy the Microsoft Enterprise SSO plug-in** via Intune — this is the MDM profile that registers the extension with macOS.\n2. **Configure Platform SSO settings** in the profile: set `AuthenticationMethod` to `UserSecureEnclaveKey` for the hardware-bound phishing-resistant variant, or `Password` if you only want SSO without the phishing-resistant step-up.\n3. **Users register on first login** — after the profile deploys, the next macOS login prompts the user to register the Platform SSO credential with Entra ID. This is the enrolment step. It requires a valid MFA method to bootstrap.\n4. **Verify the token type** in sign-in logs — once registered, sign-ins through Platform SSO show `deviceId` in the token claims and a `hwk` (hardware key) credential type. This is what Entra ID uses to classify the authentication as phishing-resistant.\n\nThe Platform SSO credential also enables Single Sign-On to all Entra ID-protected apps from macOS without re-authenticating. Once the credential is registered, Safari, Chrome, and native apps that use the SSO extension get tokens silently. This is a meaningful UX improvement over the current model where every app triggers a browser redirect.\n\nOne gotcha: Platform SSO on macOS requires Intune MDM enrollment and macOS 13 (Ventura) or later. Devices on older macOS versions fall back to the standard Authenticator flow. If you're enforcing phishing-resistant for a group that includes Mac users, verify macOS version compliance before adding them to the enforcement group.\n\n## Report-only first — always\n\nEvery policy went through report-only before enforcement. The sign-in logs under report-only show exactly who would have been blocked, which authentication method they used, and whether the policy would have applied. Filter on \"Report-only: Would have failed\" and work through the results before switching to enforce.\n\nThe most common surprise at this client: service accounts with interactive sign-ins that looked like users. They would have been blocked. We excluded the relevant service account identities explicitly and flagged them for certificate-based auth migration.\n\n## What we didn't do\n\nWe didn't create a single policy requiring phishing-resistant MFA for all users from day one. That's the right eventual state but the wrong rollout order. Enrolment has to come before enforcement. Users need time to register a FIDO2 key or confirm WHfB is working before the policy applies to them — otherwise you're locking out the people you need to help most.\n\nWe also didn't deprecate the existing MFA policies. They stayed in place. Phishing-resistant policies add stricter requirements on top; they don't replace the baseline. Belt and suspenders — the existing policies catch anything the new ones don't target yet.\n\n## The end state\n\nAt full rollout, every privileged role assignment and every access attempt to a sensitive application requires a method that can't be phished. The broader user base is being enrolled in batches with a clear target of full coverage inside six months.\n\nThe Conditional Access policy count went from 12 to 19 during this engagement. Each new policy has a clear owner, a documented scope, and a known enforcement date. That's the other half of making this sustainable — the policies themselves are managed as configuration, not improvised after the fact.\n\n---\n\nPhishing-resistant MFA isn't difficult to deploy in a Microsoft environment. The Authentication Strengths model makes it composable with your existing CA policies. The hard part is the change management and the enrolment order — getting users registered before the policy enforces, and not treating \"our users have MFA\" as meaning \"our users are protected.\"\n"])</script><script>self.__next_f.push([1,"14:[\"$\",\"$L8\",\"phishing-resistant-mfa-rollout\",{\"post\":{\"metadata\":{\"title\":\"Phishing-Resistant MFA Rollout\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-20\",\"summary\":\"Standard MFA is no longer enough. Here's how we designed a gradual Conditional Access rollout to enforce FIDO2, Windows Hello for Business, and Platform SSO across a security-conscious OT environment.\",\"image\":\"/images/blog/phishing-resistant-mfa-rollout.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"phishing-resistant-mfa-rollout\",\"content\":\"$33\"},\"thumbnail\":true,\"direction\":\"column\"}]\n34:T17c2,"])</script><script>self.__next_f.push([1,"\nManual offboarding is a security incident waiting to happen. The typical process: HR tells IT someone is leaving, IT opens a ticket, someone works through a checklist over the next few hours or days. During that window, the departing employee still has active sessions, valid credentials, and potentially a company device with full access to everything they could reach before they left.\n\nI've seen this gap exploited — not always maliciously, but the risk is real. I've also seen the fix: full automation triggered the moment HR closes the case.\n\nHere's the architecture I built for an Energy Sector client, automating a 15-step offboarding workflow with no manual steps after the trigger.\n\n## The trigger: HR webhook\n\nThe workflow starts in the HR system. When a manager marks a termination as processed, the HR platform fires a webhook containing the employee's user ID, termination type (voluntary/involuntary), and effective date.\n\nThe webhook hits an Azure Logic App HTTP trigger endpoint. That's the starting gun.\n\nUsing the HR system as the trigger source is deliberate. IT doesn't have to remember to act — the process starts automatically. The HR system is also the authoritative record for who is employed, so tying automation to its state means the offboarding reflects reality.\n\n## The 15-step workflow\n\nThe Logic App orchestrates the full sequence. Each step is either a direct Logic App action or a call out to an Azure Automation Runbook for anything requiring PowerShell.\n\n**Step 1 — Revoke all active sessions.**\nThe first action, always. Before anything else, invalidate all tokens and force re-authentication. This is a single Graph API call: `POST /users/{id}/revokeSignInSessions`. Done in the Logic App directly, no Runbook needed. The employee is signed out of everything immediately.\n\n**Step 2 — Disable the Entra ID account.**\nSet `accountEnabled: false` via Graph API. Prevents new sign-ins. Happens within seconds of the trigger.\n\n**Step 3 — Reset the account password.**\nGenerate a random 32-character password and set it. This prevents any cached credential from being useful and ensures nobody can re-enable the account without a deliberate reset.\n\n**Step 4 — Remove from all groups and dynamic membership.**\nStrip group memberships that grant access to resources — removing SharePoint sites, Teams, distribution lists, and any app role assignments tied to group membership. Dynamic groups update automatically once Entra ID reflects the account state, but explicit memberships are removed here.\n\n**Step 5 — Revoke all active MFA methods.**\nDelete registered authentication methods. This prevents the account being recovered via MFA registration if somehow re-enabled.\n\n**Step 6 — Wipe the managed device (MDE).**\nIf the employee has a managed device enrolled in Microsoft Defender for Endpoint, trigger a remote wipe via the MDE API. For corporate-owned devices: full wipe. For BYOD: selective wipe of corporate data only.\n\n**Step 7 — Remove licenses.**\nStrip all Microsoft 365 license assignments. This releases the license back to the pool and closes access to any service that gates on license assignment (Exchange, Teams, SharePoint, etc.).\n\n**Step 8 — Offboard from Intune.**\nRetire the device from Intune management. This removes the management profile, company portal, and any app-based conditional access certificates.\n\n**Step 9 — Remove from Entra ID.**\nAfter all access is revoked, delete or disable the Entra ID object depending on policy. Some clients soft-delete (disable + move to disabled OU) for 30 days before permanent deletion to support HR investigations.\n\n**Step 10 — Disable the on-premises AD account.**\nFor hybrid environments: disable the AD object. This propagates to Entra ID via sync, but we act on both sides simultaneously rather than waiting for the sync cycle.\n\n**Step 11 — Move the AD object to a disabled OU.**\nOrganizational policy: disabled accounts move to a dedicated OU that is excluded from GPO application and group policy inheritance.\n\n**Step 12 — Archive the mailbox.**\nPlace the mailbox on litigation hold, convert to shared, and assign delegate access to the manager for 30 days. This preserves business continuity without maintaining an active licensed mailbox.\n\n**Step 13 — Transfer OneDrive.**\nGrant the manager access to the departing employee's OneDrive for 30 days. Microsoft's data retention policy handles deletion after that window.\n\n**Step 14 — Notify IT and HR.**\nSend a completion notification to the IT helpdesk and HR via Teams/email with a summary of all actions taken and their status. If any step failed, the notification flags it for manual review.\n\n**Step 15 — Write the audit trail.**\nLog the full workflow execution — user ID, timestamp of each step, success/failure status, triggering event — to a Log Analytics workspace. This is the audit record that demonstrates compliance with offboarding policy.\n\n## Error handling\n\nNot every step succeeds cleanly. The device might already be wiped. The account might have no licenses. The Logic App uses scope-level error handling: each major step runs in a scope block, and failures are caught and logged without stopping the rest of the workflow.\n\nThe notification step at the end includes a failure summary so IT can handle any exceptions manually. The goal is that the automation handles 95% of cases cleanly; the edge cases go to a human with context.\n\n## What this replaced\n\nBefore this: a manually-worked Jira ticket with a 23-item checklist. Average completion time: 4–6 hours. Frequent missed steps (usually license removal and OneDrive transfer). No audit trail.\n\nAfter: 12-minute average end-to-end execution time. Zero missed steps. Full audit log. HR closes the case; everything else happens automatically.\n\n---\n\nThe residual risk in any offboarding process is the time between the employee's last day and when IT acts. Automation doesn't eliminate that risk — it eliminates the gap between the HR decision and the IT action. Once the trigger fires, the window is minutes, not hours.\n"])</script><script>self.__next_f.push([1,"15:[\"$\",\"$L8\",\"smart-offboarding-orchestration\",{\"post\":{\"metadata\":{\"title\":\"Smart Offboarding Orchestration\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-20\",\"summary\":\"Manual offboarding leaves doors open — sometimes for days. Here's how I automated a 15-step enterprise offboarding workflow using Azure Logic Apps and Automation Runbooks triggered by an HR webhook.\",\"image\":\"/images/blog/smart-offboarding-orchestration.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"smart-offboarding-orchestration\",\"content\":\"$34\"},\"thumbnail\":true,\"direction\":\"column\"}]\n35:T179d,"])</script><script>self.__next_f.push([1,"\nMost people use Claude Code like a fancy autocomplete. Type a request, read the output, copy-paste, repeat. That works. But it leaves a lot on the table.\n\nWhen I started seriously using Claude Code, I didn't invent my own system. I borrowed one — specifically, the pattern that Boris Cherny (one of Claude Code's creators) uses himself:\n\n```\n/plan → implement → /simplify → /verify → /commit-push-pr\n```\n\nFour steps. No magic. But the discipline of following them consistently changed how I work.\n\n## Why structure matters more than prompts\n\nThe common advice for AI tools is \"better prompts = better results.\" That's not wrong, but it's incomplete. The real lever is *process*, not prompts.\n\nWithout a process, you're improvising every session. You start coding before the plan is solid, then steer Claude mid-implementation when it drifts. You skip the cleanup because you're tired. You commit without reviewing the diff because it *probably* looks fine. Each shortcut is small. Over time, they compound.\n\nA structured loop closes those gaps. Not because it makes Claude smarter — it doesn't. It makes *you* more consistent.\n\n## The starting loop\n\nHere's what the Boris Cherny pattern looks like in practice:\n\n**`/plan`** — Before writing a single line of code, enter Plan Mode (Shift+Tab twice). Describe the task. Refine the plan until it's specific enough that you'd feel confident handing it to a junior engineer. Then say yes.\n\nThe rule I follow: if I'm still steering Claude during implementation, the plan wasn't good enough. A solid plan means near-zero mid-session corrections.\n\n**`implement`** — Switch to auto-accept and let it run. Hooks fire on every edit: Prettier auto-formats, tsc checks TypeScript after every `.ts` change, a guard warns if console.log sneaks in. The machine runs itself. You watch.\n\n**`/simplify`** — After implementation, before touching git. This step reviews the changed code for unnecessary abstraction, deep nesting, premature generalization. It finds the things you stopped noticing because you were heads-down building. It removes them.\n\nThis is the step most people skip. It's also the step that keeps codebases readable three months later.\n\n**`/verify`** — The gate before committing. Runs tsc → lint → tests → build → security check → git diff review. If something breaks here, it's cheap to fix. If it breaks after the PR merges, it's expensive.\n\n**`/commit-push-pr`** — Pre-computes the full git context, writes a conventional commit message, pushes, opens a PR with a summary and test plan. Not a one-liner. A real commit with context.\n\nThat's the base loop. I ran it for a few months and got the best results I'd had from any AI coding tool.\n\n## What I added — and why\n\nThe Boris Cherny loop is complete for *execution*. What it doesn't cover is *memory*.\n\nAfter a week of sessions, I noticed something: Claude was re-learning the same things. Decisions I'd made three sessions ago. Patterns that kept coming up. Architecture choices I'd explained twice already. Every new session started cold.\n\nThe fix was one new step between `implement` and `/simplify`:\n\n```\n/plan → implement → /capture → /simplify → /verify → /commit-push-pr\n```\n\n**`/capture`** runs after implementation. It snapshots what just happened — saves context and fires `/learn` in one shot. Progress gets logged to SQLite. Non-obvious patterns get stored as memories. Decisions get written down before they evaporate.\n\nThe practical effect: next session, Claude already knows what was decided and why. You spend zero time re-explaining context you've already explained. The work builds forward instead of resetting.\n\n## The rule that made it work\n\nThe temptation when you have a system is to optimize it too early. Add more steps. Build more hooks. Make it more sophisticated.\n\nI resisted that. For the first few months, I ran the simple 4-step loop exactly as described. I didn't modify it until I hit a real problem — the memory gap — and the fix was minimal: one command, one specific purpose.\n\nThat's the principle behind both loops: **start with structure, extend based on what actually breaks**.\n\nNot what might break. Not what you imagine could be better. What concretely broke in real sessions.\n\nThe Boris Cherny pattern is a good starting point because it covers the core failure modes: no plan, no cleanup, no verification, no context on the commit. Once those are handled, you'll discover your own gaps. The `/capture` step solved mine. Yours might be different.\n\n## What this looks like day to day\n\nMost sessions: `/plan`, implement, `/capture`, `/simplify`, `/verify`, `/commit-push-pr`. About 20-30 minutes per feature or fix, depending on complexity. The loop doesn't take longer — it replaces the time I used to spend cleaning up mistakes and re-explaining context.\n\nThe hooks handle the mechanical parts. Auto-formatting, type checking, console.log warnings — none of that requires my attention. I review the diff at `/verify` and almost always find it clean.\n\nThe commit at the end has a real message. The PR has context. Future-me can read the history and understand what happened.\n\n## Where to start\n\nIf you're new to Claude Code: run the 4-step loop for a month before changing anything.\n\n```\n/plan → implement → /simplify → /verify → /commit-push-pr\n```\n\nDon't add `/capture` yet. Don't set up hooks. Don't configure anything. Just follow the loop. Get consistent with it. Learn where it helps and where it doesn't.\n\nThen extend — only where the base loop actually falls short.\n\nThat's how you build a workflow that sticks instead of one you abandon after two weeks because it got too complicated.\n\n---\n\nThe full command reference and hook setup is in my [Claude Code config repo](https://github.com/RohiRIK/claude-code-config/blob/main/docs/workflow-daily.md) if you want to dig deeper.\n\nWhat does your Claude Code workflow look like? I'm curious whether others have hit the same memory gap or found different failure modes. Let me know.\n"])</script><script>self.__next_f.push([1,"16:[\"$\",\"$L8\",\"claude-code-daily-workflow\",{\"post\":{\"metadata\":{\"title\":\"The Claude Code Workflow That Actually Stuck\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-18\",\"summary\":\"I started with a simple 4-step loop and got the best results I'd ever seen from an AI tool. Then I extended it. Here's what changed, what didn't, and why starting with structure beats starting from scratch.\",\"image\":\"/images/blog/claude-code-daily-workflow.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"claude-code-daily-workflow\",\"content\":\"$35\"},\"thumbnail\":true,\"direction\":\"column\"}]\n36:T1a15,"])</script><script>self.__next_f.push([1,"\nThe first version of my Claude Code config replaced the default (no memory) with a structured 4-file system: goals, decisions, progress, gotchas. Markdown files, hooks that read and write them, a summary injected at session start. It worked. For a few months.\n\nThe problem with flat markdown files isn't that they fail — it's that they don't scale. After a few hundred entries across a dozen projects, you start noticing the cracks. Duplicate decisions. Gotchas that contradict each other because the older one was never updated. Progress logs that grow faster than they get trimmed. No way to ask \"what do I know about Supabase\" without reading every file.\n\nThe v2 config replaces all of it with SQLite.\n\n## The shift to SQLite LTM\n\nThe new system lives at `~/.claude/memory/ltm.db`. Every memory, decision, gotcha, and progress item is a row. Projects are foreign-keyed. Relationships between memories are edges in a separate table.\n\nThe hook system still works the same way from the outside — SessionStart injects context, PreCompact writes a snapshot, UpdateContext logs progress. What changed is what's underneath. Instead of appending to markdown files and hoping the trimming logic holds, everything goes to SQLite with indexed columns, typed categories, and a schema that can actually evolve.\n\nThe immediate win is queries. You can now run:\n\n```bash\nbun -e \"\n  const { getItems } = await import(process.env.HOME + '/.claude/memory/context.js');\n  const gotchas = getItems('project-name', 'gotcha');\n  console.log(JSON.stringify(gotchas));\n\"\n```\n\nAnd get back a filtered, structured list — not a blob of markdown you have to parse mentally.\n\nNew commands that came with it: `/learn`, `/recall`, `/forget`, `/relate`, `/check-context`, `/init-context`. The ones I use constantly are `/recall` (before starting any non-trivial task — surface past decisions before making new ones) and `/learn` (mid-session when something important comes up that shouldn't be lost to compaction).\n\n## The Janitor agent\n\nThe memory problem I didn't anticipate: memories go stale. A decision made in February about one project's architecture has nothing to do with March, but it stays in the DB forever unless someone removes it. Duplicates accumulate. A gotcha from an early attempt at something gets superseded by a better approach but both entries survive.\n\nThe Janitor is an autonomous sub-agent that runs inside `memory/server.ts`. It has four stages:\n\n**Decay** — memories that haven't been used get a confidence score that degrades over time. Below a configurable threshold (default 0.2), they get archived. Not deleted — archived. You can review them.\n\n**Auto-promote** — when the UpdateContext hook writes a `decision` or `gotcha` context item, the Janitor elevates it to a global memory automatically. No manual `/learn` required for things that come out of normal workflow.\n\n**Semantic dedup** — each memory gets an embedding vector. The Janitor runs cosine similarity across them. Anything above 0.85 similarity is flagged as a potential duplicate, and an LLM proposes a merge. The merge goes to a pending queue — you approve or reject, nothing changes automatically.\n\n**Supersedes** — when memories are merged, the old ones get marked `superseded` with a `supersedes` edge in the relations table. The knowledge graph stays consistent.\n\nThe part I like most: nothing the Janitor proposes takes effect without confirmation. It generates a queue of pending actions and surfaces them in a UI. You review, approve what makes sense, reject what doesn't. The agent maintains the memory system; you stay in control of what it actually does.\n\n## The graph visualizer\n\nThe SQLite backend enabled something that wasn't possible with markdown files: a knowledge graph.\n\n`memory/server.ts` runs a Bun server on port 7331. `memory/graph-app/` is a Next.js app on 7332 that reads from it via WebSocket. What you see is a D3 force graph: project nodes, memory nodes, context item nodes, edges representing relationships.\n\nThe layout is intentionally organic — link strength varies by relationship type. `context_of` links are loose (0.04), so context items float near their projects. `project_scope` links are tighter (0.25). Memory-to-memory relations are strong (0.6). The simulation converges and you can see clusters.\n\nPractically useful features:\n\n- **⌘K spotlight search** — FTS5-powered, keyboard navigable, zooms the graph to the matching node on select\n- **Tag filter panel** — click a tag to dim everything that doesn't match\n- **Project drill-down** — click any project node to get a dedicated page with all its context, memories, and relations\n- **Pending actions page** — the Janitor's propose queue, one click to approve or reject\n\nThe graph makes something visible that was always there but invisible: what the model actually knows about your projects, how those memories relate, and where the gaps or stale entries are.\n\n## Multi-provider embeddings\n\nSemantic dedup and the `/recall` search need embeddings. The system now supports six providers: Gemini, OpenAI, Anthropic, Cohere, OpenRouter, Ollama.\n\nThe settings UI at `/settings` lets you pick your embed provider, verify the API key inline (paste → spinner → green/red), and select from a dropdown of available models for that provider. It doesn't matter which you use for the embeddings — what matters is consistency, since vectors from different models aren't comparable.\n\nI run Ollama locally for embeddings. No API key, no cost, fast enough for the volume of memories a single developer accumulates.\n\n## What actually changed day-to-day\n\nThe hooks look the same from the outside. Session starts, context is injected, work happens, progress is logged. The difference is what happens underneath and over time.\n\nWith markdown files, the system degraded slowly. Files got messy. Duplicates crept in. The 20-item trim on progress.md was a blunt instrument. You never really knew what was in the DB unless you opened the files.\n\nWith SQLite, the system improves over time. Memories that matter get used, have their confidence reinforced, and survive. Memories that stop being relevant decay. The Janitor surfaces what needs attention instead of letting stale data accumulate silently.\n\nThe graph visualizer isn't something I use every session — but when I do open it, it answers questions that were previously unanswerable: \"what have I decided about this project?\", \"is there a gotcha about this library I logged a month ago?\", \"why does this memory exist?\"\n\nThe config is version-controlled at [github.com/RohiRIK/claude-code-config](https://github.com/RohiRIK/claude-code-config).\n"])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L8\",\"claude-code-config-v2\",{\"post\":{\"metadata\":{\"title\":\"Claude Code Config v2: SQLite LTM, a Janitor Agent, and a Memory Graph\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-11\",\"summary\":\"The markdown-file memory system worked until it didn't. Here's what I replaced it with — a SQLite LTM, an autonomous Janitor agent, and a D3 graph that shows you what the model actually knows.\",\"image\":\"/images/blog/claude-code-config-v2.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"claude-code-config-v2\",\"content\":\"$36\"},\"thumbnail\":true,\"direction\":\"column\"}]\n37:T1f74,"])</script><script>self.__next_f.push([1,"\nThe brief arrived in a Teams message. The IT team was managing hundreds of Windows devices through Microsoft Intune and they had no good way to answer a simple question: what's actually out there, and what state is it in?\n\nTheir proposed solution: a PowerShell script triggered by Jenkins, pulling device data from the Intune API and writing it to SharePoint lists. Power BI would sit on top and refresh on a schedule. Dashboards, filters, the works.\n\nIt's a reasonable ask. It's how a lot of IT shops solve this problem. They've got the pieces — Intune, SharePoint, Power BI — and they want to wire them together. The request made sense for where they were.\n\nI said I'd get back to them with a proposal.\n\n## The Ceiling\n\nI spent a day mapping out the pipeline they'd asked for. And the more I built it in my head, the more I saw where it would break.\n\n**SharePoint as a database** is the first problem. SharePoint lists have a 5,000-item view threshold — not a hard limit, but enough to start causing issues at scale. There's no real schema enforcement, no foreign keys, no joins. You end up denormalizing everything and hoping the refresh writes are idempotent. When they're not, you get stale rows and duplicate entries that Power BI dutifully surfaces as real data.\n\n**Jenkins as a scheduler** is infra for infra's sake. You're running a CI/CD system to run a cron job. That means maintaining an agent, managing credentials, monitoring for failed runs, building retry logic from scratch. When the sync breaks at 2am, nobody knows until someone notices the dashboards haven't updated.\n\n**Power BI on a schedule** means the data is stale by definition. If your refresh runs every four hours and a device falls out of compliance at 9am, your dashboard won't show it until 1pm. For a compliance and security use case, that gap matters.\n\nAnd there was no RBAC anywhere in this design. Anyone with SharePoint access could see everything — all devices, all users, all compliance states. Helpdesk techs, managers, contractors. No audit trail of who looked at what.\n\nBut the deepest problem wasn't architectural. The client didn't actually want a pipeline. They wanted **device visibility**. They wanted to know what was out there and whether it was healthy. The pipeline was just the closest solution shape they knew how to ask for.\n\n## The Pitch\n\nI came back with a counter-proposal.\n\nInstead of a pipeline, I pitched a purpose-built web app: FleetWatch. The sell was simple — you'll stop asking \"is this data current?\" because it always will be.\n\nSpecifically:\n- Real-time sync via Microsoft Graph API delta queries, pulling only changed devices instead of exporting everything on a schedule\n- Postgres as the data store — real schema, real queries, real relational data\n- RBAC built in from day one: admins see everything, helpdesk sees their assigned devices\n- Full audit logs of who accessed what and when\n- A proper UI instead of a Power BI dashboard that takes 30 seconds to load and can't drill into a single device\n\nThe client said yes. Partly because the technical argument was sound, and partly because I had mocked up what the device detail page would look like. It's easier to approve something you can see.\n\n## The Architecture\n\nThe core of FleetWatch is the Microsoft Graph API integration.\n\nAuthentication uses a Service Principal with Client Certificate auth — no client secrets that expire. The key endpoint is `/deviceManagement/managedDevices/delta`, which supports delta queries: on first run you get all devices, on subsequent runs you only get devices that changed since your last sync token. Instead of exporting 800 devices every four hours, you're processing 12 changed devices every 30 minutes.\n\nThe sync runs on Vercel Cron jobs. No Jenkins, no agents, no infra to maintain. The cron endpoint is protected with a shared secret header — simple, effective. Failed syncs surface in application logs, not in a Jenkins console that nobody checks.\n\nThe data layer is Postgres on Vercel with Drizzle ORM. The schema models the actual domain: a `devices` table, a `users` table, `compliance_policies`, `app_inventory`, `security_hardware`. When you need to answer \"which devices have BitLocker disabled and are assigned to users in the Finance department,\" that's a join, not a SharePoint list crawl.\n\nThe frontend is Next.js 15 with the App Router. Server Components handle the heavy lifting — device lists, compliance views, filtered queries all render server-side. The device detail page has six tabs: Overview, Compliance, Configuration, Security, Hardware, and Network. Each tab queries only the data it needs.\n\n```\nBefore (proposed):\nJenkins → PowerShell → SharePoint Lists → Power BI (scheduled refresh)\n\nAfter (FleetWatch):\nVercel Cron → Microsoft Graph API → Postgres → Next.js (real-time)\n```\n\nAuth is NextAuth with role-based access enforced at the API layer. The middleware checks roles before any data query runs — not just in the UI, where it's trivial to bypass. Admin and read-only roles are stored per-user in the database, not inferred from SharePoint group membership.\n\nMonitoring is a `/api/health` endpoint that checks database connectivity and last successful sync time, plus a `/api/metrics` endpoint for the operational stats I actually care about: sync duration, devices processed, error rate. Redis is wired in as an optional cache layer for the dashboard aggregate queries.\n\n## What It Enables\n\nThe gap between the pipeline and the app isn't cosmetic — it's functional.\n\nSearch and filter across all 800 devices returns results in under 100ms. You can filter by compliance state, OS version, last sync time, assigned user, or any combination. In Power BI with a scheduled refresh, you're waiting for a report to load and hoping it reflects reality.\n\nThe device detail page shows everything in one place: BitLocker status, TPM chip version, Secure Boot state, assigned compliance policies, installed applications, network adapters. That level of detail doesn't exist in the SharePoint list model — you'd need separate lists for each entity and a Power BI data model to join them, which you'd then need to maintain.\n\nRBAC means helpdesk techs can look up devices without needing SharePoint permissions across the entire tenant. No permissions sprawl, no \"just give them read access to the list.\" You grant a role in FleetWatch and that's it.\n\nThe export function lets you pull filtered device lists to CSV — useful for compliance reporting, vendor audits, or just sending a list of non-compliant devices to the right team. It works on whatever filter you've currently applied, so you're exporting exactly what you're looking at.\n\nCompliance trend graphs show state over time from the sync history, not from a Power BI snapshot that was current when the report was built. When a device falls out of compliance and comes back, you can see when both events happened.\n\n## The Lesson\n\nScripts are the right first tool when scope is unclear. If the client had wanted a one-time export to audit their device inventory, the PowerShell approach would have been exactly right. Fast to build, no ongoing maintenance, done.\n\nBut when the real problem is ongoing visibility — and when the solution needs RBAC, audit logs, freshness guarantees, and drill-down — the pipeline approach has a ceiling. It would have worked for three months. Then the IT team would have been back asking for user lookup, filtered exports, freshness indicators, device-level detail. The pipeline would have been extended with more scripts, more SharePoint lists, more Power BI datasets. Each addition would have made the system more fragile and harder to reason about.\n\nBuilding FleetWatch upfront was a harder conversation to have, but it was the right one. The client got a system that solves the problem they actually had — not the problem they knew how to articulate.\n\nThe source is on GitHub at [RohiRIK/FleetWatch](https://github.com/RohiRIK/FleetWatch) if you want to see how it's put together.\n"])</script><script>self.__next_f.push([1,"18:[\"$\",\"$L8\",\"fleetwatch-from-script-to-system\",{\"post\":{\"metadata\":{\"title\":\"From Script to System: How I Turned a Jenkins Pipeline into FleetWatch\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-04\",\"summary\":\"My client wanted PowerShell scripts dumping Intune data into SharePoint for Power BI. I built a web app instead. Here's why — and how.\",\"image\":\"/images/blog/fleetwatch-from-script-to-system.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"fleetwatch-from-script-to-system\",\"content\":\"$37\"},\"thumbnail\":true,\"direction\":\"column\"}]\n38:T19b0,"])</script><script>self.__next_f.push([1,"\nIf you're preparing to migrate to Entra ID and a penetration test just flagged \"Netlogon not requiring RPC Sealing\" — this is how you close it properly.\n\nThis isn't a theoretical hardening checklist. It's the actual playbook I follow: four phases, a hard go/no-go gate between discovery and enforcement, and a PowerShell script to do the discovery work for you.\n\n## Why this matters\n\nNetlogon is the protocol domain-joined machines use to authenticate against Domain Controllers. Without RPC Sealing, that channel is unencrypted — a classic man-in-the-middle opportunity. Microsoft patched this with the Netlogon secure channel update (CVE-2020-1472 / Zerologon era), but enforcement is still opt-in. A lot of environments are patched but not enforced.\n\nBefore you flip enforcement on, you need to know what's still sending unencrypted traffic. That's the whole point of phases 1–3.\n\n---\n\n## Phase 1: Infrastructure Preparation\n\n**Target:** All servers and endpoints — DCs, member servers, and clients.\n\nBefore any enforcement, the OS must actually support the RPC Sealing protocol. If you patch only your DCs and leave member servers behind, those servers will fail to authenticate once you enforce.\n\n**Action:** Deploy the latest Cumulative Updates. Specifically confirm KB5062600 / KB5021130 are installed. Reboot everything. Check that OS builds are current across the board.\n\nThis phase is boring. Do it anyway.\n\n---\n\n## Phase 2: Discovery (The Listening Phase)\n\n**Target:** Domain Controllers only.\n\nAt this stage, DCs are capable of RPC Sealing but won't block anything yet. They will, however, log every non-compliant connection. That's exactly what you want.\n\n### Step 1 — MDI Reports\n\nOpen Microsoft Defender for Identity. Pull the **\"Weak Ciphers\"** and **\"NTLM Authentication\"** reports. These give you a fast visual map of legacy devices: old NAS boxes, third-party applications, Linux/Samba servers, network appliances that predate NTLMv2.\n\n### Step 2 — PowerShell Event Log Query\n\nEvent ID `5838` = connection attempted without sealing. Event ID `5840` = connection using weak cryptography. You want to find every machine generating these events across all your DCs.\n\n```powershell\n# Create a temp folder for the report\n$Path = \"C:\\temp\"\nIf (!(Test-Path $Path)) { New-Item -ItemType Directory -Force -Path $Path }\n\n# Get all Domain Controllers in the domain\n$DCs = Get-ADDomainController -Filter * | Select-Object -ExpandProperty Hostname\n\n$EventIDs = @(5838, 5840)\n$AllEvents = @()\n\nforeach ($DC in $DCs) {\n    Write-Host \"Querying logs on DC: $DC...\" -ForegroundColor Cyan\n    try {\n        $Events = Get-WinEvent -ComputerName $DC -FilterHashtable @{LogName='System'; ID=$EventIDs} -ErrorAction Stop\n\n        foreach ($Event in $Events) {\n            $AllEvents += [PSCustomObject]@{\n                DomainController = $DC\n                TimeCreated      = $Event.TimeCreated\n                EventID          = $Event.Id\n                Message          = $Event.Message.Split(\"`n\")[0]\n            }\n        }\n    } catch {\n        Write-Warning \"No matching events found on $DC, or access was denied.\"\n    }\n}\n\n# Export results\nif ($AllEvents.Count -gt 0) {\n    $ExportPath = \"$Path\\Netlogon_Vulnerable_Traffic.csv\"\n    $AllEvents | Export-Csv -Path $ExportPath -NoTypeInformation -Encoding UTF8\n    Write-Host \"Done! Found vulnerable traffic. Report saved to: $ExportPath\" -ForegroundColor Yellow\n} else {\n    Write-Host \"Excellent! No vulnerable Netlogon traffic detected across any DCs.\" -ForegroundColor Green\n}\n```\n\nRun this against all DCs. You'll get a CSV with timestamps, the DC that logged each event, and the message. That CSV is your remediation backlog.\n\n---\n\n## Phase 3: Remediation (The Go/No-Go Gate)\n\n**Target:** Specific assets identified in Phase 2.\n\nThis is where most projects stall. The CSV output usually surfaces a few categories:\n\n- **Legacy printers and scanners** — firmware update or replace\n- **Third-party applications** — vendor update or configuration change\n- **Linux/Samba servers** — update Samba and configure `client use spnego = yes`, `ntlm auth = no`\n- **Network appliances** — firmware update; sometimes the only option is replacement\n\nWork through each one. If something genuinely cannot be updated, you document why and decide whether a temporary exception is acceptable. In my experience, \"we can't update it\" is usually \"we haven't tried hard enough yet.\"\n\n**The gate condition:** Run the discovery script again after remediation. You must see **zero new 5838 or 5840 events across all DCs for at least a few days** before moving to Phase 4. Not fewer events — ze
