\":\"m\",\"paddingY\":\"8\",\"paddingX\":\"16\",\"gap\":\"16\",\"horizontal\":\"between\",\"vertical\":\"center\",\"s\":{\"direction\":\"column\",\"horizontal\":\"center\",\"align\":\"center\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-s neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[\"© \",2026,\" /\"]}],[\"$\",\"span\",null,{\"className\":\"px-4\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Rohi Rikman\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"/ Powered by caffeine and questionable life choices\"}]]}],[\"$\",\"$L18\",null,{\"gap\":\"16\",\"children\":[[\"$\",\"$L19\",\"GitHub\",{\"href\":\"https://github.com/RohiRIK\",\"icon\":\"github\",\"tooltip\":\"GitHub\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"LinkedIn\",{\"href\":\"https://www.linkedin.com/in/rohi-rikman-48831b239/\",\"icon\":\"linkedin\",\"tooltip\":\"LinkedIn\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"Email\",{\"href\":\"mailto:rohi@rohirikman.dev\",\"icon\":\"email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"24:T20fe,"])</script><script>self.__next_f.push([1,"\nThe previous version of my Claude Code config introduced structured context files — goals, decisions, progress, gotchas — persisted as markdown and injected at session start. That worked. But markdown has limits: no querying, no deduplication, no concept of importance or decay, no semantic search, and no way to surface related memories across projects.\n\nThis version replaces the markdown context files with a SQLite-backed long-term memory system, a dedicated MCP server that exposes LTM primitives to Claude directly, semantic recall with embedding fallback, a graph reasoning layer, and an EvaluateSession hook that extracts decisions and patterns automatically at session end.\n\nHere's what changed and why.\n\n## From markdown files to SQLite\n\nThe old system: four `.md` files per project (`context-goals.md`, `context-decisions.md`, `context-progress.md`, `context-gotchas.md`). Hooks read and wrote them. They worked until they didn't — duplicates accumulated, stale entries couldn't be cleaned up automatically, and there was no way to query across them.\n\nThe new system: a single SQLite database at `~/.claude/memory/ltm.db`. Two main tables:\n\n- `memories` — long-term insights, patterns, and decisions. Each row has content, category (`preference | architecture | gotcha | pattern | workflow | constraint`), importance score (1–5), project scope (nullable for globals), tags, and a decay counter.\n- `context_items` — short-term session context. Goals, decisions, progress, and gotchas per project. These expire if a project is inactive for 14 days.\n\nThe schema separation is deliberate. `context_items` are the working memory for an active project — things you need right now. `memories` are the durable knowledge base — things you want to remember across all future sessions.\n\n## The LTM MCP server\n\nThe previous config had Claude calling shell scripts to read and write memory. That worked but was brittle and required careful prompt engineering to get Claude to use it consistently.\n\nThe new approach: a dedicated MCP server (`ltm` server in `settings.json`) that exposes LTM as first-class MCP tools. Claude has native access to:\n\n- `ltm_recall` — FTS5 full-text search across memories with semantic fallback\n- `ltm_learn` — store a new memory or reinforce an existing one\n- `ltm_relate` — create typed relationships between memories\n- `ltm_forget` — delete a memory by ID\n- `ltm_context` — get merged context (globals + project-scoped memories)\n- `ltm_graph` — traverse the memory graph from seed nodes\n- `ltm_context_items` — get context items (goals, decisions, progress, gotchas) for a project\n\nWith the MCP server active, Claude uses these tools directly without me having to orchestrate shell calls. The pattern in `CLAUDE.md` is now explicit: call `mcp__ltm__ltm_recall` before any non-trivial task, call `mcp__ltm__ltm_learn` after discovering a non-obvious pattern.\n\n## Semantic recall with embedding fallback\n\n`ltm_recall` does FTS5 full-text search first. If the FTS5 results are below a threshold, it triggers a semantic fallback: it calls an embedding API, generates a vector for the query, and does cosine similarity search against stored embeddings.\n\nThe implementation in `memory/db.ts`:\n\n```typescript\nexport async function recall(query: string, limit = 10): Promise\u003cMemory[]\u003e {\n  const ftsResults = searchFts(query, limit);\n  if (ftsResults.length \u003e= limit * 0.6) return ftsResults;\n\n  // Semantic fallback\n  if (config.ltm.semanticFallback) {\n    const similar = await getSimilarMemories(query, limit);\n    return deduplicateMerge(ftsResults, similar);\n  }\n  return ftsResults;\n}\n```\n\nThe graceful degradation is important: if the embedding API fails, the FTS5 results are still returned. Semantic search is an enhancement, not a dependency.\n\n## Graph-based reasoning\n\nMemories can have typed relationships: `supports`, `contradicts`, `refines`, `depends_on`, `related_to`, `supersedes`. These are stored in a `memory_relations` table.\n\nThe `ltm_graph` tool does BFS traversal from seed nodes up to a configurable depth. The `getContextMergeWithGraph` function in `db.ts` uses this to build a richer context injection at session start — rather than just listing top memories, it traverses the graph from the most important ones and includes related memories that would otherwise rank below the injection cutoff.\n\nIn practice this surfaces things like: \"This pattern (memory 88) supports this architectural decision (memory 44) which was made in the context of this constraint (memory 31).\" The chain gives Claude more context than any individual memory provides alone.\n\nGraph reasoning is gated behind `config.ltm.graphReasoning = true` — it's off by default because it increases session start time and token usage.\n\n## The EvaluateSession hook\n\nThe most significant behavioral change: a `SessionEnd` / `EvaluateSession` hook that runs an LLM call at session end to extract decisions, patterns, and gotchas from the session transcript and write them to LTM automatically.\n\nPreviously, learning required a manual `/learn` call. Most things worth remembering never got learned because they were discovered mid-task and I didn't stop to capture them.\n\nThe EvaluateSession hook:\n1. Gets a compressed summary of the session (the existing PreCompact summary if available, or a fresh one)\n2. Sends it to Claude with a structured extraction prompt asking for: decisions made, patterns discovered, gotchas encountered, progress achieved\n3. Writes each extracted item to `ltm_learn` with appropriate category and importance\n4. Also updates `context_items` for the project with any progress or decisions\n\nThe hook is gated behind `config.ltm.evaluateSessionLlm = true`. When enabled, every session that produces non-trivial work automatically contributes to the knowledge base.\n\n## Memory decay and the Janitor\n\nMemories have an importance score (1–5). Memories at importance 5 never decay — these are the global rules and constraints that must always be in context. Lower-importance memories decay over time if not accessed or reinforced.\n\nA Janitor agent runs periodically to:\n- Decay memories that haven't been accessed recently\n- Identify near-duplicate memories (via embedding similarity) and merge them\n- Flag memories that haven't been accessed in 90+ days for review\n- Prune memories that have decayed below a minimum threshold\n\nThe Janitor runs as a standalone script (`memory/janitor.ts`) triggered by a cron-like scheduler in the background. It's not a hook — it runs independently of sessions.\n\nThe D3 graph visualization app (from the previous post) makes this visible: strong memories glow, decaying ones dim, and the Janitor's merge/prune operations leave a visible trail.\n\n## What the config looks like now\n\nThe `CLAUDE.md` instruction for LTM is explicit:\n\n\u003e Before any non-trivial task: call `mcp__ltm__ltm_recall` with the topic as query.\n\u003e After discovering a non-obvious pattern or gotcha: call `mcp__ltm__ltm_learn`.\n\u003e When making an architectural decision: call `mcp__ltm__ltm_learn` with `category=architecture`.\n\nThe hooks (`SessionStart`, `EvaluateSession`, `PreCompact`) do the background work. The MCP tools give Claude direct access. The decay and Janitor processes keep the database clean without manual curation.\n\n## What's still rough\n\nThe semantic fallback adds latency to recall — a few hundred milliseconds on a fast connection, more if the embedding API is cold. FTS5 is fast enough that most recalls don't trigger it, but it's noticeable when it does.\n\nThe EvaluateSession extraction isn't perfect. The LLM sometimes over-extracts (trivial things get stored as memories) and occasionally misses important architectural decisions. The category classification is roughly right but imprecise. These are prompt engineering problems that improve over time as the extraction prompt gets tuned.\n\nThe Janitor's duplicate detection via embedding similarity occasionally merges things that shouldn't be merged. Conservative threshold is better — set the similarity cutoff high enough that only near-identical memories get merged.\n\n---\n\nThe overall shift is from \"context files I remember to maintain\" to \"a knowledge base that maintains itself.\" Sessions contribute to it automatically, the Janitor keeps it clean, and recall surfaces relevant history before I start any significant work. The manual hygiene work that v1 and v2 required is mostly gone.\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"children\":[[\"$\",\"$L18\",null,{\"maxWidth\":12,\"m\":{\"hide\":true}}],[\"$\",\"$L18\",null,{\"fillWidth\":true,\"horizontal\":\"center\",\"children\":[\"$\",\"$L10\",null,{\"as\":\"section\",\"maxWidth\":\"m\",\"horizontal\":\"center\",\"gap\":\"l\",\"paddingTop\":\"24\",\"children\":[[\"$\",\"$L1a\",null,{\"id\":\"schema-blogPosting-/blog/claude-code-config\",\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"url\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/blog/claude-code-config\\\",\\\"sameAs\\\":[],\\\"headline\\\":\\\"How I Configured Claude Code to Actually Remember Things\\\",\\\"description\\\":\\\"The default Claude Code setup loses context on every session. Here's the hook system, skill commands, agent definitions, and memory architecture I built to fix that.\\\",\\\"image\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/images/blog/claude-code-config.png\\\",\\\"datePublished\\\":\\\"2026-03-02\\\",\\\"dateModified\\\":\\\"2026-03-02\\\",\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"Rohi Rikman\\\",\\\"url\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/about\\\",\\\"image\\\":{\\\"@type\\\":\\\"ImageObject\\\",\\\"url\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/images/avatar.png\\\"}}}\"}}],[\"$\",\"$L10\",null,{\"maxWidth\":\"s\",\"gap\":\"16\",\"horizontal\":\"center\",\"align\":\"center\",\"children\":[[\"$\",\"$L1b\",null,{\"href\":\"/blog\",\"children\":[\"$\",\"span\",null,{\"className\":\"font-label font-strong font-m\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Blog\"}]}],[\"$\",\"span\",null,{\"className\":\"font-bod ata\":{\"title\":\"Claude Code Config v3: LTM as Infrastructure\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-20\",\"summary\":\"The config got a significant overhaul: SQLite-backed long-term memory, a dedicated MCP server exposing LTM primitives, semantic recall with embedding fallback, graph-based reasoning, and an EvaluateSession hook that extracts decisions automatically.\",\"image\":\"/images/blog/claude-code-config-v3.png\",\"images\":[],\"tag\":\"Dev Tools\",\"team\":[],\"link\":\"\"},\"slug\":\"claude-code-config-v3\",\"content\":\"$24\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L25\"]}]]}],\"$L26\"]}]}],\"$L27\"]}]\n"])</script><script>self.__next_f.push([1,"29:I[988654,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ScrollToHash\"]\n2a:I[605649,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingNav\"]\n28:T17c7,"])</script><script>self.__next_f.push([1,"\nEvery IT team has some version of the same problem: the MDM says one thing, Active Directory says another, and the spreadsheet someone maintains manually is a third opinion. Nobody knows the real device count. Nobody knows which machines are stale. Asset reviews are a manual reconciliation exercise that takes days and is wrong before it's finished.\n\nFor a FinTech client, I built a pipeline that pulls from every authoritative source — AD, Intune, Azure, MDE — and produces a single unified inventory that's always current. Here's the architecture.\n\n## The data problem\n\nThe client had devices across three categories:\n- **Windows workstations**: domain-joined, Intune-enrolled, some hybrid Entra joined\n- **Azure VMs**: not domain-joined, sometimes Intune-enrolled, MDE-onboarded\n- **Legacy machines**: domain-joined only, no Intune, no MDE\n\nNo single system had the full picture. Intune knew about enrolled devices but didn't know about the legacy machines. AD knew about everything domain-joined but didn't know about Azure VMs or compliance state. MDE knew about onboarded endpoints but didn't map cleanly to AD objects.\n\nThe goal: a unified record per device with attributes from all sources — last seen, OS version, compliance state, MDE sensor status, assigned user, department, location.\n\n## The architecture\n\nFour components:\n\n**1. Jenkins** — scheduler and orchestrator. A pipeline job runs nightly and on-demand. It calls the PowerShell scripts in sequence, handles retries, and sends a completion notification.\n\n**2. PowerShell scripts** — data collection and normalization. One script per source, plus a merge script. Each script outputs structured JSON to a staging directory on the Jenkins agent.\n\n**3. SharePoint List** — the inventory store and intermediate layer. PowerShell writes the merged records to a SharePoint list via the SharePoint REST API or PnP PowerShell. The list is the single source of truth that other systems can query.\n\n**4. Power BI** — visualization layer. A Power BI report connects directly to the SharePoint list and refreshes on a schedule. This is the dashboard the IT team and management use.\n\n## The data collection scripts\n\n**AD collector**: Uses `Get-ADComputer` with `-Properties *` to pull all computer objects. Captures name, distinguished name, last logon timestamp, OS version, description, and organizational unit. Filters out disabled objects and objects not seen in 90 days.\n\n```powershell\nGet-ADComputer -Filter * -Properties LastLogonDate, OperatingSystem, Description |\n  Where-Object { $_.LastLogonDate -gt (Get-Date).AddDays(-90) } |\n  Select-Object Name, DistinguishedName, LastLogonDate, OperatingSystem, Description |\n  ConvertTo-Json | Out-File \"$stagingPath\\ad-devices.json\"\n```\n\n**Intune collector**: Uses the Microsoft Graph PowerShell SDK. Calls `Get-MgDeviceManagementManagedDevice` to get all enrolled devices with compliance state, last sync time, enrolled user, and device category.\n\n**MDE collector**: Uses the Defender for Endpoint API (via a service principal with `Machine.Read.All`). Gets onboarding status, sensor health, last seen timestamp, and risk level for every endpoint.\n\n**Azure VM collector**: Uses `Get-AzVM` across all subscriptions the service principal has access to. Gets VM name, resource group, location, OS, running state, and any tags with owner/department information.\n\n## The merge script\n\nThe merge script is where the real work happens. It loads all four JSON files and joins them on device name. The join logic:\n\n1. AD is the primary key source — every AD computer object gets a record\n2. Intune records are matched to AD by device name (normalized to uppercase)\n3. MDE records are matched by hostname\n4. Azure VMs get their own records (no AD object)\n\nFor each merged record, the script calculates derived fields:\n- `managementState`: `fully-managed` (Intune + MDE), `partially-managed` (Intune only or MDE only), `unmanaged` (AD only)\n- `staleness`: days since last seen across all sources\n- `complianceGap`: boolean — in Intune but not compliant\n\nThe merged output is an array of device objects written to `merged-inventory.json`.\n\n## Writing to SharePoint\n\nPnP PowerShell handles the SharePoint write. The script compares the merged inventory against the current SharePoint list state (pulled at the start of the run) and does a delta update: new devices are added, existing devices are updated, devices not seen in 90 days are flagged as stale.\n\nDoing a delta update rather than a full replace matters for performance (the list had 2,000+ items) and for preserving any manual annotations added by the IT team directly in the list.\n\n## Power BI on top\n\nThe Power BI report connects to the SharePoint list as a data source and refreshes daily. Key views:\n\n- **Management coverage**: pie/bar showing how many devices are fully managed vs. partially managed vs. unmanaged\n- **Stale devices**: list of devices not seen in 30+ days, sorted by staleness\n- **Compliance gaps**: devices enrolled in Intune but not passing compliance policy\n- **MDE coverage**: which devices have an active sensor vs. not\n\nThe report is embedded in a Teams tab so the IT team has it in their daily context without going to Power BI directly.\n\n## What it replaced\n\nBefore this pipeline: a manually-maintained Excel spreadsheet updated every quarter. It was always wrong. MDE coverage reports were run manually when someone asked. Compliance gaps were invisible until a CA policy blocked a user.\n\nAfter: a nightly automated run, a SharePoint list the IT team trusts, and a Power BI dashboard the security team uses in their weekly review.\n\nThe pipeline has run without manual intervention for over a year. When a new device shows up as unmanaged, the report flags it. When a compliance gap appears, the security team sees it the next morning.\n\n---\n\nThe architecture is not complicated. Jenkins, PowerShell, SharePoint, Power BI are tools every Microsoft-focused IT team already has. The value is in putting them together deliberately and removing the manual reconciliation step entirely.\n"])</script><script>self.__next_f.push([1,"25:[\"$\",\"$L23\",\"device-inventory-pipeline\",{\"post\":{\"metadata\":{\"title\":\"Building a Device Inventory Pipeline\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-20\",\"summary\":\"When your MDM doesn't tell the full story, build the pipeline yourself. Here's the Jenkins → PowerShell → SharePoint → Power BI architecture I built to unify device data across AD and Intune for a FinTech client.\",\"image\":\"/images/blog/device-inventory-pipeline.png\",\"images\":[],\"tag\":\"Automation\",\"team\":[],\"link\":\"\"},\"slug\":\"device-inventory-pipeline\",\"content\":\"$28\"},\"thumbnail\":true,\"direction\":\"column\"}]\n26:[\"$\",\"$L29\",null,{}]\n27:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L2a\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2b:I[811052,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingLink\"]\n2c:I[362844,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"InlineCode\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The default Claude Code installation does one thing poorly: it forgets everything. Every new session, you re-explain your stack, your preferences, the decisions you made last week. It compounds quickly on any project you're in for more than a few days.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"I spent a few months building a configuration layer on top of Claude Code that solves this. Here's what it does and how it works.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-memory-problem\",\"children\":\"The memory problem\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Claude Code has no persistence by default. The context window holds your current session. When it compacts or you start a new one, that state is gone. You're not losing information in a database — you're losing it from the model's working memory.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The fix isn't clever prompting. It's an explicit memory system with structured files and hooks that write to and read from those files automatically.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-4-file-context-system\",\"children\":\"The 4-file context system\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Each project gets a directory at \",[\"$\",\"$L2c\",null,{\"children\":\"~/.claude/projects/\u003cname\u003e/\"}],\" with four files:\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"context-goals.md\"}]}],\" — what I'm working on right now. Max 5 lines. Rewritten when the goal changes. Keeps the model from drifting into solving adjacent problems.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"context-decisions.md\"}]}],\" — architectural choices and why. Permanent, never deleted. If I decided to use Infisical instead of environment variables, that's in here with the reason. The model doesn't suggest what I've already ruled out.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"context-progress.md\"}]}],\" — completed tasks and what's in flight. Auto-trimmed to the last 20 items. Serves as a working log without growing unbounded.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"context-gotchas.md\"}]}],\" — warnings, blockers, and lessons. Also permanent. If something bit me once — a library quirk, an environment constraint, a mistake pattern — it lives here forever. The model reads it at session start and doesn't repeat the same mistakes.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"These files are plain markdown. They're updated manually after significant tasks, and automatically by hooks at session end.\"}],\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\",\"\\n\",\"$L4b\",\"\\n\",\"$L4c\",\"\\n\",\"$L4d\",\"\\n\",\"$L4e\",\"\\n\",\"$L4f\",\"\\n\",\"$L50\",\"\\n\",\"$L51\",\"\\n\",\"$L52\",\"\\n\",\"$L53\"]\n"])</script><script>self.__next_f.push([1,"54:I[436122,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"List\"]\n55:I[626935,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ListItem\"]\n2d:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-hooks\",\"children\":\"The hooks\"}]\n2e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Hooks are shell scripts or TypeScript files that Claude Code runs in response to lifecycle events. I have six:\"}]\n2f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"SessionStart\"}],\" — runs when a new session opens. Reads the project's context files and injects a summary (max 60 lines) as a system message. The model immediately knows what project it's in, what the current goal is, what decisions are locked, and what to avoid. No re-explaining needed.\"]}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"PreCompact\"}],\" — runs before Claude Code compacts the context window. Assembles all four context files into \",[\"$\",\"$L2c\",null,{\"children\":\"context-summary.md\"}],\" — a structured 60-line snapshot. This becomes what SessionStart injects next time. Without this, compaction destroys context. With it, compaction is just a checkpoint.\"]}]\n31:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"EvaluateSession\"}],\" — runs when the session ends. Reads the transcript, extracts patterns — recurring mistakes, useful techniques, things that worked — and writes them to \",[\"$\",\"$L2c\",null,{\"children\":\"~/.claude/skills/Learned/\"}],\". These are ephemeral: they roll off after a few sessions. For anything important enough to keep permanently, I promote it manually to \",[\"$\",\"$L2c\",null,{\"children\":\"context-gotchas.md\"}],\".\"]}]\n32:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"SuggestCompact\"}],\" — tracks a running count of tool calls per session. At 50, it suggests running \",[\"$\",\"$L2c\",null,{\"children\":\"/compact\"}],\". This isn't mandatory, but the reminder is useful — context windows that run too long start producing lower-quality output.\"]}]\n33:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"UpdateContext\"}],\" — PostToolUse hook that fires after Write, Edit, or MultiEdit operations. Logs modified files to context-progress and runs Prettier and tsc on changed files immediately. Type errors and formatting issues surface at edit time, not at build time.\"]}]\n34:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Cleanup\"}],\" — periodic maintenance. Trims context-progress.md to the last 20 items. Removes context directories for proje"])</script><script>self.__next_f.push([1,"cts that haven't been touched in 30 days.\"]}]\n35:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"skills-and-commands\",\"children\":\"Skills and commands\"}]\n36:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Skills are reusable prompts that expand into full instructions when invoked. I have these:\"}]\n37:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/plan\"}]}],\" — invokes the planner agent before any implementation. Restates the requirement, breaks it into phases, identifies dependencies, flags risks. Produces a plan for review before any code is touched. I don't write code without running this first for anything non-trivial.\"]}]\n38:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/verify\"}]}],\" — runs a self-check loop: tsc → lint → tests → build, in order, stopping on first failure. The skill knows to skip steps that aren't configured for the project. Run before every commit.\"]}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/simplify\"}]}],\" — post-implementation review. Looks at recently modified code for unnecessary abstraction, duplicated logic, or complexity that crept in during implementation. Runs after verify.\"]}]\n3a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/commit-push-pr\"}]}],\" — precomputes git context (status, diff, log, branch), generates a conventional commit message, stages relevant files, commits, and pushes. Skips the tedium of assembling git commands manually.\"]}]\n3b:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/learn\"}]}],\" — manual trigger for pattern extraction. Same process as EvaluateSession but runs on demand mid-session when I want to capture something specific.\"]}]\n3c:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/update-context\"}]}],\" — reads the current session and updates all four context files. Useful after completing a significant task when I want to flush progress immediately rather than waiting for the end-of-session hook.\"]}]\n3d:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/tdd\"}]}],\" — enforces test-first workflow. Scaffolds the interface, writes the test, makes it fail, then implements the minimum code to pass. Blocks implementation until the test exists.\"]}]\n3e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/code-review\"}]}],\" — runs the code-reviewer agent on rece"])</script><script>self.__next_f.push([1,"ntly modified files. Returns severity-rated feedback: critical issues stop work, high issues get fixed, medium issues are noted.\"]}]\n3f:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"agents\",\"children\":\"Agents\"}]\n40:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Agents are specialized sub-models with scoped roles. They run separately from the main session and have access to the codebase but only for their designated purpose.\"}]\n41:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"planner\"}],\" — for implementation planning. Doesn't write code. Only produces plans with phases, dependencies, and risk flags.\"]}]\n42:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"code-reviewer\"}],\" — reviews code after it's written. Severity-based feedback. The reviewer doesn't have write access — it can't change files, only report.\"]}]\n43:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"security-reviewer\"}],\" — OWASP Top 10 checks, secret detection, dependency auditing. Runs before commits on anything that touches auth, input handling, or external integrations.\"]}]\n44:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"tdd-guide\"}],\" — enforces test-first. If I start implementing without a failing test, it redirects. Tracks coverage and flags when it drops below 80%.\"]}]\n45:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-1 ":\"175%\"},\"child"])</script><script>self.__next_f.push([1,"ren\":[\"Rules are markdown files in \",[\"$\",\"$L2c\",null,{\"children\":\"~/.claude/rules/\"}],\" that load into every session. They cover:\"]}]\n"])</script><script>self.__next_f.push([1,"4b:[\"$\",\"$L54\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Coding style\"}],\": immutability-first (spread operators, never mutate), no \",[\"$\",\"$L2c\",null,{\"children\":\"any\"}],\" types, explicit return types on exports, functions under 50 lines\"]}],\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Package manager\"}],\": bun not npm, uv not pip — enforced globally so I never get npm in a bun project\"]}],\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Git workflow\"}],\": conventional commits (\",[\"$\",\"$L2c\",null,{\"children\":\"feat|fix|refactor|docs|chore:\"}],\"), no \",[\"$\",\"$L2c\",null,{\"children\":\"Co-Authored-By\"}],\" footers, PR descriptions that cover the full diff not just the latest commit\"]}],\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Testing\"}],\": 80% minimum coverage, TDD workflow required for new features\"]}],\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Security\"}],\": no hardcoded secrets, input validation at system boundaries only, rate limiting on all endpoints\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f.push([1,"4c:[\"$\",\"span\",null,{\"className\":\"font-body
