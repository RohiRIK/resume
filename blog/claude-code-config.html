\":\"m\",\"paddingY\":\"8\",\"paddingX\":\"16\",\"gap\":\"16\",\"horizontal\":\"between\",\"vertical\":\"center\",\"s\":{\"direction\":\"column\",\"horizontal\":\"center\",\"align\":\"center\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-s neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[\"© \",2026,\" /\"]}],[\"$\",\"span\",null,{\"className\":\"px-4\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Rohi Rikman\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"/ Powered by caffeine and questionable life choices\"}]]}],[\"$\",\"$L18\",null,{\"gap\":\"16\",\"children\":[[\"$\",\"$L19\",\"GitHub\",{\"href\":\"https://github.com/RohiRIK\",\"icon\":\"github\",\"tooltip\":\"GitHub\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"LinkedIn\",{\"href\":\"https://www.linkedin.com/in/rohi-rikman-48831b239/\",\"icon\":\"linkedin\",\"tooltip\":\"LinkedIn\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"Email\",{\"href\":\"mailto:rohi@rohirikman.dev\",\"icon\":\"email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"24:T1a15,"])</script><script>self.__next_f.push([1,"\nThe first version of my Claude Code config replaced the default (no memory) with a structured 4-file system: goals, decisions, progress, gotchas. Markdown files, hooks that read and write them, a summary injected at session start. It worked. For a few months.\n\nThe problem with flat markdown files isn't that they fail — it's that they don't scale. After a few hundred entries across a dozen projects, you start noticing the cracks. Duplicate decisions. Gotchas that contradict each other because the older one was never updated. Progress logs that grow faster than they get trimmed. No way to ask \"what do I know about Supabase\" without reading every file.\n\nThe v2 config replaces all of it with SQLite.\n\n## The shift to SQLite LTM\n\nThe new system lives at `~/.claude/memory/ltm.db`. Every memory, decision, gotcha, and progress item is a row. Projects are foreign-keyed. Relationships between memories are edges in a separate table.\n\nThe hook system still works the same way from the outside — SessionStart injects context, PreCompact writes a snapshot, UpdateContext logs progress. What changed is what's underneath. Instead of appending to markdown files and hoping the trimming logic holds, everything goes to SQLite with indexed columns, typed categories, and a schema that can actually evolve.\n\nThe immediate win is queries. You can now run:\n\n```bash\nbun -e \"\n  const { getItems } = await import(process.env.HOME + '/.claude/memory/context.js');\n  const gotchas = getItems('project-name', 'gotcha');\n  console.log(JSON.stringify(gotchas));\n\"\n```\n\nAnd get back a filtered, structured list — not a blob of markdown you have to parse mentally.\n\nNew commands that came with it: `/learn`, `/recall`, `/forget`, `/relate`, `/check-context`, `/init-context`. The ones I use constantly are `/recall` (before starting any non-trivial task — surface past decisions before making new ones) and `/learn` (mid-session when something important comes up that shouldn't be lost to compaction).\n\n## The Janitor agent\n\nThe memory problem I didn't anticipate: memories go stale. A decision made in February about one project's architecture has nothing to do with March, but it stays in the DB forever unless someone removes it. Duplicates accumulate. A gotcha from an early attempt at something gets superseded by a better approach but both entries survive.\n\nThe Janitor is an autonomous sub-agent that runs inside `memory/server.ts`. It has four stages:\n\n**Decay** — memories that haven't been used get a confidence score that degrades over time. Below a configurable threshold (default 0.2), they get archived. Not deleted — archived. You can review them.\n\n**Auto-promote** — when the UpdateContext hook writes a `decision` or `gotcha` context item, the Janitor elevates it to a global memory automatically. No manual `/learn` required for things that come out of normal workflow.\n\n**Semantic dedup** — each memory gets an embedding vector. The Janitor runs cosine similarity across them. Anything above 0.85 similarity is flagged as a potential duplicate, and an LLM proposes a merge. The merge goes to a pending queue — you approve or reject, nothing changes automatically.\n\n**Supersedes** — when memories are merged, the old ones get marked `superseded` with a `supersedes` edge in the relations table. The knowledge graph stays consistent.\n\nThe part I like most: nothing the Janitor proposes takes effect without confirmation. It generates a queue of pending actions and surfaces them in a UI. You review, approve what makes sense, reject what doesn't. The agent maintains the memory system; you stay in control of what it actually does.\n\n## The graph visualizer\n\nThe SQLite backend enabled something that wasn't possible with markdown files: a knowledge graph.\n\n`memory/server.ts` runs a Bun server on port 7331. `memory/graph-app/` is a Next.js app on 7332 that reads from it via WebSocket. What you see is a D3 force graph: project nodes, memory nodes, context item nodes, edges representing relationships.\n\nThe layout is intentionally organic — link strength varies by relationship type. `context_of` links are loose (0.04), so context items float near their projects. `project_scope` links are tighter (0.25). Memory-to-memory relations are strong (0.6). The simulation converges and you can see clusters.\n\nPractically useful features:\n\n- **⌘K spotlight search** — FTS5-powered, keyboard navigable, zooms the graph to the matching node on select\n- **Tag filter panel** — click a tag to dim everything that doesn't match\n- **Project drill-down** — click any project node to get a dedicated page with all its context, memories, and relations\n- **Pending actions page** — the Janitor's propose queue, one click to approve or reject\n\nThe graph makes something visible that was always there but invisible: what the model actually knows about your projects, how those memories relate, and where the gaps or stale entries are.\n\n## Multi-provider embeddings\n\nSemantic dedup and the `/recall` search need embeddings. The system now supports six providers: Gemini, OpenAI, Anthropic, Cohere, OpenRouter, Ollama.\n\nThe settings UI at `/settings` lets you pick your embed provider, verify the API key inline (paste → spinner → green/red), and select from a dropdown of available models for that provider. It doesn't matter which you use for the embeddings — what matters is consistency, since vectors from different models aren't comparable.\n\nI run Ollama locally for embeddings. No API key, no cost, fast enough for the volume of memories a single developer accumulates.\n\n## What actually changed day-to-day\n\nThe hooks look the same from the outside. Session starts, context is injected, work happens, progress is logged. The difference is what happens underneath and over time.\n\nWith markdown files, the system degraded slowly. Files got messy. Duplicates crept in. The 20-item trim on progress.md was a blunt instrument. You never really knew what was in the DB unless you opened the files.\n\nWith SQLite, the system improves over time. Memories that matter get used, have their confidence reinforced, and survive. Memories that stop being relevant decay. The Janitor surfaces what needs attention instead of letting stale data accumulate silently.\n\nThe graph visualizer isn't something I use every session — but when I do open it, it answers questions that were previously unanswerable: \"what have I decided about this project?\", \"is there a gotcha about this library I logged a month ago?\", \"why does this memory exist?\"\n\nThe config is version-controlled at [github.com/RohiRIK/claude-code-config](https://github.com/RohiRIK/claude-code-config).\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"children\":[[\"$\",\"$L18\",null,{\"maxWidth\":12,\"m\":{\"hide\":true}}],[\"$\",\"$L18\",null,{\"fillWidth\":true,\"horizontal\":\"center\",\"children\":[\"$\",\"$L10\",null,{\"as\":\"section\",\"maxWidth\":\"m\",\"horizontal\":\"center\",\"gap\":\"l\",\"paddingTop\":\"24\",\"children\":[[\"$\",\"$L1a\",null,{\"id\":\"schema-blogPosting-/blog/claude-code-config\",\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"url\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/blog/claude-code-config\\\",\\\"sameAs\\\":[],\\\"headline\\\":\\\"How I Configured Claude Code to Actually Remember Things\\\",\\\"description\\\":\\\"The default Claude Code setup loses context on every session. Here's the hook system, skill commands, agent definitions, and memory architecture I built to fix that.\\\",\\\"image\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/images/blog/claude-code-config.png\\\",\\\"datePublished\\\":\\\"2026-03-02\\\",\\\"dateModified\\\":\\\"2026-03-02\\\",\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"Rohi Rikman\\\",\\\"url\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/about\\\",\\\"image\\\":{\\\"@type\\\":\\\"ImageObject\\\",\\\"url\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/images/avatar.png\\\"}}}\"}}],[\"$\",\"$L10\",null,{\"maxWidth\":\"s\",\"gap\":\"16\",\"horizontal\":\"center\",\"align\":\"center\",\"children\":[[\"$\",\"$L1b\",null,{\"href\":\"/blog\",\"children\":[\"$\",\"span\",null,{\"className\":\" {\"columns\":\"2\",\"s\":{\"columns\":1},\"fillWidth\":true,\"marginBottom\":\"40\",\"gap\":\"16\",\"children\":[[\"$\",\"$L23\",\"claude-code-config-v2\",{\"post\":{\"metadata\":{\"title\":\"Claude Code Config v2: SQLite LTM, a Janitor Agent, and a Memory Graph\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-11\",\"summary\":\"The markdown-file memory system worked until it didn't. Here's what I replaced it with — a SQLite LTM, an autonomous Janitor agent, and a D3 graph that shows you what the model actually knows.\",\"image\":\"/images/blog/claude-code-config-v2.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"claude-code-config-v2\",\"content\":\"$24\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L25\"]}]]}],\"$L26\"]}]}],\"$L27\"]}]\n"])</script><script>self.__next_f.push([1,"29:I[988654,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ScrollToHash\"]\n2a:I[605649,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingNav\"]\n28:T1f74,"])</script><script>self.__next_f.push([1,"\nThe brief arrived in a Teams message. The IT team was managing hundreds of Windows devices through Microsoft Intune and they had no good way to answer a simple question: what's actually out there, and what state is it in?\n\nTheir proposed solution: a PowerShell script triggered by Jenkins, pulling device data from the Intune API and writing it to SharePoint lists. Power BI would sit on top and refresh on a schedule. Dashboards, filters, the works.\n\nIt's a reasonable ask. It's how a lot of IT shops solve this problem. They've got the pieces — Intune, SharePoint, Power BI — and they want to wire them together. The request made sense for where they were.\n\nI said I'd get back to them with a proposal.\n\n## The Ceiling\n\nI spent a day mapping out the pipeline they'd asked for. And the more I built it in my head, the more I saw where it would break.\n\n**SharePoint as a database** is the first problem. SharePoint lists have a 5,000-item view threshold — not a hard limit, but enough to start causing issues at scale. There's no real schema enforcement, no foreign keys, no joins. You end up denormalizing everything and hoping the refresh writes are idempotent. When they're not, you get stale rows and duplicate entries that Power BI dutifully surfaces as real data.\n\n**Jenkins as a scheduler** is infra for infra's sake. You're running a CI/CD system to run a cron job. That means maintaining an agent, managing credentials, monitoring for failed runs, building retry logic from scratch. When the sync breaks at 2am, nobody knows until someone notices the dashboards haven't updated.\n\n**Power BI on a schedule** means the data is stale by definition. If your refresh runs every four hours and a device falls out of compliance at 9am, your dashboard won't show it until 1pm. For a compliance and security use case, that gap matters.\n\nAnd there was no RBAC anywhere in this design. Anyone with SharePoint access could see everything — all devices, all users, all compliance states. Helpdesk techs, managers, contractors. No audit trail of who looked at what.\n\nBut the deepest problem wasn't architectural. The client didn't actually want a pipeline. They wanted **device visibility**. They wanted to know what was out there and whether it was healthy. The pipeline was just the closest solution shape they knew how to ask for.\n\n## The Pitch\n\nI came back with a counter-proposal.\n\nInstead of a pipeline, I pitched a purpose-built web app: FleetWatch. The sell was simple — you'll stop asking \"is this data current?\" because it always will be.\n\nSpecifically:\n- Real-time sync via Microsoft Graph API delta queries, pulling only changed devices instead of exporting everything on a schedule\n- Postgres as the data store — real schema, real queries, real relational data\n- RBAC built in from day one: admins see everything, helpdesk sees their assigned devices\n- Full audit logs of who accessed what and when\n- A proper UI instead of a Power BI dashboard that takes 30 seconds to load and can't drill into a single device\n\nThe client said yes. Partly because the technical argument was sound, and partly because I had mocked up what the device detail page would look like. It's easier to approve something you can see.\n\n## The Architecture\n\nThe core of FleetWatch is the Microsoft Graph API integration.\n\nAuthentication uses a Service Principal with Client Certificate auth — no client secrets that expire. The key endpoint is `/deviceManagement/managedDevices/delta`, which supports delta queries: on first run you get all devices, on subsequent runs you only get devices that changed since your last sync token. Instead of exporting 800 devices every four hours, you're processing 12 changed devices every 30 minutes.\n\nThe sync runs on Vercel Cron jobs. No Jenkins, no agents, no infra to maintain. The cron endpoint is protected with a shared secret header — simple, effective. Failed syncs surface in application logs, not in a Jenkins console that nobody checks.\n\nThe data layer is Postgres on Vercel with Drizzle ORM. The schema models the actual domain: a `devices` table, a `users` table, `compliance_policies`, `app_inventory`, `security_hardware`. When you need to answer \"which devices have BitLocker disabled and are assigned to users in the Finance department,\" that's a join, not a SharePoint list crawl.\n\nThe frontend is Next.js 15 with the App Router. Server Components handle the heavy lifting — device lists, compliance views, filtered queries all render server-side. The device detail page has six tabs: Overview, Compliance, Configuration, Security, Hardware, and Network. Each tab queries only the data it needs.\n\n```\nBefore (proposed):\nJenkins → PowerShell → SharePoint Lists → Power BI (scheduled refresh)\n\nAfter (FleetWatch):\nVercel Cron → Microsoft Graph API → Postgres → Next.js (real-time)\n```\n\nAuth is NextAuth with role-based access enforced at the API layer. The middleware checks roles before any data query runs — not just in the UI, where it's trivial to bypass. Admin and read-only roles are stored per-user in the database, not inferred from SharePoint group membership.\n\nMonitoring is a `/api/health` endpoint that checks database connectivity and last successful sync time, plus a `/api/metrics` endpoint for the operational stats I actually care about: sync duration, devices processed, error rate. Redis is wired in as an optional cache layer for the dashboard aggregate queries.\n\n## What It Enables\n\nThe gap between the pipeline and the app isn't cosmetic — it's functional.\n\nSearch and filter across all 800 devices returns results in under 100ms. You can filter by compliance state, OS version, last sync time, assigned user, or any combination. In Power BI with a scheduled refresh, you're waiting for a report to load and hoping it reflects reality.\n\nThe device detail page shows everything in one place: BitLocker status, TPM chip version, Secure Boot state, assigned compliance policies, installed applications, network adapters. That level of detail doesn't exist in the SharePoint list model — you'd need separate lists for each entity and a Power BI data model to join them, which you'd then need to maintain.\n\nRBAC means helpdesk techs can look up devices without needing SharePoint permissions across the entire tenant. No permissions sprawl, no \"just give them read access to the list.\" You grant a role in FleetWatch and that's it.\n\nThe export function lets you pull filtered device lists to CSV — useful for compliance reporting, vendor audits, or just sending a list of non-compliant devices to the right team. It works on whatever filter you've currently applied, so you're exporting exactly what you're looking at.\n\nCompliance trend graphs show state over time from the sync history, not from a Power BI snapshot that was current when the report was built. When a device falls out of compliance and comes back, you can see when both events happened.\n\n## The Lesson\n\nScripts are the right first tool when scope is unclear. If the client had wanted a one-time export to audit their device inventory, the PowerShell approach would have been exactly right. Fast to build, no ongoing maintenance, done.\n\nBut when the real problem is ongoing visibility — and when the solution needs RBAC, audit logs, freshness guarantees, and drill-down — the pipeline approach has a ceiling. It would have worked for three months. Then the IT team would have been back asking for user lookup, filtered exports, freshness indicators, device-level detail. The pipeline would have been extended with more scripts, more SharePoint lists, more Power BI datasets. Each addition would have made the system more fragile and harder to reason about.\n\nBuilding FleetWatch upfront was a harder conversation to have, but it was the right one. The client got a system that solves the problem they actually had — not the problem they knew how to articulate.\n\nThe source is on GitHub at [RohiRIK/FleetWatch](https://github.com/RohiRIK/FleetWatch) if you want to see how it's put together.\n"])</script><script>self.__next_f.push([1,"25:[\"$\",\"$L23\",\"fleetwatch-from-script-to-system\",{\"post\":{\"metadata\":{\"title\":\"From Script to System: How I Turned a Jenkins Pipeline into FleetWatch\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-04\",\"summary\":\"My client wanted PowerShell scripts dumping Intune data into SharePoint for Power BI. I built a web app instead. Here's why — and how.\",\"image\":\"/images/blog/fleetwatch-from-script-to-system.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"fleetwatch-from-script-to-system\",\"content\":\"$28\"},\"thumbnail\":true,\"direction\":\"column\"}]\n26:[\"$\",\"$L29\",null,{}]\n27:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L2a\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2b:I[811052,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingLink\"]\n2c:I[362844,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"InlineCode\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The default Claude Code installation does one thing poorly: it forgets everything. Every new session, you re-explain your stack, your preferences, the decisions you made last week. It compounds quickly on any project you're in for more than a few days.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"I spent a few months building a configuration layer on top of Claude Code that solves this. Here's what it does and how it works.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-memory-problem\",\"children\":\"The memory problem\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Claude Code has no persistence by default. The context window holds your current session. When it compacts or you start a new one, that state is gone. You're not losing information in a database — you're losing it from the model's working memory.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The fix isn't clever prompting. It's an explicit memory system with structured files and hooks that write to and read from those files automatically.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-4-file-context-system\",\"children\":\"The 4-file context system\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Each project gets a directory at \",[\"$\",\"$L2c\",null,{\"children\":\"~/.claude/projects/\u003cname\u003e/\"}],\" with four files:\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"context-goals.md\"}]}],\" — what I'm working on right now. Max 5 lines. Rewritten when the goal changes. Keeps the model from drifting into solving adjacent problems.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"context-decisions.md\"}]}],\" — architectural choices and why. Permanent, never deleted. If I decided to use Infisical instead of environment variables, that's in here with the reason. The model doesn't suggest what I've already ruled out.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"context-progress.md\"}]}],\" — completed tasks and what's in flight. Auto-trimmed to the last 20 items. Serves as a working log without growing unbounded.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"context-gotchas.md\"}]}],\" — warnings, blockers, and lessons. Also permanent. If something bit me once — a library quirk, an environment constraint, a mistake pattern — it lives here forever. The model reads it at session start and doesn't repeat the same mistakes.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"These files are plain markdown. They're updated manually after significant tasks, and automatically by hooks at session end.\"}],\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\",\"\\n\",\"$L4b\",\"\\n\",\"$L4c\",\"\\n\",\"$L4d\",\"\\n\",\"$L4e\",\"\\n\",\"$L4f\",\"\\n\",\"$L50\",\"\\n\",\"$L51\",\"\\n\",\"$L52\",\"\\n\",\"$L53\"]\n"])</script><script>self.__next_f.push([1,"54:I[436122,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"List\"]\n55:I[626935,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ListItem\"]\n2d:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-hooks\",\"children\":\"The hooks\"}]\n2e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Hooks are shell scripts or TypeScript files that Claude Code runs in response to lifecycle events. I have six:\"}]\n2f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"SessionStart\"}],\" — runs when a new session opens. Reads the project's context files and injects a summary (max 60 lines) as a system message. The model immediately knows what project it's in, what the current goal is, what decisions are locked, and what to avoid. No re-explaining needed.\"]}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"PreCompact\"}],\" — runs before Claude Code compacts the context window. Assembles all four context files into \",[\"$\",\"$L2c\",null,{\"children\":\"context-summary.md\"}],\" — a structured 60-line snapshot. This becomes what SessionStart injects next time. Without this, compaction destroys context. With it, compaction is just a checkpoint.\"]}]\n31:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"EvaluateSession\"}],\" — runs when the session ends. Reads the transcript, extracts patterns — recurring mistakes, useful techniques, things that worked — and writes them to \",[\"$\",\"$L2c\",null,{\"children\":\"~/.claude/skills/Learned/\"}],\". These are ephemeral: they roll off after a few sessions. For anything important enough to keep permanently, I promote it manually to \",[\"$\",\"$L2c\",null,{\"children\":\"context-gotchas.md\"}],\".\"]}]\n32:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"SuggestCompact\"}],\" — tracks a running count of tool calls per session. At 50, it suggests running \",[\"$\",\"$L2c\",null,{\"children\":\"/compact\"}],\". This isn't mandatory, but the reminder is useful — context windows that run too long start producing lower-quality output.\"]}]\n33:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"UpdateContext\"}],\" — PostToolUse hook that fires after Write, Edit, or MultiEdit operations. Logs modified files to context-progress and runs Prettier and tsc on changed files immediately. Type errors and formatting issues surface at edit time, not at build time.\"]}]\n34:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Cleanup\"}],\" — periodic maintenance. Trims context-progress.md to the last 20 items. Removes context directories for proje"])</script><script>self.__next_f.push([1,"cts that haven't been touched in 30 days.\"]}]\n35:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"skills-and-commands\",\"children\":\"Skills and commands\"}]\n36:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Skills are reusable prompts that expand into full instructions when invoked. I have these:\"}]\n37:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/plan\"}]}],\" — invokes the planner agent before any implementation. Restates the requirement, breaks it into phases, identifies dependencies, flags risks. Produces a plan for review before any code is touched. I don't write code without running this first for anything non-trivial.\"]}]\n38:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/verify\"}]}],\" — runs a self-check loop: tsc → lint → tests → build, in order, stopping on first failure. The skill knows to skip steps that aren't configured for the project. Run before every commit.\"]}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/simplify\"}]}],\" — post-implementation review. Looks at recently modified code for unnecessary abstraction, duplicated logic, or complexity that crept in during implementation. Runs after verify.\"]}]\n3a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[\"$\",\"$L2c\",null,{\"children\":\"/commit-push-pr\"}]}],\" — precomputes git context (status, diff, log, branch), generates a conventional commit message, stages relevant files, commits, and pushes. Skips the tedium of assembling git commands manually.\"]}]\n3b:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":[ ":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Agents are specialized sub-models with scoped roles. They run separately from the main session and have access to the codebase but only for their designated purpose.\"}]\n41:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"planner\"}],\" — for implementation planning. Doesn't write code. Only produces plans with phases, dependencies, and risk flags.\"]}]\n42:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"code-reviewer\"}],\" — reviews code after it's written. Severity-based feedback. The reviewer doesn't have write access — it can't change files, only report.\"]}]\n43:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"security-reviewer\"}],\" — OWASP Top 10 checks, secret detection, dependency auditing. Runs before commits on anything that touches auth, input handling, or external integrations.\"]}]\n44:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"tdd-guide\"}],\" — enforces test-first. If I start implementing without a failing test, it redirects. Tracks coverage and flags when it drops below 80%.\"]}]\n45:[\"$\",\"span\",null,{\"className\":\"font-bod n\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"child"])</script><script>self.__next_f.push([1,"ren\":[\"Rules are markdown files in \",[\"$\",\"$L2c\",null,{\"children\":\"~/.claude/rules/\"}],\" that load into every session. They cover:\"]}]\n"])</script><script>self.__next_f.push([1,"4b:[\"$\",\"$L54\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Coding style\"}],\": immutability-first (spread operators, never mutate), no \",[\"$\",\"$L2c\",null,{\"children\":\"any\"}],\" types, explicit return types on exports, functions under 50 lines\"]}],\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Package manager\"}],\": bun not npm, uv not pip — enforced globally so I never get npm in a bun project\"]}],\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Git workflow\"}],\": conventional commits (\",[\"$\",\"$L2c\",null,{\"children\":\"feat|fix|refactor|docs|chore:\"}],\"), no \",[\"$\",\"$L2c\",null,{\"children\":\"Co-Authored-By\"}],\" footers, PR descriptions that cover the full diff not just the latest commit\"]}],\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Testing\"}],\": 80% minimum coverage, TDD workflow required for new features\"]}],\"\\n\",[\"$\",\"$L55\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Security\"}],\": no hardcoded secrets, input validation at system boundaries only, rate limiting on all endpoints\"]}],\"\\n\"]}]\n"])</script><script>self.__next_f ) have consistent execution. I don't skip \",[\"$\",\"$L2c\",null,{\"children\":\"/verify\"}],\" because it's convenient — the skill is right there and running it takes two seconds.\"]}]\n52:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"None of this is magic. It's structured configuration that enforces a workflow I decided I wanted. The alternative is relying on memory and discipline to apply that workflow manually every time. That doesn't scale.\"}]\n53:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The config is version-controlled at \",[\"$\",\"a\",null,{\"href\":\"https://github.com/RohiRIK/claude-code-config\",\"target\":\"_blank\",\"rel\":\"noopener noreferrer\",\"children\":\"github.com/RohiRIK/claude-code-config\"}],\".\"]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"56:I[27201,[\"/_next/static/chunks/d96012bcfc98706a.js\",\"/_next/static/chunks/73e3194f06db260e.js\"],\"IconMark\"]\n8:null\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"title\",\"0\",{\"children\":\"How I Configured Claude Code to Actually Remember Things\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"The default Claude Code setup loses context on every session. Here's the hook system, skill commands, agent definitions, and memory architecture I built to fix that.\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"How I Configured Claude Code to Actually Remember Things\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:descri
