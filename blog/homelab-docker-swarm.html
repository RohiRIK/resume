e Not Found\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"The page you are looking for does not exist.\"}]]}],[]],\"forbidden\":\"$un"])</script><script>self.__next_f.push([1,"defined\",\"unauthorized\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L18\",null,{\"as\":\"footer\",\"fillWidth\":true,\"padding\":\"8\",\"horizontal\":\"center\",\"s\":{\"direction\":\"column\"},\"children\":[[\"$\",\"$L18\",null,{\"className\":\"Footer-module-scss-module__DkSkqG__mobile\",\"maxWidth\":\"m\",\"paddingY\":\"8\",\"paddingX\":\"16\",\"gap\":\"16\",\"horizontal\":\"between\",\"vertical\":\"center\",\"s\":{\"direction\":\"column\",\"horizontal\":\"center\",\"align\":\"center\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-s neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[\"© \",2026,\" /\"]}],[\"$\",\"span\",null,{\"className\":\"px-4\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Rohi Rikman\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"/ Powered by caffeine and questionable life choices\"}]]}],[\"$\",\"$L18\",null,{\"gap\":\"16\",\"children\":[[\"$\",\"$L19\",\"GitHub\",{\"href\":\"https://github.com/RohiRIK\",\"icon\":\"github\",\"tooltip\":\"GitHub\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"LinkedIn\",{\"href\":\"https://www.linkedin.com/in/rohi-rikman-48831b239/\",\"icon\":\"linkedin\",\"tooltip\":\"LinkedIn\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"Email\",{\"href\":\"mailto:rohi@rohirikman.dev\",\"icon\":\"email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"23:T2296,"])</script><script>self.__next_f.push([1,"\nThe default Claude Code installation does one thing poorly: it forgets everything. Every new session, you re-explain your stack, your preferences, the decisions you made last week. It compounds quickly on any project you're in for more than a few days.\n\nI spent a few months building a configuration layer on top of Claude Code that solves this. Here's what it does and how it works.\n\n## The memory problem\n\nClaude Code has no persistence by default. The context window holds your current session. When it compacts or you start a new one, that state is gone. You're not losing information in a database — you're losing it from the model's working memory.\n\nThe fix isn't clever prompting. It's an explicit memory system with structured files and hooks that write to and read from those files automatically.\n\n## The 4-file context system\n\nEach project gets a directory at `~/.claude/projects/\u003cname\u003e/` with four files:\n\n**`context-goals.md`** — what I'm working on right now. Max 5 lines. Rewritten when the goal changes. Keeps the model from drifting into solving adjacent problems.\n\n**`context-decisions.md`** — architectural choices and why. Permanent, never deleted. If I decided to use Infisical instead of environment variables, that's in here with the reason. The model doesn't suggest what I've already ruled out.\n\n**`context-progress.md`** — completed tasks and what's in flight. Auto-trimmed to the last 20 items. Serves as a working log without growing unbounded.\n\n**`context-gotchas.md`** — warnings, blockers, and lessons. Also permanent. If something bit me once — a library quirk, an environment constraint, a mistake pattern — it lives here forever. The model reads it at session start and doesn't repeat the same mistakes.\n\nThese files are plain markdown. They're updated manually after significant tasks, and automatically by hooks at session end.\n\n## The hooks\n\nHooks are shell scripts or TypeScript files that Claude Code runs in response to lifecycle events. I have six:\n\n**SessionStart** — runs when a new session opens. Reads the project's context files and injects a summary (max 60 lines) as a system message. The model immediately knows what project it's in, what the current goal is, what decisions are locked, and what to avoid. No re-explaining needed.\n\n**PreCompact** — runs before Claude Code compacts the context window. Assembles all four context files into `context-summary.md` — a structured 60-line snapshot. This becomes what SessionStart injects next time. Without this, compaction destroys context. With it, compaction is just a checkpoint.\n\n**EvaluateSession** — runs when the session ends. Reads the transcript, extracts patterns — recurring mistakes, useful techniques, things that worked — and writes them to `~/.claude/skills/Learned/`. These are ephemeral: they roll off after a few sessions. For anything important enough to keep permanently, I promote it manually to `context-gotchas.md`.\n\n**SuggestCompact** — tracks a running count of tool calls per session. At 50, it suggests running `/compact`. This isn't mandatory, but the reminder is useful — context windows that run too long start producing lower-quality output.\n\n**UpdateContext** — PostToolUse hook that fires after Write, Edit, or MultiEdit operations. Logs modified files to context-progress and runs Prettier and tsc on changed files immediately. Type errors and formatting issues surface at edit time, not at build time.\n\n**Cleanup** — periodic maintenance. Trims context-progress.md to the last 20 items. Removes context directories for projects that haven't been touched in 30 days.\n\n## Skills and commands\n\nSkills are reusable prompts that expand into full instructions when invoked. I have these:\n\n**`/plan`** — invokes the planner agent before any implementation. Restates the requirement, breaks it into phases, identifies dependencies, flags risks. Produces a plan for review before any code is touched. I don't write code without running this first for anything non-trivial.\n\n**`/verify`** — runs a self-check loop: tsc → lint → tests → build, in order, stopping on first failure. The skill knows to skip steps that aren't configured for the project. Run before every commit.\n\n**`/simplify`** — post-implementation review. Looks at recently modified code for unnecessary abstraction, duplicated logic, or complexity that crept in during implementation. Runs after verify.\n\n**`/commit-push-pr`** — precomputes git context (status, diff, log, branch), generates a conventional commit message, stages relevant files, commits, and pushes. Skips the tedium of assembling git commands manually.\n\n**`/learn`** — manual trigger for pattern extraction. Same process as EvaluateSession but runs on demand mid-session when I want to capture something specific.\n\n**`/update-context`** — reads the current session and updates all four context files. Useful after completing a significant task when I want to flush progress immediately rather than waiting for the end-of-session hook.\n\n**`/tdd`** — enforces test-first workflow. Scaffolds the interface, writes the test, makes it fail, then implements the minimum code to pass. Blocks implementation until the test exists.\n\n**`/code-review`** — runs the code-reviewer agent on recently modified files. Returns severity-rated feedback: critical issues stop work, high issues get fixed, medium issues are noted.\n\n## Agents\n\nAgents are specialized sub-models with scoped roles. They run separately from the main session and have access to the codebase but only for their designated purpose.\n\n**planner** — for implementation planning. Doesn't write code. Only produces plans with phases, dependencies, and risk flags.\n\n**code-reviewer** — reviews code after it's written. Severity-based feedback. The reviewer doesn't have write access — it can't change files, only report.\n\n**security-reviewer** — OWASP Top 10 checks, secret detection, dependency auditing. Runs before commits on anything that touches auth, input handling, or external integrations.\n\n**tdd-guide** — enforces test-first. If I start implementing without a failing test, it redirects. Tracks coverage and flags when it drops below 80%.\n\n**architect** — for decisions that affect project structure. Invoked when I'm choosing between approaches that have lasting consequences, not for individual implementation decisions.\n\n**build-error-resolver** — when the build breaks, this agent diagnoses and makes the minimum change to get it green. Doesn't refactor, doesn't improve — just fixes the build.\n\n**refactor-cleaner** — dead code removal and consolidation. Runs tools like `knip` to find unused exports, then removes them. Used for maintenance, not mid-feature.\n\nThe separation is intentional. A code reviewer that can also edit files is dangerous — it starts making \"improvements\" that weren't asked for. Each agent does one thing.\n\n## Global rules\n\nRules are markdown files in `~/.claude/rules/` that load into every session. They cover:\n\n- **Coding style**: immutability-first (spread operators, never mutate), no `any` types, explicit return types on exports, functions under 50 lines\n- **Package manager**: bun not npm, uv not pip — enforced globally so I never get npm in a bun project\n- **Git workflow**: conventional commits (`feat|fix|refactor|docs|chore:`), no `Co-Authored-By` footers, PR descriptions that cover the full diff not just the latest commit\n- **Testing**: 80% minimum coverage, TDD workflow required for new features\n- **Security**: no hardcoded secrets, input validation at system boundaries only, rate limiting on all endpoints\n\nThe model reads these rules at every session start. They're not suggestions — they're constraints that get checked during code review and verify.\n\n## What this actually changes day-to-day\n\nThe memory system means I can leave a project for a week and come back without a re-orientation session. The model knows where I left off, what I decided, and what's broken.\n\nThe hooks mean formatting and type errors surface immediately. I don't batch-discover problems at commit time.\n\nThe agents mean review happens as a matter of course. I'm not remembering to run security checks — they're part of the workflow for anything touching auth or external data.\n\nThe skills mean the repetitive parts (planning, verifying, committing) have consistent execution. I don't skip `/verify` because it's convenient — the skill is right there and running it takes two seconds.\n\nNone of this is magic. It's structured configuration that enforces a workflow I decided I wanted. The alternative is relying on memory and discipline to apply that workflow manually every time. That doesn't scale.\n\nThe config is version-controlled at [github.com/RohiRIK/claude-code-config](https://github.com/RohiRIK/claude-code-config).\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"children\":[[\"$\",\"$L18\",null,{\"maxWidth\":12,\"m\":{\"hide\":true}}],[\"$\",\"$L18\",null,{\"fillWidth\":true,\"horizontal\":\"center\",\"children\":[\"$\",\"$L10\",null,{\"as\":\"section\",\"maxWidth\":\"m\",\"horizontal\":\"center\",\"gap\":\"l\",\"paddingTop\":\"24\",\"children\":[[\"$\",\"$L1a\",null,{\"id\":\"schema-blogPosting-/blog/homelab-docker-swarm\",\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"url\\\":\\\"https://rohirik.github.io/resume/blog/homelab-docker-swarm\\\",\\\"sameAs\\\":[],\\\"headline\\\":\\\"My Homelab on Docker Swarm: What Runs, How It's Wired, What Broke\\\",\\\"description\\\":\\\"A tour of my self-hosted infrastructure — fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/b4d60b79b2dcf7b3.js\"],\"HeadingNav\"]\n27:T1eda,"])</script><script>self.__next_f.push([1,"\nI've been building most of my personal projects with Claude Code for the past year. The tool works, but not in the way most people describe it. The narrative is usually \"just describe what you want and it builds it.\" That's not wrong, but it's missing the part where a bad description causes you to spend two hours steering the model away from the wrong implementation.\n\nThe shift that changed everything was treating AI as an analyst team, not a code generator.\n\n## The planning problem\n\nEarly on, I'd describe a feature and let Claude start coding immediately. Sometimes it went well. More often, I'd get 200 lines of code that solved the wrong problem — technically correct but not what I needed. Worse, fixing the direction mid-implementation is expensive. You've already loaded context, written partial code, maybe created files. Undoing that costs more than starting right.\n\nThe pattern I settled on: spend more time on the plan, less time on implementation. A well-scoped plan with clear constraints means near-zero steering during implementation. The model isn't smarter with a good plan, it's just pointed at the right target.\n\nMy workflow now: `/plan` → review and modify until it's right → auto-accept mode for implementation → `/simplify` → `/verify` → commit. The planning phase takes as long as it takes. Everything after it is fast.\n\n## The context problem\n\nThe second thing that broke early: context windows. You hit the limit mid-session, the model compacts, and suddenly it's lost track of decisions you made an hour ago. It suggests approaches you already ruled out. You repeat yourself. Progress slows.\n\nI solved this with a 3-layer memory model.\n\n**Layer 1: Real-time context management.** A context-mode MCP server runs commands in isolated subprocesses and returns only summaries to the main context window. Running `bun test` without this floods the window with output you don't need. With it, you get a two-line summary. This alone extended how long a focused session could run before things got noisy.\n\n**Layer 2: Per-session state.** Four markdown files per project, stored at `~/.claude/projects/\u003cname\u003e/`:\n- `context-goals.md` — what I'm working on right now (max 5 lines, rewritten when goals change)\n- `context-decisions.md` — architectural choices and why (permanent, never deleted)\n- `context-progress.md` — completed tasks and what's in flight (auto-trimmed to last 20)\n- `context-gotchas.md` — warnings, blockers, lessons (permanent, never deleted)\n\nA pre-compaction hook assembles these into a summary that gets injected at the next session start. When I come back after a break, I'm not starting from scratch — the model knows where we left off, what decisions are locked in, and what to avoid.\n\n**Layer 3: Cross-session learning.** At the end of each session, an EvaluateSession hook extracts patterns from the transcript and writes them to `skills/Learned/`. These are ephemeral and eventually trimmed. But if a lesson is important enough to keep — a bug pattern that bit me twice, a library quirk — I promote it manually to `context-gotchas.md`. Gotchas never get trimmed.\n\n## The analyst team model\n\nThe thing I've found most useful is treating Claude not as one model but as a team with different roles. I have 11 specialized agents configured, each scoped to a specific kind of work:\n\n- **Planner** — scopes features, identifies dependencies, flags risks before any code is written\n- **Code reviewer** — severity-based feedback: critical issues block commit, high issues get fixed, medium are noted\n- **Security reviewer** — OWASP Top 10, secrets detection, dependency auditing\n- **TDD guide** — enforces write-tests-first; if I try to implement before writing a test, it stops me\n- **Build error resolver** — when the build breaks, this agent diagnoses and fixes without touching anything else\n- **Architect** — for decisions that affect project structure, not just implementation\n- **E2E runner** — Playwright tests for critical user flows\n\nThese aren't just named system prompts. They run as separate agents with access to the codebase but scoped to their role. The code reviewer doesn't have permission to edit files. The build error resolver doesn't refactor — it makes the minimum change to get green. Scope matters for agents the same way it matters for service accounts.\n\n## SOC workflow integration\n\nMy Project Aegis work — the AI agent system for security operations — introduced a different set of constraints. When an agent can interact with a SIEM, create tickets, or trigger containment actions, \"let the model decide\" isn't good enough.\n\nThe patterns that held up:\n\n**Confidence thresholds.** Every agent action has a confidence score. Below a threshold, the action pauses and creates a human review task instead of executing. The threshold is higher for destructive actions. Isolating a device requires higher confidence than creating an alert ticket.\n\n**Read-before-write confirmation.** Before any write action, the agent confirms its understanding of the current state. This catches prompt injection — where adversarial content in ingested data tries to redirect the agent — before damage is done. If the agent's understanding of state doesn't match reality, it stops.\n\n**Rate limiting on destructive operations.** An agent that can create tickets is capped at N per hour. An agent that can isolate devices has a hard limit per day. If the cap is hit, it alerts a human rather than continuing. This catches runaway behavior from bugs or injection before it becomes a real incident.\n\n**Separate identities per agent.** Each agent in Aegis has its own service principal with scoped permissions. The threat intel ingestion agent can't touch the ticketing system. The triage agent can't run containment actions. When agents hand off work, they pass context — not credentials. The receiving agent authenticates with its own identity.\n\nThis isn't theoretical. I caught two cases during development where prompt injection in test threat feeds would have caused the agent to try accessing out-of-scope resources. The read-before-write check stopped both.\n\n## The non-negotiables\n\nAfter a year of this, some things have survived every project. They're in my global Claude Code config and get applied automatically:\n\n**Immutability.** Spread operators, never mutate. Every time I've allowed mutation \"just for simplicity,\" I've spent more time debugging state issues than the mutation saved.\n\n**80% test coverage minimum.** Not a target, a floor. The TDD agent enforces this. Tests go in first; if they don't, the agent pauses and redirects. I've shipped features with 95% coverage. I've never shipped with less than 80% and had it go cleanly.\n\n**Conventional commits.** `feat|fix|refactor|docs|chore: description`. The commit-push-pr command precomputes git context and generates these automatically. Having a consistent format means the git history is readable and PRs are easy to summarize.\n\n**Bun, not npm.** Faster, built-in TypeScript support, consistent. I stopped arguing about this.\n\n**No `console.log` in committed code.** A PostToolUse hook flags it on every edit. It sounds minor. It's not — debugging production logs that are half `console.log(\"here\")` is miserable.\n\n## What actually breaks if you skip the planning\n\nI've run the experiment. Skipping `/plan` and going straight to implementation feels faster at the start. By the middle of implementation, you're steering. By the end, you're either accepting something that doesn't quite fit or throwing away the implementation and starting over.\n\nThe planning phase doesn't write code, so it feels unproductive. It's the opposite. A 20-minute planning session that surfaces a wrong assumption saves two hours of implementation. Every time.\n\nThe model isn't the bottleneck. The bottleneck is clarity about what you're building.\n"])</script><script>self.__next_f.push([1,"24:[\"$\",\"$L22\",\"vibe-coding-ai-workflows\",{\"post\":{\"metadata\":{\"title\":\"What I Actually Learned from Vibe Coding with Claude Code\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-02\",\"summary\":\"A year of building projects with AI: what the workflow looks like, how I keep context alive across sessions, which safety patterns actually work, and what breaks if you skip them.\",\"image\":\"/images/blog/vibe-coding-ai-workflows.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"vibe-coding-ai-workflows\",\"content\":\"$27\"},\"thumbnail\":true,\"direction\":\"column\"}]\n25:[\"$\",\"$L28\",null,{}]\n26:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L29\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2a:I[811052,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/b4d60b79b2dcf7b3.js\"],\"HeadingLink\"]\n2b:I[362844,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/b4d60b79b2dcf7b3.js\"],\"InlineCode\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"My homelab runs on a dedicated server, not a cloud VPS. Everything is version-controlled, documented, and designed to run without me touching it. It's been doing that for over a year.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This is what's running, how it's wired together, and what went wrong the first time.\"}],\"\\n\",[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"why-swarm-and-not-the-alternatives\",\"children\":\"Why Swarm and not the alternatives\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The choice comes up every time I mention this setup: why not Kubernetes, why not plain Compose?\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Kubernetes is genuinely overkill for a single server. The operational overhead — etcd, control plane components, kubeconfig management, networking plugins — is real work for infrastructure that only needs to orchestrate maybe 10 services. The value of Kubernetes is horizontal scaling and high availability across nodes. I have one node.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Plain Compose works and is simple to reason about, but it doesn't give you health-based restarts, rolling updates, or service redeployment without downtime. When a container crashes, Compose doesn't automatically reschedule it. Swarm does.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Swarm hits the right point in the tradeoff: orchestration primitives (services, secrets, overlay networks, health checks, update policies) without the operational overhead of a full cluster. It's been running with no manual intervention since I set it up.\"}],\"\\n\",[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"network-architecture\",\"children\":\"Network architecture\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"All external traffic enters through Traefik on ports 80 and 443. Traefik handles Let's Encrypt SSL automatically — certificates are provisioned on first request and renewed without manual intervention. It routes to the right service based on hostname labels on each container.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Backend services communicate over internal overlay networks and have no ports exposed to the outside. The pattern is: Traefik is the only service on \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" that faces the internet. Everything else is on service-specific overlay networks and only joins \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" if it needs to be externally reachable. Services that don't need external exposure — databases, internal APIs — are never on \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" at all.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This is the same segmentation principle as network microsegmentation: services can't reach each other unless there's an explicit path. If Firecrawl gets compromised, it can't directly reach n8n or the secrets store. They're on different networks.\"}],\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\"]\n"])</script><script>self.__next_f.push([1,"2c:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"secrets-management\",\"children\":\"Secrets management\"}]\n2d:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The first version of this setup used environment variables in Compose files. This is the common approach and also the wrong one: environment variables end up in Compose files, Compose files end up in git, and suddenly you're sanitizing git history.\"}]\n2e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"I replaced all of that with Infisical, which I self-host on the same server. Agents and services fetch credentials at runtime through the Infisical SDK or CLI. Nothing sensitive is in the Compose files. If I need to rotate a credential, I update it in Infisical and restart the affected service — no code changes, no Compose file edits.\"}]\n2f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Infisical also gives me an audit trail: which service fetched which secret, when. For a homelab, this might sound excessive. It's not — knowing that a service fetched a credential at an unexpected time is useful signal.\"}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Docker Swarm also has native secrets (\",[\"$\",\"$L2b\",null,{\"children\":\"docker secret\"}],\"), which I use for a few things that Infisical can't easily inject (init scripts, bootstrap credentials for Infisical itself). Both live alongside each other without conflict.\"]}]\n31:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-runs-on-it\",\"children\":\"What runs on it\"}]\n32:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Traefik\"}],\" — Edge router and SSL termination. Service discovery is automatic via container labels. I define routes in each service's Compose file rather than in a central Traefik config, which means adding a new service doesn't require touching the router config.\"]}]\n33:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Portainer\"}],\" — Swarm management UI. Most things I do via CLI, but Portainer is useful for visualizing the current state of the stack, looking at service logs without SSHing in, and managing one-off tasks. It connects to the Docker socket and has full visibility into the Swarm.\"]}]\n34:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Infisical\"}],\" — Secrets store. Self-hosted with its own database. Services fetch credentials from Infisical at startup; nothing sensitive lives anywhere else in the stack.\"]}]\n35:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"n8n\"}],\" — Workflow automation. This is the busiest service in the stack — it's connected to a handful of external APIs and runs scheduled and event-triggered automations. It persists state to a volume on the host. The workflow definitions are exported and version-controlled separately.\"]}]\n36:[\"$\",\"span\",null,{\"classNa"])</script><script>self.__next_f.push([1,"me\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Firecrawl\"}],\" — Documentation crawling for AI projects. I run this alongside Project Aegis and other AI tools that need to index documentation from web sources. Self-hosting it means I control the crawl rate and the data stays local.\"]}]\n37:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"SearXNG\"}],\" — Self-hosted metasearch. Routes queries to multiple search engines without sending identifying information to any of them. Useful when Claude Code or local agents need to search the web without leaking query patterns.\"]}]\n38:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-modular-stack-structure\",\"children\":\"The modular stack structure\"}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The first version of this setup was a single large Compose file. Everything was defined in one place, which felt clean until the stack had eight services and adding a ninth meant scrolling through 400 lines of YAML and hoping you didn't break something in the middle.\"}]\n3a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"More importantly: redeploying one service meant bringing the entire stack down or doing careful surgery on a monolithic file. It didn't scale.\"}]\n3b:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The current structure is one directory per service, each with its own Compose file:\"}]\n3c:[\"$\",\"pre\",null,{\"children\":[\"$\",\"$L2b\",null,{\"children\":\"homelab-swarm-stack/\\n  traefik/\\n    docker-compose.yml\\n  portainer/\\n    docker-compose.yml\\n  infisical/\\n    docker-compose.yml\\n  n8n/\\n    docker-compose.yml\\n  ...\\n\"}]}]\n3d:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Each service connects to the shared \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" network for ingress (if it needs external exposure) and to service-specific networks for internal communication. The \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" network is created once and referenced as external in each Compose file.\"]}]\n3e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Deploying a new service: create its directory, write its Compose file, deploy with \",[\"$\",\"$L2b\",null,{\"children\":\"docker stack deploy\"}],\". No other service is touched. Removing a service: \",[\"$\",\"$L2b\",null,{\"children\":\"docker stack rm \u003cservice\u003e\"}],\". The rest of the stack is unaffected.\"]}]\n3f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This is the same principle as microservices architecture applied to infrastructure config: each unit is independently deployable and changes to one don't risk breaking others.\"}]\n40:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-s-required-to-maintain-it\",\"children\":\"What's required to maintain it\"}]\n41:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeig"])</script><script>self.__next_f.push([1,"ht\":\"175%\"},\"children\":\"The honest answer: almost nothing. Traefik renews certs automatically. Services restart on failure via Swarm health checks. I don't do manual updates — I have a process for pulling new images and redeploying, but it's not automated (I want to be intentional about when things update).\"}]\n42:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"What does require occasional attention:\"}]\n43:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Storage.\"}],\" Volumes accumulate data. n8n's database grows. I check disk usage monthly and prune what's not needed.\"]}]\n44:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Infisical.\"}],\" The self-hosted version needs occasional updates. These are the updates I'm most careful about — Infisical holds credentials for everything else, so a botched update has cascading effects. I test updates on a snapshot before applying to the live instance.\"]}]\n45:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Network connectivity.\"}],\" Occasionally a service loses connectivity to \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" after a server restart. The fix is always \",[\"$\",\"$L2b\",null,{\"children\":\"docker network connect proxy-net \u003ccontainer\u003e\"}],\" — it takes 10 seconds, but it's annoying enough that I documented it in the project's gotchas file.\"]}]\n46:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Swarm state.\"}],\" Single-node Swarm doesn't have the HA guarantees of a multi-node cluster. If the server loses power without a clean shutdown, Swarm state can get inconsistent. I keep a current export of all stack definitions so recovery is redeploy-from-scratch rather than debugging corrupted state.\"]}]\n47:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-i-d-do-differently\",\"children\":\"What I'd do differently\"}]\n48:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The secrets management was the biggest early mistake. Environment variables in Compose files feel convenient until they're not. Infisical from the start would have saved the work of migrating everything over.\"}]\n49:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The second thing: start modular. A monolithic Compose file is tempting for the first three services because it's less overhead. By service six, you're paying for it. The directory-per-service structure takes five minutes to set up and saves hours later.\"}]\n4a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Everything else, including the Swarm choice over Kubernetes, I'd make the same way.\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"4b:I[27201,[\"/resume/_next/static/chunks/d96012bcfc98706a.js\",\"/resume/_next/static/chunks/73e3194f06db260e.js\"],\"IconMark\"]\n8:null\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"title\",\"0\",{\"children\":\"My Homelab on Docker Swarm: What Runs, How It's Wired, What Broke\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"A tour of my self-hosted infrastructure — Docker Swarm for orchestration, Traefik for ingress, Infisical for secrets, and the modular design that replaced the monolith I should never have written.\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"My Homelab on Docker Swarm: What Runs, How It's Wired, What Broke\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"A tour of my self-hosted infrastructure — Docker Swarm for orchestration, Traefik for ingress, Infisical for secrets, and the modular design that replaced the monolith I should never have written.\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:url\",\"content\":\"https://rohirik.github.io/resume/blog/homelab-docker-swarm\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:image\",\"content\":\"https://rohirik.github.io/resume/images/blog/homelab-docker-swarm.png\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:image:alt\",\"content\":\"My Homelab on Docker Swarm: What Runs, How It's Wired, What Broke\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:type\",\"content\":\"website\"}],[\"$\",\"meta\",\"8\",{\"name\":\"twitter:card\",\"con
