e Not Found\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"The page you are looking for does not exist.\"}]]}],[]],\"forbidden\":\"$un"])</script><script>self.__next_f.push([1,"defined\",\"unauthorized\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L18\",null,{\"as\":\"footer\",\"fillWidth\":true,\"padding\":\"8\",\"horizontal\":\"center\",\"s\":{\"direction\":\"column\"},\"children\":[[\"$\",\"$L18\",null,{\"className\":\"Footer-module-scss-module__DkSkqG__mobile\",\"maxWidth\":\"m\",\"paddingY\":\"8\",\"paddingX\":\"16\",\"gap\":\"16\",\"horizontal\":\"between\",\"vertical\":\"center\",\"s\":{\"direction\":\"column\",\"horizontal\":\"center\",\"align\":\"center\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-s neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[\"© \",2026,\" /\"]}],[\"$\",\"span\",null,{\"className\":\"px-4\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Rohi Rikman\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"/ Powered by caffeine and questionable life choices\"}]]}],[\"$\",\"$L18\",null,{\"gap\":\"16\",\"children\":[[\"$\",\"$L19\",\"GitHub\",{\"href\":\"https://github.com/RohiRIK\",\"icon\":\"github\",\"tooltip\":\"GitHub\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"LinkedIn\",{\"href\":\"https://www.linkedin.com/in/rohi-rikman-48831b239/\",\"icon\":\"linkedin\",\"tooltip\":\"LinkedIn\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"Email\",{\"href\":\"mailto:rohi@rohirikman.dev\",\"icon\":\"email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"23:T1f74,"])</script><script>self.__next_f.push([1,"\nThe brief arrived in a Teams message. The IT team was managing hundreds of Windows devices through Microsoft Intune and they had no good way to answer a simple question: what's actually out there, and what state is it in?\n\nTheir proposed solution: a PowerShell script triggered by Jenkins, pulling device data from the Intune API and writing it to SharePoint lists. Power BI would sit on top and refresh on a schedule. Dashboards, filters, the works.\n\nIt's a reasonable ask. It's how a lot of IT shops solve this problem. They've got the pieces — Intune, SharePoint, Power BI — and they want to wire them together. The request made sense for where they were.\n\nI said I'd get back to them with a proposal.\n\n## The Ceiling\n\nI spent a day mapping out the pipeline they'd asked for. And the more I built it in my head, the more I saw where it would break.\n\n**SharePoint as a database** is the first problem. SharePoint lists have a 5,000-item view threshold — not a hard limit, but enough to start causing issues at scale. There's no real schema enforcement, no foreign keys, no joins. You end up denormalizing everything and hoping the refresh writes are idempotent. When they're not, you get stale rows and duplicate entries that Power BI dutifully surfaces as real data.\n\n**Jenkins as a scheduler** is infra for infra's sake. You're running a CI/CD system to run a cron job. That means maintaining an agent, managing credentials, monitoring for failed runs, building retry logic from scratch. When the sync breaks at 2am, nobody knows until someone notices the dashboards haven't updated.\n\n**Power BI on a schedule** means the data is stale by definition. If your refresh runs every four hours and a device falls out of compliance at 9am, your dashboard won't show it until 1pm. For a compliance and security use case, that gap matters.\n\nAnd there was no RBAC anywhere in this design. Anyone with SharePoint access could see everything — all devices, all users, all compliance states. Helpdesk techs, managers, contractors. No audit trail of who looked at what.\n\nBut the deepest problem wasn't architectural. The client didn't actually want a pipeline. They wanted **device visibility**. They wanted to know what was out there and whether it was healthy. The pipeline was just the closest solution shape they knew how to ask for.\n\n## The Pitch\n\nI came back with a counter-proposal.\n\nInstead of a pipeline, I pitched a purpose-built web app: FleetWatch. The sell was simple — you'll stop asking \"is this data current?\" because it always will be.\n\nSpecifically:\n- Real-time sync via Microsoft Graph API delta queries, pulling only changed devices instead of exporting everything on a schedule\n- Postgres as the data store — real schema, real queries, real relational data\n- RBAC built in from day one: admins see everything, helpdesk sees their assigned devices\n- Full audit logs of who accessed what and when\n- A proper UI instead of a Power BI dashboard that takes 30 seconds to load and can't drill into a single device\n\nThe client said yes. Partly because the technical argument was sound, and partly because I had mocked up what the device detail page would look like. It's easier to approve something you can see.\n\n## The Architecture\n\nThe core of FleetWatch is the Microsoft Graph API integration.\n\nAuthentication uses a Service Principal with Client Certificate auth — no client secrets that expire. The key endpoint is `/deviceManagement/managedDevices/delta`, which supports delta queries: on first run you get all devices, on subsequent runs you only get devices that changed since your last sync token. Instead of exporting 800 devices every four hours, you're processing 12 changed devices every 30 minutes.\n\nThe sync runs on Vercel Cron jobs. No Jenkins, no agents, no infra to maintain. The cron endpoint is protected with a shared secret header — simple, effective. Failed syncs surface in application logs, not in a Jenkins console that nobody checks.\n\nThe data layer is Postgres on Vercel with Drizzle ORM. The schema models the actual domain: a `devices` table, a `users` table, `compliance_policies`, `app_inventory`, `security_hardware`. When you need to answer \"which devices have BitLocker disabled and are assigned to users in the Finance department,\" that's a join, not a SharePoint list crawl.\n\nThe frontend is Next.js 15 with the App Router. Server Components handle the heavy lifting — device lists, compliance views, filtered queries all render server-side. The device detail page has six tabs: Overview, Compliance, Configuration, Security, Hardware, and Network. Each tab queries only the data it needs.\n\n```\nBefore (proposed):\nJenkins → PowerShell → SharePoint Lists → Power BI (scheduled refresh)\n\nAfter (FleetWatch):\nVercel Cron → Microsoft Graph API → Postgres → Next.js (real-time)\n```\n\nAuth is NextAuth with role-based access enforced at the API layer. The middleware checks roles before any data query runs — not just in the UI, where it's trivial to bypass. Admin and read-only roles are stored per-user in the database, not inferred from SharePoint group membership.\n\nMonitoring is a `/api/health` endpoint that checks database connectivity and last successful sync time, plus a `/api/metrics` endpoint for the operational stats I actually care about: sync duration, devices processed, error rate. Redis is wired in as an optional cache layer for the dashboard aggregate queries.\n\n## What It Enables\n\nThe gap between the pipeline and the app isn't cosmetic — it's functional.\n\nSearch and filter across all 800 devices returns results in under 100ms. You can filter by compliance state, OS version, last sync time, assigned user, or any combination. In Power BI with a scheduled refresh, you're waiting for a report to load and hoping it reflects reality.\n\nThe device detail page shows everything in one place: BitLocker status, TPM chip version, Secure Boot state, assigned compliance policies, installed applications, network adapters. That level of detail doesn't exist in the SharePoint list model — you'd need separate lists for each entity and a Power BI data model to join them, which you'd then need to maintain.\n\nRBAC means helpdesk techs can look up devices without needing SharePoint permissions across the entire tenant. No permissions sprawl, no \"just give them read access to the list.\" You grant a role in FleetWatch and that's it.\n\nThe export function lets you pull filtered device lists to CSV — useful for compliance reporting, vendor audits, or just sending a list of non-compliant devices to the right team. It works on whatever filter you've currently applied, so you're exporting exactly what you're looking at.\n\nCompliance trend graphs show state over time from the sync history, not from a Power BI snapshot that was current when the report was built. When a device falls out of compliance and comes back, you can see when both events happened.\n\n## The Lesson\n\nScripts are the right first tool when scope is unclear. If the client had wanted a one-time export to audit their device inventory, the PowerShell approach would have been exactly right. Fast to build, no ongoing maintenance, done.\n\nBut when the real problem is ongoing visibility — and when the solution needs RBAC, audit logs, freshness guarantees, and drill-down — the pipeline approach has a ceiling. It would have worked for three months. Then the IT team would have been back asking for user lookup, filtered exports, freshness indicators, device-level detail. The pipeline would have been extended with more scripts, more SharePoint lists, more Power BI datasets. Each addition would have made the system more fragile and harder to reason about.\n\nBuilding FleetWatch upfront was a harder conversation to have, but it was the right one. The client got a system that solves the problem they actually had — not the problem they knew how to articulate.\n\nThe source is on GitHub at [RohiRIK/FleetWatch](https://github.com/RohiRIK/FleetWatch) if you want to see how it's put together.\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"children\":[[\"$\",\"$L18\",null,{\"maxWidth\":12,\"m\":{\"hide\":true}}],[\"$\",\"$L18\",null,{\"fillWidth\":true,\"horizontal\":\"center\",\"children\":[\"$\",\"$L10\",null,{\"as\":\"section\",\"maxWidth\":\"m\",\"horizontal\":\"center\",\"gap\":\"l\",\"paddingTop\":\"24\",\"children\":[[\"$\",\"$L1a\",null,{\"id\":\"schema-blogPosting-/blog/homelab-docker-swarm\",\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"url\\\":\\\"https://rohirik.github.io/resume/blog/homelab-docker-swarm\\\",\\\"sameAs\\\":[],\\\"headline\\\":\\\"My Homelab on Docker Swarm: What Runs, How It's Wired, What Broke\\\",\\\"description\\\":\\\"A tour of my self-hosted infrastructure — Docker Swarm for orchestration, Traefik for ingress, Infisical for secrets, and the modular design that replaced the monolith I should never have written.\\\",\\\"image\\\":\\\"https://rohirik.github.io/resume/images/blog/homelab-docker-swarm.png\\\",\\\"datePublished\\\":\\\"2026-03-02\\\",\\\"dateModified\\\":\\\"2026-03-02\\\",\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"Rohi Rikman\\\",\\\"url\\\":\\\"https://rohirik.github.io/resume/about\\\",\\\"image\\\":{\\\"@type\\\":\\\"ImageObject\\\",\\\"url\\\":\\\"https://rohirik.github.io/resume/images/avatar.png\\\"}}}\"}}],[\"$\",\"$L10\",null,{\"maxWidth\":\"s\",\"gap\":\"16\",\"horizontal\":\"center\",\"align\":\"center\",\"children\":[[\"$\",\"$L1b\",null,{\"href\":\"/blog\",\"children\":[\"$\",\"span\",null,  posts\"}],[\"$\",\"$L21\",null,{\"columns\":\"2\",\"s\":{\"columns\":1},\"fillWidth\":true,\"marginBottom\":\"40\",\"gap\":\"16\",\"children\":[[\"$\",\"$L22\",\"fleetwatch-from-script-to-system\",{\"post\":{\"metadata\":{\"title\":\"From Script to System: How I Turned a Jenkins Pipeline into FleetWatch\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-04\",\"summary\":\"My client wanted PowerShell scripts dumping Intune data into SharePoint for Power BI. I built a web app instead. Here's why — and how.\",\"image\":\"/images/blog/fleetwatch-from-script-to-system.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"fleetwatch-from-script-to-system\",\"content\":\"$23\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L24\"]}]]}],\"$L25\"]}]}],\"$L26\"]}]\n"])</script><script>self.__next_f.push([1,"28:I[988654,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/b4d60b79b2dcf7b3.js\"],\"ScrollToHash\"]\n29:I[605649,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/b4d60b79b2dcf7b3.js\"],\"HeadingNav\"]\n27:T19b0,"])</script><script>self.__next_f.push([1,"\nIf you're preparing to migrate to Entra ID and a penetration test just flagged \"Netlogon not requiring RPC Sealing\" — this is how you close it properly.\n\nThis isn't a theoretical hardening checklist. It's the actual playbook I follow: four phases, a hard go/no-go gate between discovery and enforcement, and a PowerShell script to do the discovery work for you.\n\n## Why this matters\n\nNetlogon is the protocol domain-joined machines use to authenticate against Domain Controllers. Without RPC Sealing, that channel is unencrypted — a classic man-in-the-middle opportunity. Microsoft patched this with the Netlogon secure channel update (CVE-2020-1472 / Zerologon era), but enforcement is still opt-in. A lot of environments are patched but not enforced.\n\nBefore you flip enforcement on, you need to know what's still sending unencrypted traffic. That's the whole point of phases 1–3.\n\n---\n\n## Phase 1: Infrastructure Preparation\n\n**Target:** All servers and endpoints — DCs, member servers, and clients.\n\nBefore any enforcement, the OS must actually support the RPC Sealing protocol. If you patch only your DCs and leave member servers behind, those servers will fail to authenticate once you enforce.\n\n**Action:** Deploy the latest Cumulative Updates. Specifically confirm KB5062600 / KB5021130 are installed. Reboot everything. Check that OS builds are current across the board.\n\nThis phase is boring. Do it anyway.\n\n---\n\n## Phase 2: Discovery (The Listening Phase)\n\n**Target:** Domain Controllers only.\n\nAt this stage, DCs are capable of RPC Sealing but won't block anything yet. They will, however, log every non-compliant connection. That's exactly what you want.\n\n### Step 1 — MDI Reports\n\nOpen Microsoft Defender for Identity. Pull the **\"Weak Ciphers\"** and **\"NTLM Authentication\"** reports. These give you a fast visual map of legacy devices: old NAS boxes, third-party applications, Linux/Samba servers, network appliances that predate NTLMv2.\n\n### Step 2 — PowerShell Event Log Query\n\nEvent ID `5838` = connection attempted without sealing. Event ID `5840` = connection using weak cryptography. You want to find every machine generating these events across all your DCs.\n\n```powershell\n# Create a temp folder for the report\n$Path = \"C:\\temp\"\nIf (!(Test-Path $Path)) { New-Item -ItemType Directory -Force -Path $Path }\n\n# Get all Domain Controllers in the domain\n$DCs = Get-ADDomainController -Filter * | Select-Object -ExpandProperty Hostname\n\n$EventIDs = @(5838, 5840)\n$AllEvents = @()\n\nforeach ($DC in $DCs) {\n    Write-Host \"Querying logs on DC: $DC...\" -ForegroundColor Cyan\n    try {\n        $Events = Get-WinEvent -ComputerName $DC -FilterHashtable @{LogName='System'; ID=$EventIDs} -ErrorAction Stop\n\n        foreach ($Event in $Events) {\n            $AllEvents += [PSCustomObject]@{\n                DomainController = $DC\n                TimeCreated      = $Event.TimeCreated\n                EventID          = $Event.Id\n                Message          = $Event.Message.Split(\"`n\")[0]\n            }\n        }\n    } catch {\n        Write-Warning \"No matching events found on $DC, or access was denied.\"\n    }\n}\n\n# Export results\nif ($AllEvents.Count -gt 0) {\n    $ExportPath = \"$Path\\Netlogon_Vulnerable_Traffic.csv\"\n    $AllEvents | Export-Csv -Path $ExportPath -NoTypeInformation -Encoding UTF8\n    Write-Host \"Done! Found vulnerable traffic. Report saved to: $ExportPath\" -ForegroundColor Yellow\n} else {\n    Write-Host \"Excellent! No vulnerable Netlogon traffic detected across any DCs.\" -ForegroundColor Green\n}\n```\n\nRun this against all DCs. You'll get a CSV with timestamps, the DC that logged each event, and the message. That CSV is your remediation backlog.\n\n---\n\n## Phase 3: Remediation (The Go/No-Go Gate)\n\n**Target:** Specific assets identified in Phase 2.\n\nThis is where most projects stall. The CSV output usually surfaces a few categories:\n\n- **Legacy printers and scanners** — firmware update or replace\n- **Third-party applications** — vendor update or configuration change\n- **Linux/Samba servers** — update Samba and configure `client use spnego = yes`, `ntlm auth = no`\n- **Network appliances** — firmware update; sometimes the only option is replacement\n\nWork through each one. If something genuinely cannot be updated, you document why and decide whether a temporary exception is acceptable. In my experience, \"we can't update it\" is usually \"we haven't tried hard enough yet.\"\n\n**The gate condition:** Run the discovery script again after remediation. You must see **zero new 5838 or 5840 events across all DCs for at least a few days** before moving to Phase 4. Not fewer events — zero.\n\n---\n\n## Phase 4: Enforcement \u0026 Hardening\n\n**Target:** DCs for Netlogon; all servers and clients for SMB/NTLM.\n\nOnly run this phase when Phase 3 is clean.\n\n### Step 4.1 — Enforce RPC Sealing on DCs\n\nDeploy via GPO targeting the Domain Controllers OU, or set the registry key directly via PowerShell:\n\n```\nPath:  HKLM\\System\\CurrentControlSet\\Services\\Netlogon\\Parameters\nKey:   RequireSeal\nType:  DWORD\nValue: 2\n```\n\nOnce `RequireSeal = 2`, any device that fails to use RPC sealing is blocked immediately. Blocked connections generate Event ID `5839` — monitor for these after enforcement so you can catch anything you missed in Phase 3.\n\n### Step 4.2 — SMB Signing and NTLM Hardening\n\nRoll these GPOs out in rings. Don't push to all clients simultaneously.\n\n- **Ring 1:** IT / test machines\n- **Ring 2:** Member servers\n- **Ring 3:** All clients\n\nGPO settings to enforce:\n\n**`Microsoft network server: Digitally sign communications (always)`** → Enabled\n\n**`Network security: LAN Manager authentication level`** → Send NTLMv2 response only. Refuse LM \u0026 NTLM\n\nThe LAN Manager setting is the one that surprises people. Anything still using plain NTLM or LM will break when you enforce this. That's why the discovery phase exists.\n\n---\n\n## What this closes\n\nDone correctly, this playbook addresses:\n\n- Unencrypted Netlogon channel (pen test finding)\n- Zerologon attack surface (CVE-2020-1472 enforcement)\n- NTLM downgrade attack vectors\n- SMB relay opportunities on the internal network\n\nIt also puts you in a much cleaner position for Entra ID migration — because the same legacy devices causing problems here will cause problems during hybrid join and Conditional Access rollout. You're finding them now instead of later.\n\n---\n\nThe script above is what I run before any enforcement conversation. If you're seeing 5838s you didn't expect, start there — the CSV usually tells you exactly what needs attention.\n"])</script><script>self.__next_f.push([1,"24:[\"$\",\"$L22\",\"netlogon-rpc-sealing-playbook\",{\"post\":{\"metadata\":{\"title\":\"Netlogon RPC Sealing: The Full Hardening Playbook\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-03\",\"summary\":\"A complete 4-phase execution guide for enforcing Netlogon RPC Sealing and SMB/NTLM hardening before migrating to Entra ID — including the PowerShell discovery script I use to find vulnerable traffic across all DCs.\",\"image\":\"/images/blog/netlogon-rpc-sealing-playbook.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"netlogon-rpc-sealing-playbook\",\"content\":\"$27\"},\"thumbnail\":true,\"direction\":\"column\"}]\n25:[\"$\",\"$L28\",null,{}]\n26:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L29\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2a:I[811052,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/b4d60b79b2dcf7b3.js\"],\"HeadingLink\"]\n2b:I[362844,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/b4d60b79b2dcf7b3.js\"],\"InlineCode\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"My homelab runs on a dedicated server, not a cloud VPS. Everything is version-controlled, documented, and designed to run without me touching it. It's been doing that for over a year.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This is what's running, how it's wired together, and what went wrong the first time.\"}],\"\\n\",[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"why-swarm-and-not-the-alternatives\",\"children\":\"Why Swarm and not the alternatives\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The choice comes up every time I mention this setup: why not Kubernetes, why not plain Compose?\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Kubernetes is genuinely overkill for a single server. The operational overhead — etcd, control plane components, kubeconfig management, networking plugins — is real work for infrastructure that only needs to orchestrate maybe 10 services. The value of Kubernetes is horizontal scaling and high availability across nodes. I have one node.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Plain Compose works and is simple to reason about, but it doesn't give you health-based restarts, rolling updates, or service redeployment without downtime. When a container crashes, Compose doesn't automatically reschedule it. Swarm does.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Swarm hits the right point in the tradeoff: orchestration primitives (services, secrets, overlay networks, health checks, update policies) without the operational overhead of a full cluster. It's been running with no manual intervention since I set it up.\"}],\"\\n\",[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"network-architecture\",\"children\":\"Network architecture\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"All external traffic enters through Traefik on ports 80 and 443. Traefik handles Let's Encrypt SSL automatically — certificates are provisioned on first request and renewed without manual intervention. It routes to the right service based on hostname labels on each container.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Backend services communicate over internal overlay networks and have no ports exposed to the outside. The pattern is: Traefik is the only service on \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" that faces the internet. Everything else is on service-specific overlay networks and only joins \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" if it needs to be externally reachable. Services that don't need external exposure — databases, internal APIs — are never on \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" at all.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This is the same segmentation principle as network microsegmentation: services can't reach each other unless there's an explicit path. If Firecrawl gets compromised, it can't directly reach n8n or the secrets store. They're on different networks.\"}],\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\"]\n"])</script><script>self.__next_f.push([1,"2c:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"secrets-management\",\"children\":\"Secrets management\"}]\n2d:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The first version of this setup used environment variables in Compose files. This is the common approach and also the wrong one: environment variables end up in Compose files, Compose files end up in git, and suddenly you're sanitizing git history.\"}]\n2e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"I replaced all of that with Infisical, which I self-host on the same server. Agents and services fetch credentials at runtime through the Infisical SDK or CLI. Nothing sensitive is in the Compose files. If I need to rotate a credential, I update it in Infisical and restart the affected service — no code changes, no Compose file edits.\"}]\n2f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Infisical also gives me an audit trail: which service fetched which secret, when. For a homelab, this might sound excessive. It's not — knowing that a service fetched a credential at an unexpected time is useful signal.\"}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Docker Swarm also has native secrets (\",[\"$\",\"$L2b\",null,{\"children\":\"docker secret\"}],\"), which I use for a few things that Infisical can't easily inject (init scripts, bootstrap credentials for Infisical itself). Both live alongside each other without conflict.\"]}]\n31:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-runs-on-it\",\"children\":\"What runs on it\"}]\n32:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Traefik\"}],\" — Edge router and SSL termination. Service discovery is automatic via container labels. I define routes in each service's Compose file rather than in a central Traefik config, which means adding a new service doesn't require touching the router config.\"]}]\n33:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Portainer\"}],\" — Swarm management UI. Most things I do via CLI, but Portainer is useful for visualizing the current state of the stack, looking at service logs without SSHing in, and managing one-off tasks. It connects to the Docker socket and has full visibility into the Swarm.\"]}]\n34:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Infisical\"}],\" — Secrets store. Self-hosted with its own database. Services fetch credentials from Infisical at startup; nothing sensitive lives anywhere else in the stack.\"]}]\n35:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"n8n\"}],\" — Workflow automation. This is the busiest service in the stack — it's connected to a handful of external APIs and runs scheduled and event-triggered automations. It persists state to a volume on the host. The workflow definitions are exported and version-controlled separately.\"]}]\n36:[\"$\",\"span\",null,{\"classNa"])</script><script>self.__next_f.push([1,"me\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Firecrawl\"}],\" — Documentation crawling for AI projects. I run this alongside Project Aegis and other AI tools that need to index documentation from web sources. Self-hosting it means I control the crawl rate and the data stays local.\"]}]\n37:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"SearXNG\"}],\" — Self-hosted metasearch. Routes queries to multiple search engines without sending identifying information to any of them. Useful when Claude Code or local agents need to search the web without leaking query patterns.\"]}]\n38:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-modular-stack-structure\",\"children\":\"The modular stack structure\"}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The first version of this setup was a single large Compose file. Everything was defined in one place, which felt clean until the stack had eight services and adding a ninth meant scrolling through 400 lines of YAML and hoping you didn't break something in the middle.\"}]\n3a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"More importantly: redeploying one service meant bringing the entire stack down or doing careful surgery on a monolithic file. It didn't scale.\"}]\n3b:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The current structure is one directory per service, each with its own Compose file:\"}]\n3c:[\"$\",\"pre\",null,{\"children\":[\"$\",\"$L2b\",null,{\"children\":\"homelab-swarm-stack/\\n  traefik/\\n    docker-compose.yml\\n  portainer/\\n    docker-compose.yml\\n  infisical/\\n    docker-compose.yml\\n  n8n/\\n    docker-compose.yml\\n  ...\\n\"}]}]\n3d:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Each service connects to the shared \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" network for ingress (if it needs external exposure) and to service-specific networks for internal communication. The \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" network is created once and referenced as external in each Compose file.\"]}]\n3e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Deploying a new service: create its directory, write its Compose file, deploy with \",[\"$\",\"$L2b\",null,{\"children\":\"docker stack deploy\"}],\". No other service is touched. Removing a service: \",[\"$\",\"$L2b\",null,{\"children\":\"docker stack rm \u003cservice\u003e\"}],\". The rest of the stack is unaffected.\"]}]\n3f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This is the same principle as microservices architecture applied to infrastructure config: each unit is independently deployable and changes to one don't risk breaking others.\"}]\n40:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-s-required-to-maintain-it\",\"children\":\"What's required to maintain it\"}]\n41:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeig"])</script><script>self.__next_f.push([1,"ht\":\"175%\"},\"children\":\"The honest answer: almost nothing. Traefik renews certs automatically. Services restart on failure via Swarm health checks. I don't do manual updates — I have a process for pulling new images and redeploying, but it's not automated (I want to be intentional about when things update).\"}]\n42:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"What does require occasional attention:\"}]\n43:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Storage.\"}],\" Volumes accumulate data. n8n's database grows. I check disk usage monthly and prune what's not needed.\"]}]\n44:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Infisical.\"}],\" The self-hosted version needs occasional updates. These are the updates I'm most careful about — Infisical holds credentials for everything else, so a botched update has cascading effects. I test updates on a snapshot before applying to the live instance.\"]}]\n45:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Network connectivity.\"}],\" Occasionally a service loses connectivity to \",[\"$\",\"$L2b\",null,{\"children\":\"proxy-net\"}],\" after a server restart. The fix is always \",[\"$\",\"$L2b\",null,{\"children\":\"docker network connect proxy-net \u003ccontainer\u003e\"}],\" — it takes 10 seconds, but it's annoying enough that I documented it in the project's gotchas file.\"]}]\n46:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Swarm state.\"}],\" Single-node Swarm doesn't have the HA guarantees of a multi-node cluster. If the server loses power without a clean shutdown, Swarm state can get inconsistent. I keep a current export of all stack definitions so recovery is redeploy-from-scratch rather than debugging corrupted state.\"]}]\n47:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-i-d-do-differently\",\"children\":\"What I'd do differently\"}]\n48:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The secrets management was the biggest early mistake. Environment variables in Compose files feel convenient until they're not. Infisical from the start would have saved the work of migrating everything over.\"}]\n49:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The second thing: start modular. A monolithic Compose file is tempting for the first three services because it's less overhead. By service six, you're paying for it. The directory-per-service structure takes five minutes to set up and saves hours later.\"}]\n4a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Everything else, including the Swarm choice over Kubernetes, I'd make the same way.\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"4b:I[27201,[\"/resume/_next/static/chunks/d96012bcfc98706a.js\",\"/resume/_next/static/chunks/73e3194f06db260e.js\"],\"IconMark\"]\n8:null\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"title\",\"0\",{\"children\":\"My Homelab on Docker Swarm: What Runs, How It's Wired, What Broke\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"A tour of my self-hosted infrastructure — Docker Swarm for orchestration, Traefik for ingress, Infisical for secrets, and the modular design that replaced the monolith I should never have written.\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"My Homelab on Docker Swarm: What Runs, How It's Wired, What Broke\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"A tour of my self-hosted infrastructure — Docker Swarm for orchestration, Traefik for ingress, Infisical for secrets, and the modular design that replaced the monolith I should never have written.\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:url\",\"content\":\"https://rohirik.github.io/resume/blog/homelab-docker-swarm\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:image\",\"content\":\"https://rohirik.github.io/resume/images/blog/homelab-docker-swarm.png\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:image:alt\",\"content\":\"My Homelab on Docker Swarm: What Runs, How It's Wired, What Broke\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:type\",\"content\":\"webs
