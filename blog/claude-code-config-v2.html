xWidth\":\"m\",\"paddingY\":\"8\",\"paddingX\":\"16\",\"gap\":\"16\",\"horizontal\":\"between\",\"vertical\":\"center\",\"s\":{\"direction\":\"column\",\"horizontal\":\"center\",\"align\":\"center\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-s neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[\"© \",2026,\" /\"]}],[\"$\",\"span\",null,{\"className\":\"px-4\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Rohi Rikman\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"/ Powered by caffeine and questionable life choices\"}]]}],[\"$\",\"$L18\",null,{\"gap\":\"16\",\"children\":[[\"$\",\"$L19\",\"GitHub\",{\"href\":\"https://github.com/RohiRIK\",\"icon\":\"github\",\"tooltip\":\"GitHub\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"LinkedIn\",{\"href\":\"https://www.linkedin.com/in/rohi-rikman-48831b239/\",\"icon\":\"linkedin\",\"tooltip\":\"LinkedIn\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"Email\",{\"href\":\"mailto:rohi@rohirikman.dev\",\"icon\":\"email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"24:T1f74,"])</script><script>self.__next_f.push([1,"\nThe brief arrived in a Teams message. The IT team was managing hundreds of Windows devices through Microsoft Intune and they had no good way to answer a simple question: what's actually out there, and what state is it in?\n\nTheir proposed solution: a PowerShell script triggered by Jenkins, pulling device data from the Intune API and writing it to SharePoint lists. Power BI would sit on top and refresh on a schedule. Dashboards, filters, the works.\n\nIt's a reasonable ask. It's how a lot of IT shops solve this problem. They've got the pieces — Intune, SharePoint, Power BI — and they want to wire them together. The request made sense for where they were.\n\nI said I'd get back to them with a proposal.\n\n## The Ceiling\n\nI spent a day mapping out the pipeline they'd asked for. And the more I built it in my head, the more I saw where it would break.\n\n**SharePoint as a database** is the first problem. SharePoint lists have a 5,000-item view threshold — not a hard limit, but enough to start causing issues at scale. There's no real schema enforcement, no foreign keys, no joins. You end up denormalizing everything and hoping the refresh writes are idempotent. When they're not, you get stale rows and duplicate entries that Power BI dutifully surfaces as real data.\n\n**Jenkins as a scheduler** is infra for infra's sake. You're running a CI/CD system to run a cron job. That means maintaining an agent, managing credentials, monitoring for failed runs, building retry logic from scratch. When the sync breaks at 2am, nobody knows until someone notices the dashboards haven't updated.\n\n**Power BI on a schedule** means the data is stale by definition. If your refresh runs every four hours and a device falls out of compliance at 9am, your dashboard won't show it until 1pm. For a compliance and security use case, that gap matters.\n\nAnd there was no RBAC anywhere in this design. Anyone with SharePoint access could see everything — all devices, all users, all compliance states. Helpdesk techs, managers, contractors. No audit trail of who looked at what.\n\nBut the deepest problem wasn't architectural. The client didn't actually want a pipeline. They wanted **device visibility**. They wanted to know what was out there and whether it was healthy. The pipeline was just the closest solution shape they knew how to ask for.\n\n## The Pitch\n\nI came back with a counter-proposal.\n\nInstead of a pipeline, I pitched a purpose-built web app: FleetWatch. The sell was simple — you'll stop asking \"is this data current?\" because it always will be.\n\nSpecifically:\n- Real-time sync via Microsoft Graph API delta queries, pulling only changed devices instead of exporting everything on a schedule\n- Postgres as the data store — real schema, real queries, real relational data\n- RBAC built in from day one: admins see everything, helpdesk sees their assigned devices\n- Full audit logs of who accessed what and when\n- A proper UI instead of a Power BI dashboard that takes 30 seconds to load and can't drill into a single device\n\nThe client said yes. Partly because the technical argument was sound, and partly because I had mocked up what the device detail page would look like. It's easier to approve something you can see.\n\n## The Architecture\n\nThe core of FleetWatch is the Microsoft Graph API integration.\n\nAuthentication uses a Service Principal with Client Certificate auth — no client secrets that expire. The key endpoint is `/deviceManagement/managedDevices/delta`, which supports delta queries: on first run you get all devices, on subsequent runs you only get devices that changed since your last sync token. Instead of exporting 800 devices every four hours, you're processing 12 changed devices every 30 minutes.\n\nThe sync runs on Vercel Cron jobs. No Jenkins, no agents, no infra to maintain. The cron endpoint is protected with a shared secret header — simple, effective. Failed syncs surface in application logs, not in a Jenkins console that nobody checks.\n\nThe data layer is Postgres on Vercel with Drizzle ORM. The schema models the actual domain: a `devices` table, a `users` table, `compliance_policies`, `app_inventory`, `security_hardware`. When you need to answer \"which devices have BitLocker disabled and are assigned to users in the Finance department,\" that's a join, not a SharePoint list crawl.\n\nThe frontend is Next.js 15 with the App Router. Server Components handle the heavy lifting — device lists, compliance views, filtered queries all render server-side. The device detail page has six tabs: Overview, Compliance, Configuration, Security, Hardware, and Network. Each tab queries only the data it needs.\n\n```\nBefore (proposed):\nJenkins → PowerShell → SharePoint Lists → Power BI (scheduled refresh)\n\nAfter (FleetWatch):\nVercel Cron → Microsoft Graph API → Postgres → Next.js (real-time)\n```\n\nAuth is NextAuth with role-based access enforced at the API layer. The middleware checks roles before any data query runs — not just in the UI, where it's trivial to bypass. Admin and read-only roles are stored per-user in the database, not inferred from SharePoint group membership.\n\nMonitoring is a `/api/health` endpoint that checks database connectivity and last successful sync time, plus a `/api/metrics` endpoint for the operational stats I actually care about: sync duration, devices processed, error rate. Redis is wired in as an optional cache layer for the dashboard aggregate queries.\n\n## What It Enables\n\nThe gap between the pipeline and the app isn't cosmetic — it's functional.\n\nSearch and filter across all 800 devices returns results in under 100ms. You can filter by compliance state, OS version, last sync time, assigned user, or any combination. In Power BI with a scheduled refresh, you're waiting for a report to load and hoping it reflects reality.\n\nThe device detail page shows everything in one place: BitLocker status, TPM chip version, Secure Boot state, assigned compliance policies, installed applications, network adapters. That level of detail doesn't exist in the SharePoint list model — you'd need separate lists for each entity and a Power BI data model to join them, which you'd then need to maintain.\n\nRBAC means helpdesk techs can look up devices without needing SharePoint permissions across the entire tenant. No permissions sprawl, no \"just give them read access to the list.\" You grant a role in FleetWatch and that's it.\n\nThe export function lets you pull filtered device lists to CSV — useful for compliance reporting, vendor audits, or just sending a list of non-compliant devices to the right team. It works on whatever filter you've currently applied, so you're exporting exactly what you're looking at.\n\nCompliance trend graphs show state over time from the sync history, not from a Power BI snapshot that was current when the report was built. When a device falls out of compliance and comes back, you can see when both events happened.\n\n## The Lesson\n\nScripts are the right first tool when scope is unclear. If the client had wanted a one-time export to audit their device inventory, the PowerShell approach would have been exactly right. Fast to build, no ongoing maintenance, done.\n\nBut when the real problem is ongoing visibility — and when the solution needs RBAC, audit logs, freshness guarantees, and drill-down — the pipeline approach has a ceiling. It would have worked for three months. Then the IT team would have been back asking for user lookup, filtered exports, freshness indicators, device-level detail. The pipeline would have been extended with more scripts, more SharePoint lists, more Power BI datasets. Each addition would have made the system more fragile and harder to reason about.\n\nBuilding FleetWatch upfront was a harder conversation to have, but it was the right one. The client got a system that solves the problem they actually had — not the problem they knew how to articulate.\n\nThe source is on GitHub at [RohiRIK/FleetWatch](https://github.com/RohiRIK/FleetWatch) if you want to see how it's put together.\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"children\":[[\"$\",\"$L18\",null,{\"maxWidth\":12,\"m\":{\"hide\":true}}],[\"$\",\"$L18\",null,{\"fillWidth\":true,\"horizontal\":\"center\",\"children\":[\"$\",\"$L10\",null,{\" t-to-system.png\",\"images\":[],\"tag\":\"Engineering\",\"team\":[],\"link\":\"\"},\"slug\":\"fleetwatch-from-script-to-system\",\"content\":\"$24\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L25\"]}]]}],\"$L26\"]}]}],\"$L27\"]}]\n"])</script><script>self.__next_f.push([1,"29:I[988654,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ScrollToHash\"]\n2a:I[605649,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingNav\"]\n28:T19b0,"])</script><script>self.__next_f.push([1,"\nIf you're preparing to migrate to Entra ID and a penetration test just flagged \"Netlogon not requiring RPC Sealing\" — this is how you close it properly.\n\nThis isn't a theoretical hardening checklist. It's the actual playbook I follow: four phases, a hard go/no-go gate between discovery and enforcement, and a PowerShell script to do the discovery work for you.\n\n## Why this matters\n\nNetlogon is the protocol domain-joined machines use to authenticate against Domain Controllers. Without RPC Sealing, that channel is unencrypted — a classic man-in-the-middle opportunity. Microsoft patched this with the Netlogon secure channel update (CVE-2020-1472 / Zerologon era), but enforcement is still opt-in. A lot of environments are patched but not enforced.\n\nBefore you flip enforcement on, you need to know what's still sending unencrypted traffic. That's the whole point of phases 1–3.\n\n---\n\n## Phase 1: Infrastructure Preparation\n\n**Target:** All servers and endpoints — DCs, member servers, and clients.\n\nBefore any enforcement, the OS must actually support the RPC Sealing protocol. If you patch only your DCs and leave member servers behind, those servers will fail to authenticate once you enforce.\n\n**Action:** Deploy the latest Cumulative Updates. Specifically confirm KB5062600 / KB5021130 are installed. Reboot everything. Check that OS builds are current across the board.\n\nThis phase is boring. Do it anyway.\n\n---\n\n## Phase 2: Discovery (The Listening Phase)\n\n**Target:** Domain Controllers only.\n\nAt this stage, DCs are capable of RPC Sealing but won't block anything yet. They will, however, log every non-compliant connection. That's exactly what you want.\n\n### Step 1 — MDI Reports\n\nOpen Microsoft Defender for Identity. Pull the **\"Weak Ciphers\"** and **\"NTLM Authentication\"** reports. These give you a fast visual map of legacy devices: old NAS boxes, third-party applications, Linux/Samba servers, network appliances that predate NTLMv2.\n\n### Step 2 — PowerShell Event Log Query\n\nEvent ID `5838` = connection attempted without sealing. Event ID `5840` = connection using weak cryptography. You want to find every machine generating these events across all your DCs.\n\n```powershell\n# Create a temp folder for the report\n$Path = \"C:\\temp\"\nIf (!(Test-Path $Path)) { New-Item -ItemType Directory -Force -Path $Path }\n\n# Get all Domain Controllers in the domain\n$DCs = Get-ADDomainController -Filter * | Select-Object -ExpandProperty Hostname\n\n$EventIDs = @(5838, 5840)\n$AllEvents = @()\n\nforeach ($DC in $DCs) {\n    Write-Host \"Querying logs on DC: $DC...\" -ForegroundColor Cyan\n    try {\n        $Events = Get-WinEvent -ComputerName $DC -FilterHashtable @{LogName='System'; ID=$EventIDs} -ErrorAction Stop\n\n        foreach ($Event in $Events) {\n            $AllEvents += [PSCustomObject]@{\n                DomainController = $DC\n                TimeCreated      = $Event.TimeCreated\n                EventID          = $Event.Id\n                Message          = $Event.Message.Split(\"`n\")[0]\n            }\n        }\n    } catch {\n        Write-Warning \"No matching events found on $DC, or access was denied.\"\n    }\n}\n\n# Export results\nif ($AllEvents.Count -gt 0) {\n    $ExportPath = \"$Path\\Netlogon_Vulnerable_Traffic.csv\"\n    $AllEvents | Export-Csv -Path $ExportPath -NoTypeInformation -Encoding UTF8\n    Write-Host \"Done! Found vulnerable traffic. Report saved to: $ExportPath\" -ForegroundColor Yellow\n} else {\n    Write-Host \"Excellent! No vulnerable Netlogon traffic detected across any DCs.\" -ForegroundColor Green\n}\n```\n\nRun this against all DCs. You'll get a CSV with timestamps, the DC that logged each event, and the message. That CSV is your remediation backlog.\n\n---\n\n## Phase 3: Remediation (The Go/No-Go Gate)\n\n**Target:** Specific assets identified in Phase 2.\n\nThis is where most projects stall. The CSV output usually surfaces a few categories:\n\n- **Legacy printers and scanners** — firmware update or replace\n- **Third-party applications** — vendor update or configuration change\n- **Linux/Samba servers** — update Samba and configure `client use spnego = yes`, `ntlm auth = no`\n- **Network appliances** — firmware update; sometimes the only option is replacement\n\nWork through each one. If something genuinely cannot be updated, you document why and decide whether a temporary exception is acceptable. In my experience, \"we can't update it\" is usually \"we haven't tried hard enough yet.\"\n\n**The gate condition:** Run the discovery script again after remediation. You must see **zero new 5838 or 5840 events across all DCs for at least a few days** before moving to Phase 4. Not fewer events — zero.\n\n---\n\n## Phase 4: Enforcement \u0026 Hardening\n\n**Target:** DCs for Netlogon; all servers and clients for SMB/NTLM.\n\nOnly run this phase when Phase 3 is clean.\n\n### Step 4.1 — Enforce RPC Sealing on DCs\n\nDeploy via GPO targeting the Domain Controllers OU, or set the registry key directly via PowerShell:\n\n```\nPath:  HKLM\\System\\CurrentControlSet\\Services\\Netlogon\\Parameters\nKey:   RequireSeal\nType:  DWORD\nValue: 2\n```\n\nOnce `RequireSeal = 2`, any device that fails to use RPC sealing is blocked immediately. Blocked connections generate Event ID `5839` — monitor for these after enforcement so you can catch anything you missed in Phase 3.\n\n### Step 4.2 — SMB Signing and NTLM Hardening\n\nRoll these GPOs out in rings. Don't push to all clients simultaneously.\n\n- **Ring 1:** IT / test machines\n- **Ring 2:** Member servers\n- **Ring 3:** All clients\n\nGPO settings to enforce:\n\n**`Microsoft network server: Digitally sign communications (always)`** → Enabled\n\n**`Network security: LAN Manager authentication level`** → Send NTLMv2 response only. Refuse LM \u0026 NTLM\n\nThe LAN Manager setting is the one that surprises people. Anything still using plain NTLM or LM will break when you enforce this. That's why the discovery phase exists.\n\n---\n\n## What this closes\n\nDone correctly, this playbook addresses:\n\n- Unencrypted Netlogon channel (pen test finding)\n- Zerologon attack surface (CVE-2020-1472 enforcement)\n- NTLM downgrade attack vectors\n- SMB relay opportunities on the internal network\n\nIt also puts you in a much cleaner position for Entra ID migration — because the same legacy devices causing problems here will cause problems during hybrid join and Conditional Access rollout. You're finding them now instead of later.\n\n---\n\nThe script above is what I run before any enforcement conversation. If you're seeing 5838s you didn't expect, start there — the CSV usually tells you exactly what needs attention.\n"])</script><script>self.__next_f.push([1,"25:[\"$\",\"$L23\",\"netlogon-rpc-sealing-playbook\",{\"post\":{\"metadata\":{\"title\":\"Netlogon RPC Sealing: The Full Hardening Playbook\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-03\",\"summary\":\"A complete 4-phase execution guide for enforcing Netlogon RPC Sealing and SMB/NTLM hardening before migrating to Entra ID — including the PowerShell discovery script I use to find vulnerable traffic across all DCs.\",\"image\":\"/images/blog/netlogon-rpc-sealing-playbook.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"netlogon-rpc-sealing-playbook\",\"content\":\"$28\"},\"thumbnail\":true,\"direction\":\"column\"}]\n26:[\"$\",\"$L29\",null,{}]\n27:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L2a\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2b:I[811052,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingLink\"]\n2c:I[362844,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"InlineCode\"]\n2d:I[597784,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"CodeBlock\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The first version of my Claude Code config replaced the default (no memory) with a structured 4-file system: goals, decisions, progress, gotchas. Markdown files, hooks that read and write them, a summary injected at session start. It worked. For a few months.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The problem with flat markdown files isn't that they fail — it's that they don't scale. After a few hundred entries across a dozen projects, you start noticing the cracks. Duplicate decisions. Gotchas that contradict each other because the older one was never updated. Progress logs that grow faster than they get trimmed. No way to ask \\\"what do I know about Supabase\\\" without reading every file.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The v2 config replaces all of it with SQLite.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-shift-to-sqlite-ltm\",\"children\":\"The shift to SQLite LTM\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The new system lives at \",[\"$\",\"$L2c\",null,{\"children\":\"~/.claude/memory/ltm.db\"}],\". Every memory, decision, gotcha, and progress item is a row. Projects are foreign-keyed. Relationships between memories are edges in a separate table.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The hook system still works the same way from the outside — SessionStart injects context, PreCompact writes a snapshot, UpdateContext logs progress. What changed is what's underneath. Instead of appending to markdown files and hoping the trimming logic holds, everything goes to SQLite with indexed columns, typed categories, and a schema that can actually evolve.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The immediate win is queries. You can now run:\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"8\",\"marginBottom\":\"16\",\"codes\":[{\"code\":\"bun -e \\\"\\n  const { getItems } = await import(process.env.HOME + '/.claude/memory/context.js');\\n  const gotchas = getItems('project-name', 'gotcha');\\n  console.log(JSON.stringify(gotchas));\\n\\\"\\n\",\"language\":\"bash\",\"label\":\"Bash\"}],\"copyButton\":true}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"And get back a filtered, structured list — not a blob of markdown you have to parse mentally.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"New commands that came with it: \",[\"$\",\"$L2c\",null,{\"children\":\"/learn\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/recall\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/forget\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/relate\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/check-context\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/init-context\"}],\". The ones I use constantly are \",[\"$\",\"$L2c\",null,{\"children\":\"/recall\"}],\" (before starting any non-trivial task — surface past decisions before making new ones) and \",[\"$\",\"$L2c\",null,{\"children\":\"/learn\"}],\" (mid-session when something important comes up that shouldn't be lost to compaction).\"]}],\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\"]\n"])</script><script>self.__next_f.push([1,"47:I[436122,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"List\"]\n48:I[626935,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ListItem\"]\n2e:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-janitor-agent\",\"children\":\"The Janitor agent\"}]\n2f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The memory problem I didn't anticipate: memories go stale. A decision made in February about one project's architecture has nothing to do with March, but it stays in the DB forever unless someone removes it. Duplicates accumulate. A gotcha from an early attempt at something gets superseded by a better approach but both entries survive.\"}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The Janitor is an autonomous sub-agent that runs inside \",[\"$\",\"$L2c\",null,{\"children\":\"memory/server.ts\"}],\". It has four stages:\"]}]\n31:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Decay\"}],\" — memories that haven't been used get a confidence score that degrades over time. Below a configurable threshold (default 0.2), they get archived. Not deleted — archived. You can review them.\"]}]\n32:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Auto-promote\"}],\" — when the UpdateContext hook writes a \",[\"$\",\"$L2c\",null,{\"children\":\"decision\"}],\" or \",[\"$\",\"$L2c\",null,{\"children\":\"gotcha\"}],\" context item, the Janitor elevates it to a global memory automatically. No manual \",[\"$\",\"$L2c\",null,{\"children\":\"/learn\"}],\" required for things that come out of normal workflow.\"]}]\n33:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Semantic dedup\"}],\" — each memory gets an embedding vector. The Janitor runs cosine similarity across them. Anything above 0.85 similarity is flagged as a potential duplicate, and an LLM proposes a merge. The merge goes to a pending queue — you approve or reject, nothing changes automatically.\"]}]\n34:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Supersedes\"}],\" — when memories are merged, the old ones get marked \",[\"$\",\"$L2c\",null,{\"children\":\"superseded\"}],\" with a \",[\"$\",\"$L2c\",null,{\"children\":\"supersedes\"}],\" edge in the relations table. The knowledge graph stays consistent.\"]}]\n35:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The part I like most: nothing the Janitor proposes takes effect without confirmation. It generates a queue of pending actions and surfaces them in a UI. You review, approve what makes sense, reject what doesn't. The agent maintains the memory system; you stay in control of what it actually does.\"}]\n36:[\"$\",\"$L2b\",null,{\"marginTop\":\"2"])</script><script>self.__next_f.push([1,"4\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-graph-visualizer\",\"children\":\"The graph visualizer\"}]\n37:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The SQLite backend enabled something that wasn't possible with markdown files: a knowledge graph.\"}]\n38:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"$L2c\",null,{\"children\":\"memory/server.ts\"}],\" runs a Bun server on port 7331. \",[\"$\",\"$L2c\",null,{\"children\":\"memory/graph-app/\"}],\" is a Next.js app on 7332 that reads from it via WebSocket. What you see is a D3 force graph: project nodes, memory nodes, context item nodes, edges representing relationships.\"]}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The layout is intentionally organic — link strength varies by relationship type. \",[\"$\",\"$L2c\",null,{\"children\":\"context_of\"}],\" links are loose (0.04), so context items float near their projects. \",[\"$\",\"$L2c\",null,{\"children\":\"project_scope\"}],\" links are tighter (0.25). Memory-to-memory relations are strong (0.6). The simulation converges and you can see clusters.\"]}]\n3a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Practically useful features:\"}]\n3b:[\"$\",\"$L47\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L48\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"⌘K spotlight search\"}],\" — FTS5-powered, keyboard navigable, zooms the graph to the matching node on select\"]}],\"\\n\",[\"$\",\"$L48\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Tag filter panel\"}],\" — click a tag to dim everything that doesn't match\"]}],\"\\n\",[\"$\",\"$L48\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Project drill-down\"}],\" — click any project node to get a dedicated page with all its context, memories, and relations\"]}],\"\\n\",[\"$\",\"$L48\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Pending actions page\"}],\" — the Janitor's propose queue, one click to approve or reject\"]}],\"\\n\"]}]\n3c:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The graph makes something visible that was always there but invisible: what the model actually knows about your projects, how those memories relate, and where the gaps or stale entries are.\"}]\n3d:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"multi-provider-embeddings\",\"children\":\"Multi-provider embeddings\"}]\n3e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Semantic dedup and the \",[\"$\",\"$L2c\",null,{\"children\":\"/recall\"}],\" search need embeddings. The system now supports six providers: Gemini, OpenAI, Anthropic, Cohere, OpenRouter, Ollama.\"]}]\n3f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The settings UI at \",[\"$\",\"$L2c\",null,{\"children\":\"/settings\"}],\" lets you pick your embed provider, verify the API key inline (paste → spinner → green/red), and select from a dropdown of available models for that provider. It doesn't matter which you use for the embeddings"])</script><script>self.__next_f.push([1," — what matters is consistency, since vectors from different models aren't comparable.\"]}]\n40:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"I run Ollama locally for embeddings. No API key, no cost, fast enough for the volume of memories a single developer accumulates.\"}]\n41:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-actually-changed-day-to-day\",\"children\":\"What actually changed day-to-day\"}]\n42:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The hooks look the same from the outside. Session starts, context is injected, work happens, progress is logged. The difference is what happens underneath and over time.\"}]\n43:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"With markdown files, the system degraded slowly. Files got messy. Duplicates crept in. The 20-item trim on progress.md was a blunt instrument. You never really knew what was in the DB unless you opened the files.\"}]\n44:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"With SQLite, the system improves over time. Memories that matter get used, have their confidence reinforced, and survive. Memories that stop being relevant decay. The Janitor surfaces what needs attention instead of letting stale data accumulate silently.\"}]\n45:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The graph visualizer isn't something I use every session — but when I do open it, it answers questions that were previously unanswerable: \\\"what have I decided about this project?\\\", \\\"is there a gotcha about this library I logged a month ago?\\\", \\\"why does this memory exist?\\\"\"}]\n46:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The config is version-controlled at \",[\"$\",\"a\",null,{\"href\":\"https://github.com/RohiRIK/claude-code-config\",\"target\":\"_blank\",\"rel\":\"noopener noreferrer\",\"children\":\"github.com/RohiRIK/claude-code-config\"}],\".\"]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"49:I[27201,[\"/_next/static/chunks/d96012bcfc98706a.js\",\"/_next/static/chunks/73e3194f06db260e.js\"],\"IconMark\"]\n8:null\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"title\",\"0\",{\"children\":\"Claude Code Config v2: SQLite LTM, a Janitor Agent, and a Memory Graph\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"The markdown-file memory system worked until it didn't. Here's what I replaced it with — a SQLite LTM, an autonomous Janitor agent, and a D3 graph that shows you what the model actually knows.\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"Claude Code Config v2: SQLite LTM, a Janitor Agent, and a Memory Graph\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"The markdown-file memory system worked until it didn't. Here's what I replaced it with — a SQLite LTM, an autonomous Janitor agent, and a D3 graph that shows you what the model actually knows.\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:url\",\"content\":\"https://cloudjourneyblog.rohi-lab.org/blog/claude-code-config-v2\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:image\",\"content\":\"https://cloudjourneyblog.rohi-lab.org/images/blog/claude-code-
