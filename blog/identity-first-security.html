email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"23:Tdcb,"])</script><script>self.__next_f.push([1,"\nI work in IT security. I've sat through a lot of vendor calls. And somewhere around the third time someone told me their network appliance was \"a Zero Trust solution,\" I started keeping count.\n\nIt's not a product. It never was. Here's what it actually is.\n\n## The original idea\n\nZero Trust comes from a 2010 paper by John Kindervag at Forrester. The core insight was blunt: perimeter-based security is wrong. The assumption that everything inside your network is trusted and everything outside isn't — that model breaks the moment you have remote workers, cloud services, SaaS apps, contractors, or any real-world complexity.\n\nThe answer wasn't a new product. It was a different assumption: **trust no one by default, verify everything explicitly, and grant access based on identity and context — not network location.**\n\nThat's the model. Three sentences.\n\n## What it means operationally\n\nIf you actually implement Zero Trust, it looks like this:\n\n**Identity is the perimeter.** It doesn't matter where a request comes from — your office, a coffee shop, a data center. What matters is: who is authenticating, is that identity verified, and does this specific context (device health, location, time, risk score) justify access to this specific resource?\n\n**Least privilege, always.** Users and services get exactly the access they need for the task, nothing more. Not \"give the developer access to the dev environment\" — give this developer, on this verified device, read access to this specific service, until the session expires.\n\n**Assume breach.** Design your controls as if attackers are already inside. Segment laterally so a compromised endpoint can't reach everything. Log everything so you can detect and respond.\n\n**Continuous verification.** Authentication isn't a one-time gate at login. The trust assessment runs continuously — if device posture changes, if the user does something anomalous, trust can be revoked mid-session.\n\n## What vendors sell\n\nWhat vendors sell is: their product has a \"Zero Trust\" feature set. Sometimes that's meaningful. Conditional Access in Entra ID genuinely enforces identity-based access with device posture signals. That's a real implementation of Zero Trust principles.\n\nBut \"Zero Trust firewall\" is mostly marketing. Network segmentation is one piece of a Zero Trust architecture — it's not the whole model. A firewall doesn't verify identity. It filters traffic. That's useful, but it's not Zero Trust.\n\nThe tell is whether the product forces you to think about identity and context, or whether it's still thinking in terms of network location. If the conversation is about IP ranges and VLANs, you're still in the perimeter model with new branding.\n\n## Why it matters\n\nThe reason to care about the distinction isn't pedantry. It's that if you think Zero Trust is a product you can buy, you'll buy the product and think you're done. You won't be.\n\nThe actual work is architectural: redefining trust boundaries, implementing strong identity across all users and services, getting device health signals into access decisions, segmenting your environment so lateral movement is hard, building detection and response for when (not if) something gets through.\n\nNone of that is a product. All of it is work.\n\n---\n\nThis is the first of a few posts I'm planning on Zero Trust — what it actually means, how I've implemented pieces of it in real environments, and where the hard parts are. Next up: Conditional Access, which is where most of the practical implementation lives.\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"children\":[[\"$\",\"$L18\",null,{\"maxWidth\":12,\"m\":{\"hide\":true}}],[\"$\",\"$L18\",n "28:I[988654,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/9297aeb96eeb50db.js\"],\"ScrollToHash\"]\n29:I[605649,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/9297aeb96eeb50db.js\"],\"HeadingNav\"]\n27:T15a9,"])</script><script>self.__next_f.push([1,"\nIf you're running Microsoft 365 and you're serious about Zero Trust, Conditional Access is where most of the actual work happens. It's the enforcement layer that sits between your users and your apps — evaluating identity, device health, location, and risk signals before granting access.\n\nI've built Conditional Access policies for several client environments. Here's what I've learned.\n\n## What Conditional Access actually does\n\nEvery time a user or service authenticates to an Entra ID-protected resource, a Conditional Access evaluation runs. The policy engine looks at:\n\n- **Who** is authenticating (user, group, service principal)\n- **What** they're trying to access (specific app, all apps, admin portals)\n- **What device** they're on (managed/unmanaged, compliant/non-compliant, platform)\n- **Where** they're coming from (location, named network, country)\n- **What risk signals** are active (Entra ID Protection scores for sign-in risk and user risk)\n\nBased on those signals, the policy either grants access, blocks it, or grants it conditionally — requiring MFA, a compliant device, a specific authentication strength, or a terms of use agreement.\n\nThat's a powerful model. It lets you say things like: \"Engineers can access production resources, but only from compliant managed devices, always with phishing-resistant MFA, and if their sign-in risk is elevated, block until IT reviews.\"\n\n## The baseline everyone should have\n\nBefore you build anything sophisticated, you need a working baseline. Microsoft publishes reference policies — here's what I actually deploy in every environment:\n\n**Block legacy authentication.** Legacy protocols (SMTP, IMAP, POP) don't support modern authentication and can't do MFA. They're a bypass. Block them early, before anything else.\n\n**Require MFA for all users.** Not just admins. Everyone. If you have users who push back, that's a change management problem, not a reason to skip this.\n\n**Require MFA for Azure management.** Separately target the Azure portal, CLI, and PowerShell. Admin operations get their own policy with stricter requirements.\n\n**Require phishing-resistant MFA for privileged roles.** FIDO2 keys or Windows Hello for Business, not TOTP or push notifications. For Global Admins and other privileged roles, the bar should be higher.\n\n**Block access from high-risk sign-ins.** If Entra ID Protection flags a sign-in as high risk (unfamiliar location, anonymized IP, impossible travel), block it automatically. Don't wait for the help desk to notice.\n\nThat's a solid baseline. Everything after that is refinement.\n\n## What I've seen go wrong\n\n**Report-only mode left on forever.** Report-only is how you test policies without enforcing them. It's useful for a rollout period. It's not a substitute for actual enforcement. I've seen environments with 50 policies in report-only that haven't been reviewed in 18 months. None of them are doing anything.\n\n**The \"break glass\" account problem.** Emergency access accounts need to be excluded from most Conditional Access policies so you can recover if something goes wrong. But those exclusions need to be carefully scoped and regularly audited. A break-glass account excluded from everything with a weak password is a liability.\n\n**Policy conflicts and grant vs. block precedence.** If a user matches both a grant policy and a block policy for the same resource, block wins. Always. This is correct behavior but it's surprising when you don't expect it. Test with the What If tool before deploying.\n\n**Not targeting service principals.** Conditional Access now supports workload identities — service principals and managed identities. Most environments I inherit don't have any policies targeting these. That's a gap.\n\n**Named locations that don't mean anything.** I've seen \"Trusted Location\" policies that include half the world's IP ranges because someone didn't want to deal with VPN. Named locations are only useful if they actually represent trusted networks.\n\n## Device compliance as a gate\n\nOne of the most effective Conditional Access patterns is requiring device compliance for access to sensitive resources. If you're managing devices with Intune, you can define compliance policies (encryption enabled, OS version, no jailbreak, etc.) and then gate access on whether the device passes.\n\nThis is powerful because it closes the \"personal device on managed app\" gap. A user can't just install Outlook on a random machine and access Exchange — they need to enroll the device and meet compliance requirements first.\n\nThe rollout order matters here. If you require compliance before your device enrollment is complete, you lock people out. Usually you want:\n1. Build compliance policies\n2. Deploy to managed devices, verify they pass\n3. Enable Conditional Access requirement in report-only\n4. Review the report-only logs for unexpected blocks\n5. Switch to enforce\n\n## Monitoring\n\nConditional Access sign-in logs are detailed and searchable. At minimum, review:\n- Failures due to non-compliant devices (often legitimate issues to fix)\n- Blocks from unfamiliar locations (often noise, occasionally real)\n- Blocks due to user risk (worth investigating each one)\n\nKQL queries against the sign-in logs in Log Analytics give you more flexibility than the portal UI. If you're in Sentinel, this is where you build your detection rules.\n\n---\n\nNext post: endpoint hardening as a Zero Trust control — because Conditional Access requiring a \"compliant device\" is only as good as what your compliance policies actually check.\n"])</script><script>self.__next_f.push([1,"24:[\"$\",\"$L22\",\"conditional-access-in-practice\",{\"post\":{\"metadata\":{\"title\":\"Conditional Access in Practice\",\"subtitle\":\"\",\"publishedAt\":\"2026-02-15\",\"summary\":\"Conditional Access is where Zero Trust principles actually land in a Microsoft environment. Here's how to think about it, what to get right, and where I've seen it go wrong.\",\"image\":\"/images/avatar.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"conditional-access-in-practice\",\"content\":\"$27\"},\"thumbnail\":true,\"direction\":\"column\"}]\n25:[\"$\",\"$L28\",null,{}]\n26:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L29\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2a:I[811052,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/9297aeb96eeb50db.js\"],\"HeadingLink\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"There's a version of security that's built around the network. The idea is: defend the boundary, and everything inside is safe. Keep attackers out with firewalls, VPNs, intrusion detection. Trust the inside.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"That model has been broken for a long time. Cloud services, remote work, SaaS, third-party integrations — the \\\"inside\\\" isn't a coherent concept anymore. Your users are authenticating from coffee shops. Your apps are in Azure. Your data is in SharePoint and Salesforce and a dozen other places. There's no perimeter to defend.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"What's left is identity. And identity-first security is what it sounds like: rebuild your controls around who is authenticating, rather than where they're connecting from.\"}],\"\\n\",[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-identity-first-means-operationally\",\"children\":\"What identity-first means operationally\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The mental model shift is from \\\"is this request coming from our network?\\\" to \\\"is this principal authorized to take this action, given what I know about them right now?\\\"\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"That second question is more complex, but it's the right question. It considers:\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Authentication strength.\"}],\" Is this a password? A TOTP code? A FIDO2 hardware key? Phishing-resistant MFA is different from SMS MFA, which is different from a password. Access to sensitive resources should require authentication strength proportional to their sensitivity.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Identity assurance.\"}],\" Is this account in good standing? Has it shown anomalous behavior recently? Entra ID Protection gives you risk scores based on behavioral signals — leaked credentials, impossible travel, atypical location. A user with elevated risk should face stepped-up authentication or blocking, not the same access they'd get on a normal day.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Device context.\"}],\" What device is this authentication coming from? Is it managed by your organization? Does it pass compliance checks (encryption, patch level, EDR health)? An authentication from a compliant, managed device means something different than one from an unknown personal device.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"$L2b\",\" Does this identity have the minimum access needed for its function? Not \\\"does this person work here\\\" — \\\"does this specific person need access to this specific thing?\\\" Role creep is a real problem: people accumulate access over time as their responsibilities change, and nobody removes what's no longer needed.\"]}],\"\\n\",\"$L2c\",\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\"]\n"])</script><script>self.__next_f.push([1,"3f:I[436122,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/9297aeb96eeb50db.js\"],\"List\"]\n40:I[626935,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/9297aeb96eeb50db.js\"],\"ListItem\"]\n2b:[\"$\",\"strong\",null,{\"children\":\"Least privilege.\"}]\n2c:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-practical-implementation-stack\",\"children\":\"The practical implementation stack\"}]\n2d:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"In a Microsoft environment, the identity stack looks like this:\"}]\n2e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Entra ID\"}],\" as the identity provider — the central directory, authentication, and authorization source for everything. Single sign-on across apps means every authentication flows through one place you control and log.\"]}]\n2f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Conditional Access\"}],\" as the policy engine — evaluating every authentication against your rules before granting access. MFA requirements, device compliance checks, location restrictions, risk-based controls. This is where policy meets enforcement.\"]}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Entra ID Protection\"}],\" as the risk signal — machine learning models running on authentication patterns to flag suspicious behavior. Leaked credential detection, sign-in risk scoring, user risk scoring. Feeds directly into Conditional Access policy evaluation.\"]}]\n31:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Privileged Identity Management\"}],\" for admin accounts — just-in-time access elevation for privileged roles. Nobody holds Global Admin permanently. You request elevation when you need it, with justification and approval, for a time-limited period. Full audit trail.\"]}]\n32:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Access reviews\"}],\" to fight role creep — automated campaigns that force managers to confirm whether their team members still need the access they have. If nobody confirms it, access is removed. This is how you keep least privilege from drifting over time.\"]}]\n33:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-admin-account-problem\",\"children\":\"The admin account problem\"}]\n34:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Admin accounts are the highest-value targets in an environment. They're also often the most poorly secured.\"}]\n35:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-"])</script><script>self.__next_f.push([1,"8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The pattern I push in every environment:\"}]\n36:[\"$\",\"$L3f\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L40\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"No permanent Global Admin assignment for any user account used for daily work\"}],\"\\n\",[\"$\",\"$L40\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Separate dedicated admin accounts for privileged operations, separate from daily-use accounts\"}],\"\\n\",[\"$\",\"$L40\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Phishing-resistant MFA (FIDO2 or Windows Hello for Business) required for all privileged access — no exceptions for SMS or push notifications\"}],\"\\n\",[\"$\",\"$L40\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"PIM for just-in-time elevation, with approval and justification\"}],\"\\n\",[\"$\",\"$L40\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Break-glass accounts for emergency access, with strong credentials, excluded from most policies, and monitored for any use\"}],\"\\n\"]}]\n37:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The break-glass accounts are important and often set up wrong. They need to exist — if your Conditional Access policies have a bug and lock everyone out, you need a way in. But they should have strong passwords (generated, not memorable), be excluded from Conditional Access in a scoped way, and any authentication from them should trigger an immediate alert.\"}]\n38:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"where-this-gets-hard\",\"children\":\"Where this gets hard\"}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The hardest part isn't the technology. It's the change management.\"}]\n3a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Users who've never needed MFA before will push back. Managers whose teams lose access to things they used to have access to will escalate. Shared accounts (the \\\"team login\\\" that five people use) break identity-first security entirely — you can't have individual accountability if people share credentials — and teams are often attached to them.\"}]\n3b:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The answer isn't to make exceptions. It's to make the security requirements understandable and to make the secure path as smooth as possible. MFA that works well is less painful than people expect. Managed devices that provision automatically don't create friction after the initial setup.\"}]\n3c:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The conversation shifts from \\\"security is making our lives harder\\\" to \\\"we're building for a world where someone will try to get into our systems, and these controls are why they won't succeed.\\\"\"}]\n3d:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"horizontal\":\"center\",\"children\":[\"$\",\"$L20\",null,{\"maxWidth\":\"40\"}]}]\n3e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Last post in this series will be practical: what a Zero Trust rollout actually looks like in a mid-size organization, what to do first, and where the first six months usually go wrong"])</script><script>self.__next_f.push([1,".\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"41:I[27201,[\"/resume/_next/static/chunks/d96012bcfc98706a.js\",\"/resume/_next/static/chunks/73e3194f06db260e.js\"],\"IconMark\"]\n8:null\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"title\",\"0\",{\"children\":\"Identity-First Security\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"The network perimeter is gone. Identity is what's left. Here's what building security around identity looks like in practice and why it changes almost everything.\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"Identity-First Security\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"The network perimeter is gone. Identity is what's left. Here's what building security around identity looks like in practice and why it changes almost everything.\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:url\",\"content\":\"https://rohirik.github.io/resume/blog/identity-first-security\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:image\",\"content\":\"https://rohirik.github.io/resume/images/avatar.png\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:image:alt\",\"content\":\"Identity-First Security\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:type\",\"content\":\"website\"}],[\"$\",\"meta\",\"8\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"9\",{\"name\":\"twitter:title\",\"content\":\"Identity-First Security\"}],[\"$\",\"meta\",\"10\",{\"name\":\"twitter:description\",\"content\":\"The network perimeter is gone. Identity is what's left. Here's what building security around identity looks like in practice and why it changes almost everything.\"}],[\"$\",\"meta\",\"11\",{\"name\":\"twitter:image\",\"content\":\"https://rohirik.github.io/resume/images/avatar.png\"}],[\"$\",\"link\",\"12\",{\"rel\":\"icon\",\"href\":\"/resume/icon.png?icon.4f0888a0.png\",\"sizes\":\"1532x1858\",\"type\":\"image/png\"}],[\"$\",\"$L41\",\"13\",{}]]\n"])</script></body></html>
