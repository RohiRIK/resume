G__mobile\",\"maxWidth\":\"m\",\"paddingY\":\"8\",\"paddingX\":\"16\",\"gap\":\"16\",\"horizontal\":\"between\",\"vertical\":\"center\",\"s\":{\"direction\":\"column\",\"horizontal\":\"center\",\"align\":\"center\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-s neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[\"© \",2026,\" /\"]}],[\"$\",\"span\",null,{\"className\":\"px-4\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Rohi Rikman\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"/ Powered by caffeine and questionable life choices\"}]]}],[\"$\",\"$L18\",null,{\"gap\":\"16\",\"children\":[[\"$\",\"$L19\",\"GitHub\",{\"href\":\"https://github.com/RohiRIK\",\"icon\":\"github\",\"tooltip\":\"GitHub\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"LinkedIn\",{\"href\":\"https://www.linkedin.com/in/rohi-rikman-48831b239/\",\"icon\":\"linkedin\",\"tooltip\":\"LinkedIn\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"Email\",{\"href\":\"mailto:rohi@rohirikman.dev\",\"icon\":\"email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"24:T20fe,"])</script><script>self.__next_f.push([1,"\nThe previous version of my Claude Code config introduced structured context files — goals, decisions, progress, gotchas — persisted as markdown and injected at session start. That worked. But markdown has limits: no querying, no deduplication, no concept of importance or decay, no semantic search, and no way to surface related memories across projects.\n\nThis version replaces the markdown context files with a SQLite-backed long-term memory system, a dedicated MCP server that exposes LTM primitives to Claude directly, semantic recall with embedding fallback, a graph reasoning layer, and an EvaluateSession hook that extracts decisions and patterns automatically at session end.\n\nHere's what changed and why.\n\n## From markdown files to SQLite\n\nThe old system: four `.md` files per project (`context-goals.md`, `context-decisions.md`, `context-progress.md`, `context-gotchas.md`). Hooks read and wrote them. They worked until they didn't — duplicates accumulated, stale entries couldn't be cleaned up automatically, and there was no way to query across them.\n\nThe new system: a single SQLite database at `~/.claude/memory/ltm.db`. Two main tables:\n\n- `memories` — long-term insights, patterns, and decisions. Each row has content, category (`preference | architecture | gotcha | pattern | workflow | constraint`), importance score (1–5), project scope (nullable for globals), tags, and a decay counter.\n- `context_items` — short-term session context. Goals, decisions, progress, and gotchas per project. These expire if a project is inactive for 14 days.\n\nThe schema separation is deliberate. `context_items` are the working memory for an active project — things you need right now. `memories` are the durable knowledge base — things you want to remember across all future sessions.\n\n## The LTM MCP server\n\nThe previous config had Claude calling shell scripts to read and write memory. That worked but was brittle and required careful prompt engineering to get Claude to use it consistently.\n\nThe new approach: a dedicated MCP server (`ltm` server in `settings.json`) that exposes LTM as first-class MCP tools. Claude has native access to:\n\n- `ltm_recall` — FTS5 full-text search across memories with semantic fallback\n- `ltm_learn` — store a new memory or reinforce an existing one\n- `ltm_relate` — create typed relationships between memories\n- `ltm_forget` — delete a memory by ID\n- `ltm_context` — get merged context (globals + project-scoped memories)\n- `ltm_graph` — traverse the memory graph from seed nodes\n- `ltm_context_items` — get context items (goals, decisions, progress, gotchas) for a project\n\nWith the MCP server active, Claude uses these tools directly without me having to orchestrate shell calls. The pattern in `CLAUDE.md` is now explicit: call `mcp__ltm__ltm_recall` before any non-trivial task, call `mcp__ltm__ltm_learn` after discovering a non-obvious pattern.\n\n## Semantic recall with embedding fallback\n\n`ltm_recall` does FTS5 full-text search first. If the FTS5 results are below a threshold, it triggers a semantic fallback: it calls an embedding API, generates a vector for the query, and does cosine similarity search against stored embeddings.\n\nThe implementation in `memory/db.ts`:\n\n```typescript\nexport async function recall(query: string, limit = 10): Promise\u003cMemory[]\u003e {\n  const ftsResults = searchFts(query, limit);\n  if (ftsResults.length \u003e= limit * 0.6) return ftsResults;\n\n  // Semantic fallback\n  if (config.ltm.semanticFallback) {\n    const similar = await getSimilarMemories(query, limit);\n    return deduplicateMerge(ftsResults, similar);\n  }\n  return ftsResults;\n}\n```\n\nThe graceful degradation is important: if the embedding API fails, the FTS5 results are still returned. Semantic search is an enhancement, not a dependency.\n\n## Graph-based reasoning\n\nMemories can have typed relationships: `supports`, `contradicts`, `refines`, `depends_on`, `related_to`, `supersedes`. These are stored in a `memory_relations` table.\n\nThe `ltm_graph` tool does BFS traversal from seed nodes up to a configurable depth. The `getContextMergeWithGraph` function in `db.ts` uses this to build a richer context injection at session start — rather than just listing top memories, it traverses the graph from the most important ones and includes related memories that would otherwise rank below the injection cutoff.\n\nIn practice this surfaces things like: \"This pattern (memory 88) supports this architectural decision (memory 44) which was made in the context of this constraint (memory 31).\" The chain gives Claude more context than any individual memory provides alone.\n\nGraph reasoning is gated behind `config.ltm.graphReasoning = true` — it's off by default because it increases session start time and token usage.\n\n## The EvaluateSession hook\n\nThe most significant behavioral change: a `SessionEnd` / `EvaluateSession` hook that runs an LLM call at session end to extract decisions, patterns, and gotchas from the session transcript and write them to LTM automatically.\n\nPreviously, learning required a manual `/learn` call. Most things worth remembering never got learned because they were discovered mid-task and I didn't stop to capture them.\n\nThe EvaluateSession hook:\n1. Gets a compressed summary of the session (the existing PreCompact summary if available, or a fresh one)\n2. Sends it to Claude with a structured extraction prompt asking for: decisions made, patterns discovered, gotchas encountered, progress achieved\n3. Writes each extracted item to `ltm_learn` with appropriate category and importance\n4. Also updates `context_items` for the project with any progress or decisions\n\nThe hook is gated behind `config.ltm.evaluateSessionLlm = true`. When enabled, every session that produces non-trivial work automatically contributes to the knowledge base.\n\n## Memory decay and the Janitor\n\nMemories have an importance score (1–5). Memories at importance 5 never decay — these are the global rules and constraints that must always be in context. Lower-importance memories decay over time if not accessed or reinforced.\n\nA Janitor agent runs periodically to:\n- Decay memories that haven't been accessed recently\n- Identify near-duplicate memories (via embedding similarity) and merge them\n- Flag memories that haven't been accessed in 90+ days for review\n- Prune memories that have decayed below a minimum threshold\n\nThe Janitor runs as a standalone script (`memory/janitor.ts`) triggered by a cron-like scheduler in the background. It's not a hook — it runs independently of sessions.\n\nThe D3 graph visualization app (from the previous post) makes this visible: strong memories glow, decaying ones dim, and the Janitor's merge/prune operations leave a visible trail.\n\n## What the config looks like now\n\nThe `CLAUDE.md` instruction for LTM is explicit:\n\n\u003e Before any non-trivial task: call `mcp__ltm__ltm_recall` with the topic as query.\n\u003e After discovering a non-obvious pattern or gotcha: call `mcp__ltm__ltm_learn`.\n\u003e When making an architectural decision: call `mcp__ltm__ltm_learn` with `category=architecture`.\n\nThe hooks (`SessionStart`, `EvaluateSession`, `PreCompact`) do the background work. The MCP tools give Claude direct access. The decay and Janitor processes keep the database clean without manual curation.\n\n## What's still rough\n\nThe semantic fallback adds latency to recall — a few hundred milliseconds on a fast connection, more if the embedding API is cold. FTS5 is fast enough that most recalls don't trigger it, but it's noticeable when it does.\n\nThe EvaluateSession extraction isn't perfect. The LLM sometimes over-extracts (trivial things get stored as memories) and occasionally misses important architectural decisions. The category classification is roughly right but imprecise. These are prompt engineering problems that improve over time as the extraction prompt gets tuned.\n\nThe Janitor's duplicate detection via embedding similarity occasionally merges things that shouldn't be merged. Conservative threshold is better — set the similarity cutoff high enough that only near-identical memories get merged.\n\n---\n\nThe overall shift is from \"context files I remember to maintain\" to \"a knowledge base that maintains itself.\" Sessions contribute to it automatically, the Janitor keeps it clean, and recall surfaces relevant history before I start any significant work. The manual hygiene work that v1 and v2 required is mostly gone.\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"children\":[[\"$\",\"$L18\",null,{\"maxWidth\":12,\"m\":{\"hide\":true}}],[\"$\",\"$L18\",null,{\"fillWidth\":true,\"horizontal\":\"center\",\"children\":[\"$\",\"$L10\",null,{\"as\":\"section\",\"maxWidth\":\"m\",\"horizontal\":\"center\",\"gap\":\"l\",\"paddingTop\":\"24\",\"children\":[[\"$\",\"$L1a\",null,{\"id\":\"schema-blogPosting-/blog/jumpcloud-to-intune-migration\",\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"url\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/blog/jumpcloud-to-intune-migration\\\",\\\"sameAs\\\":[],\\\"headline\\\":\\\"The JumpCloud Exit Playbook\\\",\\\"description\\\":\\\"Migrating 200+ Windows and macOS devices from JumpCloud to Microsoft Intune without breaking MDM coverage, compliance posture, or user productivity.\\\",\\\"image\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/images/blog/jumpcloud-to-intune-migration.png\\\",\\\"datePublished\\\":\\\"2026-03-20\\\",\\\"dateModified\\\":\\\"2026-03-20\\\",\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"Rohi Rikman\\\",\\\"url\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/about\\\",\\\"image\\\":{\\\"@type\\\":\\\"ImageObject\\\",\\\"url\\\":\\\"https://CloudJourneyBlog.rohi-lab.org/images/avatar.png\\\"}}}\"}}],[\"$\",\"$L10\",null,{\"maxWidth\":\"s\",\"gap\":\"16\",\"horizontal\":\"center\",\"align\":\"center\",\"children\":[[\"$\",\"$L1b\",null,{\"href\":\"/blog\",\"children\":[\"$\",\"span\",null,{\"className\":\"font-label font-strong font-m\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Blog\"}]}],[\"$\",\"span\",null,{\"className\":\ tructure\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-20\",\"summary\":\"The config got a significant overhaul: SQLite-backed long-term memory, a dedicated MCP server exposing LTM primitives, semantic recall with embedding fallback, graph-based reasoning, and an EvaluateSession hook that extracts decisions automatically.\",\"image\":\"/images/blog/claude-code-config-v3.png\",\"images\":[],\"tag\":\"Dev Tools\",\"team\":[],\"link\":\"\"},\"slug\":\"claude-code-config-v3\",\"content\":\"$24\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L25\"]}]]}],\"$L26\"]}]}],\"$L27\"]}]\n"])</script><script>self.__next_f.push([1,"29:I[988654,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ScrollToHash\"]\n2a:I[605649,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingNav\"]\n28:T17c7,"])</script><script>self.__next_f.push([1,"\nEvery IT team has some version of the same problem: the MDM says one thing, Active Directory says another, and the spreadsheet someone maintains manually is a third opinion. Nobody knows the real device count. Nobody knows which machines are stale. Asset reviews are a manual reconciliation exercise that takes days and is wrong before it's finished.\n\nFor a FinTech client, I built a pipeline that pulls from every authoritative source — AD, Intune, Azure, MDE — and produces a single unified inventory that's always current. Here's the architecture.\n\n## The data problem\n\nThe client had devices across three categories:\n- **Windows workstations**: domain-joined, Intune-enrolled, some hybrid Entra joined\n- **Azure VMs**: not domain-joined, sometimes Intune-enrolled, MDE-onboarded\n- **Legacy machines**: domain-joined only, no Intune, no MDE\n\nNo single system had the full picture. Intune knew about enrolled devices but didn't know about the legacy machines. AD knew about everything domain-joined but didn't know about Azure VMs or compliance state. MDE knew about onboarded endpoints but didn't map cleanly to AD objects.\n\nThe goal: a unified record per device with attributes from all sources — last seen, OS version, compliance state, MDE sensor status, assigned user, department, location.\n\n## The architecture\n\nFour components:\n\n**1. Jenkins** — scheduler and orchestrator. A pipeline job runs nightly and on-demand. It calls the PowerShell scripts in sequence, handles retries, and sends a completion notification.\n\n**2. PowerShell scripts** — data collection and normalization. One script per source, plus a merge script. Each script outputs structured JSON to a staging directory on the Jenkins agent.\n\n**3. SharePoint List** — the inventory store and intermediate layer. PowerShell writes the merged records to a SharePoint list via the SharePoint REST API or PnP PowerShell. The list is the single source of truth that other systems can query.\n\n**4. Power BI** — visualization layer. A Power BI report connects directly to the SharePoint list and refreshes on a schedule. This is the dashboard the IT team and management use.\n\n## The data collection scripts\n\n**AD collector**: Uses `Get-ADComputer` with `-Properties *` to pull all computer objects. Captures name, distinguished name, last logon timestamp, OS version, description, and organizational unit. Filters out disabled objects and objects not seen in 90 days.\n\n```powershell\nGet-ADComputer -Filter * -Properties LastLogonDate, OperatingSystem, Description |\n  Where-Object { $_.LastLogonDate -gt (Get-Date).AddDays(-90) } |\n  Select-Object Name, DistinguishedName, LastLogonDate, OperatingSystem, Description |\n  ConvertTo-Json | Out-File \"$stagingPath\\ad-devices.json\"\n```\n\n**Intune collector**: Uses the Microsoft Graph PowerShell SDK. Calls `Get-MgDeviceManagementManagedDevice` to get all enrolled devices with compliance state, last sync time, enrolled user, and device category.\n\n**MDE collector**: Uses the Defender for Endpoint API (via a service principal with `Machine.Read.All`). Gets onboarding status, sensor health, last seen timestamp, and risk level for every endpoint.\n\n**Azure VM collector**: Uses `Get-AzVM` across all subscriptions the service principal has access to. Gets VM name, resource group, location, OS, running state, and any tags with owner/department information.\n\n## The merge script\n\nThe merge script is where the real work happens. It loads all four JSON files and joins them on device name. The join logic:\n\n1. AD is the primary key source — every AD computer object gets a record\n2. Intune records are matched to AD by device name (normalized to uppercase)\n3. MDE records are matched by hostname\n4. Azure VMs get their own records (no AD object)\n\nFor each merged record, the script calculates derived fields:\n- `managementState`: `fully-managed` (Intune + MDE), `partially-managed` (Intune only or MDE only), `unmanaged` (AD only)\n- `staleness`: days since last seen across all sources\n- `complianceGap`: boolean — in Intune but not compliant\n\nThe merged output is an array of device objects written to `merged-inventory.json`.\n\n## Writing to SharePoint\n\nPnP PowerShell handles the SharePoint write. The script compares the merged inventory against the current SharePoint list state (pulled at the start of the run) and does a delta update: new devices are added, existing devices are updated, devices not seen in 90 days are flagged as stale.\n\nDoing a delta update rather than a full replace matters for performance (the list had 2,000+ items) and for preserving any manual annotations added by the IT team directly in the list.\n\n## Power BI on top\n\nThe Power BI report connects to the SharePoint list as a data source and refreshes daily. Key views:\n\n- **Management coverage**: pie/bar showing how many devices are fully managed vs. partially managed vs. unmanaged\n- **Stale devices**: list of devices not seen in 30+ days, sorted by staleness\n- **Compliance gaps**: devices enrolled in Intune but not passing compliance policy\n- **MDE coverage**: which devices have an active sensor vs. not\n\nThe report is embedded in a Teams tab so the IT team has it in their daily context without going to Power BI directly.\n\n## What it replaced\n\nBefore this pipeline: a manually-maintained Excel spreadsheet updated every quarter. It was always wrong. MDE coverage reports were run manually when someone asked. Compliance gaps were invisible until a CA policy blocked a user.\n\nAfter: a nightly automated run, a SharePoint list the IT team trusts, and a Power BI dashboard the security team uses in their weekly review.\n\nThe pipeline has run without manual intervention for over a year. When a new device shows up as unmanaged, the report flags it. When a compliance gap appears, the security team sees it the next morning.\n\n---\n\nThe architecture is not complicated. Jenkins, PowerShell, SharePoint, Power BI are tools every Microsoft-focused IT team already has. The value is in putting them together deliberately and removing the manual reconciliation step entirely.\n"])</script><script>self.__next_f.push([1,"25:[\"$\",\"$L23\",\"device-inventory-pipeline\",{\"post\":{\"metadata\":{\"title\":\"Building a Device Inventory Pipeline\",\"subtitle\":\"\",\"publishedAt\":\"2026-03-20\",\"summary\":\"When your MDM doesn't tell the full story, build the pipeline yourself. Here's the Jenkins → PowerShell → SharePoint → Power BI architecture I built to unify device data across AD and Intune for a FinTech client.\",\"image\":\"/images/blog/device-inventory-pipeline.png\",\"images\":[],\"tag\":\"Automation\",\"team\":[],\"link\":\"\"},\"slug\":\"device-inventory-pipeline\",\"content\":\"$28\"},\"thumbnail\":true,\"direction\":\"column\"}]\n26:[\"$\",\"$L29\",null,{}]\n27:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L2a\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2b:I[811052,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingLink\"]\n2c:I[436122,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"List\"]\n2d:I[626935,[\"/_next/static/chunks/6633d7a0fde019af.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ListItem\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"JumpCloud is a reasonable MDM choice for early-stage companies. It's cross-platform, handles basic device management, and works without a Microsoft stack. But at some point, most orgs that run on Microsoft 365 hit the ceiling: JumpCloud doesn't integrate cleanly with Conditional Access, Defender for Endpoint, Microsoft Purview, or Entra ID — and you end up managing two parallel identity and device stacks that are increasingly hard to reconcile.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"For a Trading Platform client, that moment came when they needed to enforce Conditional Access requiring Intune-compliant devices and couldn't do it cleanly while still running JumpCloud as the MDM authority. The decision was to exit JumpCloud fully and migrate to the Microsoft stack: Intune + Entra ID + MDE. 200+ devices, Windows and macOS, in active use.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Here's what the migration actually looked like.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"pre-migration-mapping-what-you-have\",\"children\":\"Pre-migration: mapping what you have\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Before touching a single device, you need a complete inventory. JumpCloud has an API and an export — use it. Every device, every user assignment, every policy.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The questions that matter:\"}],\"\\n\",[\"$\",\"$L2c\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Which devices are corporate-owned vs. BYOD?\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Which are Entra ID joined, hybrid joined, or just AD domain-joined?\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"What JumpCloud policies are active and what do they enforce?\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"What software is deployed via JumpCloud?\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Are there any devices running macOS versions below your Intune minimum?\"}],\"\\n\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This mapping takes time and it's worth it. Every surprise you find now is one you don't hit mid-migration with a user locked out.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-enrollment-approach-hybrid-vs.-clean\",\"children\":\"The enrollment approach: hybrid vs. clean\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The most important decision before you start: do you migrate devices in-place (install Intune agent while JumpCloud is still running) or do you wipe and re-enroll?\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"For most Windows devices at this client, we did in-place migration:\"}],\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\",\"\\n\",\"$L4b\",\"\\n\",\"$L4c\",\"\\n\",\"$L4d\"]\n"])</script><script>self.__next_f.push([1,"2e:[\"$\",\"$L2c\",null,{\"as\":\"ol\",\"children\":[\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Deploy the Intune management extension via a JumpCloud script\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Complete Entra ID registration (Hybrid Join or Entra Join depending on whether AD was still in scope)\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Verify Intune enrollment and compliance\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Remove JumpCloud agent\"}],\"\\n\"]}]\n2f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"For macOS, in-place MDM migration is not reliably supported. The MDM profile can only be removed and replaced cleanly if the device is wiped or if the user is an admin. For corporate macOS machines, we did wipe-and-enroll through Autopilot for Windows equivalents, and ADE (Apple Device Enrollment) for macOS via Apple Business Manager.\"}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"A small number of edge-case machines — old hardware, non-standard configurations, machines where the JumpCloud agent was broken — got clean wipes.\"}]\n31:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"windows-the-hybrid-join-question\",\"children\":\"Windows: the Hybrid Join question\"}]\n32:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Most of the Windows devices were domain-joined (on-prem AD) and JumpCloud-managed. For Intune, you need devices to be at minimum Entra ID registered, and ideally Hybrid Entra Joined (domain-joined + Entra ID joined) or pure Entra Joined.\"}]\n33:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Hybrid Join was the right call here because the client still had on-prem AD in active use. We configured the Hybrid Join process via Entra Connect and deployed the Intune enrollment policy to the domain via GPO.\"}]\n34:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The sequence per device:\"}]\n35:[\"$\",\"$L2c\",null,{\"as\":\"ol\",\"children\":[\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Entra Connect syncs the computer object\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Device completes Hybrid Join (takes up to a sync cycle — 30 minutes typically)\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Intune auto-enrollment triggers via GPO\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"MDE onboarding completes\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Compliance policy evaluates — device either passes or gets a grace period\"}],\"\\n\"]}]\n36:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The most common failure mode: time sync issues preventing the device from completing Kerberos-based Hybrid Join. Fix NTP before you start.\"}]\n37:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"macos-apple-business-manager-and-ade\",\"children\":\"m"])</script><script>self.__next_f.push([1,"acOS: Apple Business Manager and ADE\"}]\n38:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"For macOS, we onboarded the org to Apple Business Manager, linked ABM to Intune, and created an ADE enrollment profile. This gives you MDM-supervised devices with the highest management capability — no user-removable MDM profile, full app management, FileVault key escrow.\"}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The catch: ADE applies to new-to-Intune devices. Devices already in ABM from a previous enrollment can be reassigned. Devices that were never in ABM can't be retrofitted into supervised ADE without a wipe and re-enrollment through Apple Configurator.\"}]\n3a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"For the macOS fleet at this client, about 40% were already in ABM from prior management. Those were reassigned to the Intune enrollment profile. The rest were wiped and re-enrolled, with users scheduled for migration days with IT on-site.\"}]\n3b:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"compliance-don-t-enforce-before-enrollment-is-complete\",\"children\":\"Compliance: don't enforce before enrollment is complete\"}]\n3c:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Conditional Access requiring Intune compliance was the end goal, but it cannot be the starting state. If you enable the CA policy before your devices are enrolled and passing compliance, you lock out every user on a device that hasn't completed migration.\"}]\n3d:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The rollout order:\"}]\n3e:[\"$\",\"$L2c\",null,{\"as\":\"ol\",\"children\":[\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Build compliance policies (OS version, encryption, MDE sensor active, no jailbreak/rooted)\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Deploy compliance policies to devices as they enroll — in report-only initially\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Set a grace period (we used 7 days) during which non-compliant devices get access with a compliance notification\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Once \u003e90% of devices are enrolled and compliant, enable the CA policy in report-only\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Review report-only logs for unexpected blocks\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Enable enforcement\"}],\"\\n\"]}]\n3f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The 7-day grace period is important. It means a device that's being migrated this week doesn't block the user today.\"}]\n40:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"decommissioning-jumpcloud\",\"children\":\"Decommissioning JumpCloud\"}]\n41:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Once all devices were verified enrolled in Intune and passing"])</script><script>self.__next_f.push([1," compliance, we removed the JumpCloud agent. The sequence:\"}]\n42:[\"$\",\"$L2c\",null,{\"as\":\"ol\",\"children\":[\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Verify Intune enrollment and compliance status for the device\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Confirm all software previously deployed via JumpCloud is now deployed via Intune (app deployments migrated to Intune Win32 apps and Managed App Store apps)\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Uninstall JumpCloud agent via Intune script\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Remove device from JumpCloud console\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Cancel JumpCloud license\"}],\"\\n\"]}]\n43:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The license cancellation was the milestone. At that point, Intune was the single MDM authority.\"}]\n44:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-broke\",\"children\":\"What broke\"}]\n45:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"A few things caught us mid-migration:\"}]\n46:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"JumpCloud FileVault keys.\"}],\" JumpCloud escrows FileVault recovery keys separately. Once JumpCloud was removed from macOS, those keys were gone. We rotated FileVault before removing JumpCloud, escrowing the new key to Intune. Any device where we missed this step required on-site recovery.\"]}]\n47:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"App deployments tied to JumpCloud.\"}],\" Several internal tools were deployed and configured via JumpCloud scripts. We had to rebuild those as Intune Win32 app packages before migrating those devices. The inventory step at the start should catch these — ours caught most but not all.\"]}]\n48:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Devices in shared-use scenarios.\"}],\" Shared lab workstations with multiple user accounts needed special handling for Intune enrollment since enrollment ties to a primary user in Intune's model.\"]}]\n49:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-result\",\"children\":\"The result\"}]\n4a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"80+ tasks over about four months. At the end: 200+ devices enrolled in Intune, MDE sensors active on all of them, Conditional Access enforcing compliance as a gate, and JumpCloud fully off the books.\"}]\n4b:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The bigger win was architectural: one identity stack (Entra ID), one MDM authority (Intune), one endpoint security platform (MDE), all integrated. Conditional Access can now see device compliance state and make real-time access decisions — something that wasn't possible while JumpCloud was in the picture.\"}]\n4c:[\"$\",\"$L18"])</script><script>self.__next_f.push([1,"\",null,{\"fillWidth\":true,\"horizontal\":\"center\",\"children\":[\"$\",\"$L21\",null,{\"maxWidth\":\"40\"}]}]\n4d:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"If you're planning a JumpCloud exit, the pre-migration inventory and the compliance grace period are the two things that will determine whether the migration is smooth. Get the inventory right, and don't enforce before you enroll.\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"4e:I[27201,[\"/_next/static/chunks/d96012bcfc98706a.js\",\"/_next/static/chunks/73e3194f06db260e.js\"],\"IconMark\"]\n8:null\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"title\",\"0\",{\"children\":\"The JumpCloud Exit Playbook\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Migrating 200+ Windows and macOS devices from JumpCloud to Microsoft Intune without breaking MDM coverage, compliance posture, or user productivity.\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"The JumpCloud Exit Playbook\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"Migrating 200+ Windows and macOS devices from JumpCloud to Microsoft Intune without breaking MDM coverage, compliance posture, or user productivity.\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:url\",\"content\":\"https://cloudjourneyblog.rohi-lab.org/blog/jumpcloud-to-intune-migration\"}],[\"$\",\"meta\",\"5\",{\"propert
