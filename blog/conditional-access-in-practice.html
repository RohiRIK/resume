\",\"icon\":\"email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"23:Tdcb,"])</script><script>self.__next_f.push([1,"\nI work in IT security. I've sat through a lot of vendor calls. And somewhere around the third time someone told me their network appliance was \"a Zero Trust solution,\" I started keeping count.\n\nIt's not a product. It never was. Here's what it actually is.\n\n## The original idea\n\nZero Trust comes from a 2010 paper by John Kindervag at Forrester. The core insight was blunt: perimeter-based security is wrong. The assumption that everything inside your network is trusted and everything outside isn't — that model breaks the moment you have remote workers, cloud services, SaaS apps, contractors, or any real-world complexity.\n\nThe answer wasn't a new product. It was a different assumption: **trust no one by default, verify everything explicitly, and grant access based on identity and context — not network location.**\n\nThat's the model. Three sentences.\n\n## What it means operationally\n\nIf you actually implement Zero Trust, it looks like this:\n\n**Identity is the perimeter.** It doesn't matter where a request comes from — your office, a coffee shop, a data center. What matters is: who is authenticating, is that identity verified, and does this specific context (device health, location, time, risk score) justify access to this specific resource?\n\n**Least privilege, always.** Users and services get exactly the access they need for the task, nothing more. Not \"give the developer access to the dev environment\" — give this developer, on this verified device, read access to this specific service, until the session expires.\n\n**Assume breach.** Design your controls as if attackers are already inside. Segment laterally so a compromised endpoint can't reach everything. Log everything so you can detect and respond.\n\n**Continuous verification.** Authentication isn't a one-time gate at login. The trust assessment runs continuously — if device posture changes, if the user does something anomalous, trust can be revoked mid-session.\n\n## What vendors sell\n\nWhat vendors sell is: their product has a \"Zero Trust\" feature set. Sometimes that's meaningful. Conditional Access in Entra ID genuinely enforces identity-based access with device posture signals. That's a real implementation of Zero Trust principles.\n\nBut \"Zero Trust firewall\" is mostly marketing. Network segmentation is one piece of a Zero Trust architecture — it's not the whole model. A firewall doesn't verify identity. It filters traffic. That's useful, but it's not Zero Trust.\n\nThe tell is whether the product forces you to think about identity and context, or whether it's still thinking in terms of network location. If the conversation is about IP ranges and VLANs, you're still in the perimeter model with new branding.\n\n## Why it matters\n\nThe reason to care about the distinction isn't pedantry. It's that if you think Zero Trust is a product you can buy, you'll buy the product and think you're done. You won't be.\n\nThe actual work is architectural: redefining trust boundaries, implementing strong identity across all users and services, getting device health signals into access decisions, segmenting your environment so lateral movement is hard, building detection and response for when (not if) something gets through.\n\nNone of that is a product. All of it is work.\n\n---\n\nThis is the first of a few posts I'm planning on Zero Trust — what it actually means, how I've implemented pieces of it in real environments, and where the hard parts are. Next up: Conditional Access, which is where most of the practical implementation lives.\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"children\":[[\"$\",\"$L18\",null,{\"maxWidth\":12,\"m\":{\"hide\":true}}],[\" thing else:\n\n**BitLocker everywhere.** Full disk encryption on Windows endpoints. If a laptop is lost or stolen, the data on it is inaccessible without the PIN. Enforce BitLocker, escrow recovery keys to Entra ID, and verify via Intune compliance policy. If a device isn't encrypted, it fails compliance.\n\n**OS and software updates.** Unpatched systems are a known-risk liability. Intune's update rings for Windows let you enforce patch timelines — you can require that devices are within N days of the latest security patch before passing compliance. Combine with Windows Update for Business for ring-based deployment.\n\n**Defender Antivirus and real-time protection.** Basic but worth enforcing via compliance policy. Ensure real-time protection is on and definitions are current. If you have Defender for Endpoint licensed, that opens up device risk score integration.\n\n**Firewall enabled.** Windows Firewall should be on for all profiles (domain, private, public). This is easy to check and easy to enforce, and it closes a lot of lateral movement options.\n\n**Secure Boot.** Prevents boot-time attacks. Enforce via compliance policy — devices that can't pass Secure Boot attestation fail compliance.\n\n**No jailbreak / rooted status** (mobile). For iOS and Android in Intune, compliance policies can check for jailbreak/root status. Jailbroken devices bypass OS security controls and shouldn't be touching corporate resources.\n\n## The deeper controls\n\nOnce the baseline is solid, the next layer:\n\n**Defender for Endpoint integration.** If you have the licensing, connect Defender for Endpoint to Intune compliance. DfE computes a machine risk score based on active threats, vulnerability exposure, and security configuration. You can require that risk score is \"low\" or \"medium\" before a device passes compliance. This gives you real-time threat signal flowing into access decisions.\n\n**Attack Surface Reduction rules.** ASR rules in Defender block specific behaviors: Office macros from spawning child processes, executable content from email attachments, credential theft from lsass.exe. Some of these are noisy in audit mode and need tuning, but they block real attack techniques.\n\n**Credential Guard.** Protects credentials in memory using virtualization-based security. Prevents pass-the-hash and pass-the-ticket attacks even on a compromised endpoint. Requires UEFI and Secure Boot, so you need hardware that supports it.\n\n**Local admin restrictions.** Standard users shouldn't be local admins on their workstations. If they need to install software, the right answer is a software catalog, not admin rights. Restricting local admin significantly limits what malware can do once it lands.\n\n**LAPS.** Local Administrator Password Solution rotates local admin passwords per device and stores them in Entra ID. This prevents credential reuse attacks — if an attacker gets the local admin password from one machine, it doesn't work on others.\n\n## Enforcement reality\n\nThe gap between \"configured in Intune\" and \"actually enforced\" is real. Intune compliance policies mark devices as non-compliant, but if Conditional Access isn't actually gating on that, it's just a report.\n\nThe rollout order I use:\n1. Build the compliance policies and put everything in report-only or \"warn\" mode\n2. Let it run for 2–4 weeks, review what's failing and why\n3. Fix the legitimate issues (old hardware, software conflicts, provisioning gaps)\n4. Enable Conditional Access enforcement for a pilot group\n5. Expand to full enforcement once the pilot is clean\n\nSkipping step 3 means you'll lock out legitimate users when you enforce, which makes IT look like the problem rather than the solution.\n\n## Measuring it\n\nThe questions I use to audit whether endpoint hardening is actually working:\n\n- What percentage of managed endpoints pass compliance today? (Target: \u003e95%)\n- What are the top 3 reasons devices fail compliance?\n- Are any devices passing compliance that shouldn't be (false compliant)?\n- What's the DfE machine risk distribution across the fleet?\n- When did the highest-risk device last check in?\n\nIf you can answer those from Intune and DfE dashboards in under 5 minutes, your visibility is in decent shape. If you can't, that's the first thing to fix.\n\n---\n\nNext: why I built Project Aegis — an AI agent system for security operations — and how the same Zero Trust principles apply to agentic systems that have access to sensitive tools.\n"])</script><script>self.__next_f.push([1,"24:[\"$\",\"$L22\",\"endpoint-hardening-zero-trust-control\",{\"post\":{\"metadata\":{\"title\":\"Endpoint Hardening as a Zero Trust Control\",\"subtitle\":\"\",\"publishedAt\":\"2026-02-10\",\"summary\":\"A compliant device in Conditional Access is only meaningful if your compliance policies check things that actually matter. Here's what to harden and how to measure it.\",\"image\":\"/images/avatar.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"endpoint-hardening-zero-trust-control\",\"content\":\"$27\"},\"thumbnail\":true,\"direction\":\"column\"}]\n25:[\"$\",\"$L28\",null,{}]\n26:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L29\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2a:I[811052,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/9297aeb96eeb50db.js\"],\"HeadingLink\"]\n2b:I[436122,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/9297aeb96eeb50db.js\"],\"List\"]\n2c:I[626935,[\"/resume/_next/static/chunks/601dc1a12bda3fda.js\",\"/resume/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/resume/_next/static/chunks/9988c4a59e44ac76.js\",\"/resume/_next/static/chunks/05424c1bbd401aee.js\",\"/resume/_next/static/chunks/2079049d5abbbd3d.js\",\"/resume/_next/static/chunks/9297aeb96eeb50db.js\"],\"ListItem\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"If you're running Microsoft 365 and you're serious about Zero Trust, Conditional Access is where most of the actual work happens. It's the enforcement layer that sits between your users and your apps — evaluating identity, device health, location, and risk signals before granting access.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"I've built Conditional Access policies for several client environments. Here's what I've learned.\"}],\"\\n\",[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-conditional-access-actually-does\",\"children\":\"What Conditional Access actually does\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Every time a user or service authenticates to an Entra ID-protected resource, a Conditional Access evaluation runs. The policy engine looks at:\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Who\"}],\" is authenticating (user, group, service principal)\"]}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"What\"}],\" they're trying to access (specific app, all apps, admin portals)\"]}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"What device\"}],\" they're on (managed/unmanaged, compliant/non-compliant, platform)\"]}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Where\"}],\" they're coming from (location, named network, country)\"]}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"What risk signals\"}],\" are active (Entra ID Protection scores for sign-in risk and user risk)\"]}],\"\\n\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Based on those signals, the policy either grants access, blocks it, or grants it conditionally — requiring MFA, a compliant device, a specific authentication strength, or a terms of use agreement.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"That's a powerful model. It lets you say things like: \\\"Engineers can access production resources, but only from compliant managed devices, always with phishing-resistant MFA, and if their sign-in risk is elevated, block until IT reviews.\\\"\"}],\"\\n\",[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-baseline-everyone-should-have\",\"children\":\"The baseline everyone should have\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Before you build anything sophisticated, you need a working baseline. Microsoft publishes reference policies — here's what I actually deploy in every environment:\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Block legacy authentication.\"}],\" Legacy protocols (SMTP, IMAP, POP) don't support modern authentication and can't do MFA. They're a bypass. Block them early, before anything else.\"]}],\"\\n\",\"$L2d\",\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\"]\n"])</script><script>self.__next_f.push([1,"2d:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Require MFA for all users.\"}],\" Not just admins. Everyone. If you have users who push back, that's a change management problem, not a reason to skip this.\"]}]\n2e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Require MFA for Azure management.\"}],\" Separately target the Azure portal, CLI, and PowerShell. Admin operations get their own policy with stricter requirements.\"]}]\n2f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Require phishing-resistant MFA for privileged roles.\"}],\" FIDO2 keys or Windows Hello for Business, not TOTP or push notifications. For Global Admins and other privileged roles, the bar should be higher.\"]}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Block access from high-risk sign-ins.\"}],\" If Entra ID Protection flags a sign-in as high risk (unfamiliar location, anonymized IP, impossible travel), block it automatically. Don't wait for the help desk to notice.\"]}]\n31:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"That's a solid baseline. Everything after that is refinement.\"}]\n32:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-i-ve-seen-go-wrong\",\"children\":\"What I've seen go wrong\"}]\n33:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Report-only mode left on forever.\"}],\" Report-only is how you test policies without enforcing them. It's useful for a rollout period. It's not a substitute for actual enforcement. I've seen environments with 50 policies in report-only that haven't been reviewed in 18 months. None of them are doing anything.\"]}]\n34:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"The \\\"break glass\\\" account problem.\"}],\" Emergency access accounts need to be excluded from most Conditional Access policies so you can recover if something goes wrong. But those exclusions need to be carefully scoped and regularly audited. A break-glass account excluded from everything with a weak password is a liability.\"]}]\n35:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Policy conflicts and grant vs. block precedence.\"}],\" If a user matches both a grant policy and a block policy for the same resource, block wins. Always. This is correct behavior but it's surprising when you don't expect it. Test with the What If tool before deploying.\"]}]\n36:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Not targeting service principals.\"}],\" Conditional Access now supports workload identities — service principals and managed identities. Most environments I inherit don't have any policies targeting the"])</script><script>self.__next_f.push([1,"se. That's a gap.\"]}]\n37:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Named locations that don't mean anything.\"}],\" I've seen \\\"Trusted Location\\\" policies that include half the world's IP ranges because someone didn't want to deal with VPN. Named locations are only useful if they actually represent trusted networks.\"]}]\n38:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"device-compliance-as-a-gate\",\"children\":\"Device compliance as a gate\"}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"One of the most effective Conditional Access patterns is requiring device compliance for access to sensitive resources. If you're managing devices with Intune, you can define compliance policies (encryption enabled, OS version, no jailbreak, etc.) and then gate access on whether the device passes.\"}]\n3a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This is powerful because it closes the \\\"personal device on managed app\\\" gap. A user can't just install Outlook on a random machine and access Exchange — they need to enroll the device and meet compliance requirements first.\"}]\n3b:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The rollout order matters here. If you require compliance before your device enrollment is complete, you lock people out. Usually you want:\"}]\n3c:[\"$\",\"$L2b\",null,{\"as\":\"ol\",\"children\":[\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Build compliance policies\"}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Deploy to managed devices, verify they pass\"}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Enable Conditional Access requirement in report-only\"}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Review the report-only logs for unexpected blocks\"}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Switch to enforce\"}],\"\\n\"]}]\n3d:[\"$\",\"$L2a\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"monitoring\",\"children\":\"Monitoring\"}]\n3e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Conditional Access sign-in logs are detailed and searchable. At minimum, review:\"}]\n3f:[\"$\",\"$L2b\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Failures due to non-compliant devices (often legitimate issues to fix)\"}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Blocks from unfamiliar locations (often noise, occasionally real)\"}],\"\\n\",[\"$\",\"$L2c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Blocks due to user risk (worth investigating each one)\"}],\"\\n\"]}]\n40:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"KQL queries against the sign-in logs in Log Analytics give you more flexibility than the portal UI. If you're in Sentinel, this is where you build your detection rules.\"}]\n41:[\"$\",\"$L18\",null,{\"fillWidth\":true,\"horizontal\":\"center\",\"children\":[\"$\",\"$L20\",null,{\"maxWidth\":\"40\"}]}]\n42:["])</script><script>self.__next_f.push([1,"\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Next post: endpoint hardening as a Zero Trust control — because Conditional Access requiring a \\\"compliant device\\\" is only as good as what your compliance policies actually check.\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"43:I[27201,[\"/resume/_next/static/chunks/d96012bcfc98706a.js\",\"/resume/_next/static/chunks/73e3194f06db260e.js\"],\"IconMark\"]\n8:null\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"title\",\"0\",{\"children\":\"Conditional Access in Practice\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Conditional Access is where Zero Trust principles actually land in a Microsoft environment. Here's how to think about it, what to get right, and where I've seen it go wrong.\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"Conditional Access in Practice\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"Conditional Access is where Zero Trust principles ac
